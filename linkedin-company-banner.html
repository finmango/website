<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1584">
    <title>FinMango — LinkedIn Company Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow: hidden; background: #222; }

        /* LinkedIn company page banner — 1584 x 396 */
        .banner {
            width: 1584px;
            height: 396px;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #FF6B35;
        }

        /* Subtle radial light from the right */
        .glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 75% 50%, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0) 60%);
            pointer-events: none;
        }

        /* Right-aligned content (safe from the company logo overlay in bottom-left) */
        .content {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 1100px;
            padding: 0 96px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            text-align: right;
        }

        .headline {
            color: #fff;
            font-size: 82px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2.5px;
            text-shadow: 0 4px 28px rgba(80, 20, 0, 0.18);
        }

        .url {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.85;
            margin-top: 28px;
        }
    </style>
</head>

<body>
    <div class="banner" id="capture">
        <div class="glow"></div>
        <div class="content">
            <div class="headline">Economic Mobility is a Right.</div>
            <div class="url">finmango.org</div>
        </div>
    </div>
</body>

</html>

name: Update Financial Health Data

on:
  schedule:
    - cron: '0 5 * * *'  # 5 AM UTC daily
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Data Pipeline
        id: data_pipeline
        env:
          GOOGLE_TRENDS_API_KEY: ${{ secrets.GOOGLE_TRENDS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          HUD_API_KEY: ${{ secrets.HUD_API_KEY }}
        run: |
          set -e  # Exit on first error so failures are not silently swallowed

          # Create data directories if missing
          mkdir -p data/raw

          # Fetch real economic data from BLS, FRED, Census, HUD APIs
          # Note: JCHS reference data is loaded from data/jchs-reference-2025.json
          echo "::group::Real data fetch"
          node scripts/fetch-real-data.js
          echo "::endgroup::"

          # Validate that the output file is non-empty and contains DASHBOARD_DATA
          if [ ! -s data/dashboard-data.js ] || ! grep -q "DASHBOARD_DATA" data/dashboard-data.js; then
            echo "::warning::Real data fetch produced incomplete output — running legacy pipeline as fallback"
            echo "::group::Legacy pipeline fallback"
            node scripts/fetch-trends.js || true
            node scripts/calculate-indices.js || true
            echo "::endgroup::"
          fi

          # Final validation: fail the step if we still have no usable data file
          if [ ! -s data/dashboard-data.js ]; then
            echo "::error::dashboard-data.js is missing or empty after both pipelines. Dashboard will serve stale data."
            exit 1
          fi

          # Ensure top-level rent_burden / fmr_2br / housing_wage fields are
          # present on every state so the Housing Policy Lab's Barometer sync
          # lights up 51/51 across all four target fields. Falls back to
          # NLIHC OOR 2025 for states the live APIs missed.
          echo "::group::Augment housing fields"
          node scripts/augment-housing-fields.js
          echo "::endgroup::"

          # Update Student Health Map Data (Young Adult Specific)
          echo "Updating Student Map Data..."
          node scripts/update-student-map.js || true

      - name: Archive daily snapshot
        run: |
          # latest.json is overwritten every run; the dated archive preserves the
          # time series (the asset behind research + data licensing). Keyed on the
          # file's own as_of date so same-day re-runs overwrite, not duplicate.
          if [ -s data/latest.json ]; then
            mkdir -p data/archive
            AS_OF=$(node -p "JSON.parse(require('fs').readFileSync('data/latest.json','utf8')).as_of || ''")
            if [ -n "$AS_OF" ]; then
              cp data/latest.json "data/archive/${AS_OF}.json"
              node -e "const fs=require('fs');const days=fs.readdirSync('data/archive').filter(f=>/^\d{4}-\d{2}-\d{2}\.json\$/.test(f)).map(f=>f.slice(0,-5)).sort();fs.writeFileSync('data/archive/manifest.json',JSON.stringify({description:'FinMango Financial Health Barometer — daily snapshot archive',latest:days[days.length-1],earliest:days[0],count:days.length,url_pattern:'/data/archive/{YYYY-MM-DD}.json',dates:days},null,2)+'\n')"
              echo "Archived snapshot for ${AS_OF}"
            else
              echo "::warning::latest.json has no as_of date — snapshot not archived"
            fi
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "::notice::Data pipeline ran but produced no new data. Possible upstream data freeze."
          else
            git commit -m "📊 Update financial health data $(date +%Y-%m-%d)"
            git push
          fi

      - name: Write job summary
        if: always()
        run: |
          STATUS="${{ steps.data_pipeline.outcome }}"
          DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

          echo "## Financial Health Data Update — ${DATE}" >> $GITHUB_STEP_SUMMARY
          if [ "$STATUS" = "success" ]; then
            echo "✅ **Status:** Pipeline completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "$STATUS" = "failure" ]; then
            echo "❌ **Status:** Pipeline FAILED — dashboard-data.js was not updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action required:** Check the 'Update Data Pipeline' step logs above." >> $GITHUB_STEP_SUMMARY
            echo "The dashboard will continue serving the last successful data, but the" >> $GITHUB_STEP_SUMMARY
            echo "staleness check in the frontend will surface a warning to users." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Status:** ${STATUS}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Configured |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| GOOGLE_TRENDS_API_KEY | ${{ secrets.GOOGLE_TRENDS_API_KEY != '' && '✅' || '❌ missing' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| FRED_API_KEY | ${{ secrets.FRED_API_KEY != '' && '✅' || '❌ missing' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CENSUS_API_KEY | ${{ secrets.CENSUS_API_KEY != '' && '✅' || '❌ missing' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HUD_API_KEY | ${{ secrets.HUD_API_KEY != '' && '✅' || '❌ missing' }} |" >> $GITHUB_STEP_SUMMARY

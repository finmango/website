  <div class="overlay" id="overlay"><div class="modal" id="modalBox" role="dialog" aria-modal="true"></div></div>
  <div class="toasts" id="toasts"></div>

  <script>
    'use strict';
    /* ========================================================================
       FinMango HQ — a lightweight Notion-style workspace: roadmap + boards + wiki.
       - Always works locally (localStorage).
       - Optionally syncs the whole team through /api/board (Cloudflare Pages
         Function → Google Apps Script → Google Sheet). See docs/TEAM-BOARD-SETUP.md.
       - Cards/pages flagged "public" appear on the public roadmap page
         (roadmap.html) via the backend's key-less `public` action.
       ======================================================================== */

    // ============================ CONSTANTS ================================
    // "Sign in with FinMango": paste the OAuth client ID from Google Cloud
    // Console here (docs/TEAM-BOARD-SETUP.md → Google Sign-In). Client IDs are
    // public by design — safe to commit. Until it's set, the Google button is
    // hidden and the team-key door still works.
    var GOOGLE_CLIENT_ID = '846871931336-o1h3km8mg9qoil186ub74t83jun80b2m.apps.googleusercontent.com';
    var ALLOWED_DOMAIN = 'finmango.org';
    var LS_DOC = 'fmb_doc_v1', LS_KEY = 'fmb_key', LS_ME = 'fmb_me', LS_UI = 'fmb_ui', LS_AUTH = 'fmb_gauth';
    var COL_COLORS = ['#9A9A93', '#4A7BD0', '#E8A33D', '#3E9A5F', '#FF6B35', '#8B5CF6', '#D9534F', '#2E9E9E'];
    var AVA_COLORS = ['#FF6B35', '#3E9A5F', '#4A7BD0', '#8B5CF6', '#E8A33D', '#2E9E9E', '#D9534F', '#5F6B7A'];
    var TAG_COLORS = [['#FFF0E8', '#C2410C'], ['#EAF3EC', '#1F7A40'], ['#EAF0FA', '#2B5AB8'], ['#F3EDFC', '#6D3FC4'],
      ['#FDF3E0', '#9A6A0B'], ['#E8F4F4', '#1D7A7A'], ['#FBEAEA', '#B23030'], ['#F0F0ED', '#55554F']];
    var PRIO = { urgent: ['URGENT', '#C62828'], high: ['HIGH', '#E5511B'], medium: ['MED', '#B8860B'], low: ['LOW', '#5F6B7A'] };
    var EMOJIS = ['🥭','📋','🧭','🚀','📣','🎓','💡','🌱','📊','✅','🗓️','💰','🌍','🤝','✍️','🎯','🔬','📚','🛠️','🏆','❤️','🔥','⭐','📌','🏠','📞','📄','🗂️','🧪','🎤','🖥️','🌾'];

    // ============================ UTILITIES ================================
    function $(id) { return document.getElementById(id); }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
    function now() { return Date.now(); }
    function clone(o) { return JSON.parse(JSON.stringify(o)); }
    function toast(msg) {
      var t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
      $('toasts').appendChild(t); setTimeout(function () { t.remove(); }, 3200);
    }
    function initials(name) {
      var parts = String(name || '?').trim().split(/\s+/);
      return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
    }
    function tagColor(tag) {
      var h = 0; for (var i = 0; i < tag.length; i++) h = (h * 31 + tag.charCodeAt(i)) >>> 0;
      return TAG_COLORS[h % TAG_COLORS.length];
    }
    function fmtDue(iso) {
      if (!iso) return null;
      var d = new Date(iso + 'T12:00:00'), today = new Date(); today.setHours(12, 0, 0, 0);
      var days = Math.round((d - today) / 86400000);
      var label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (days === 0) label = 'Today'; else if (days === 1) label = 'Tomorrow';
      return { label: label, cls: days < 0 ? 'overdue' : (days <= 2 ? 'soon' : '') };
    }
    function relTime(ts) {
      var s = Math.max(1, Math.round((now() - ts) / 1000));
      if (s < 60) return 'just now';
      var m = Math.round(s / 60); if (m < 60) return m + 'm ago';
      var h = Math.round(m / 60); if (h < 24) return h + 'h ago';
      var d = Math.round(h / 24); if (d < 30) return d + 'd ago';
      return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    // Avatar for anything with {name, color, photo?} — Google photo when
    // available, colored initials otherwise (and if the photo fails to load).
    function avatarHtml(m, extraStyle) {
      var open = '<span class="avatar" style="background:' + esc(m.color || '#9A9A93') + ';' + (extraStyle || '')
        + '" title="' + esc(m.name || '') + '">';
      var body = esc(initials(m.name));
      if (m.photo) body += '<img src="' + esc(m.photo) + '" alt="" referrerpolicy="no-referrer" onerror="this.remove()">';
      return open + body + '</span>';
    }
    // Decode a JWT's payload (display only — real verification happens server-side).
    function decodeJwt(t) {
      var p = t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(decodeURIComponent(atob(p).split('').map(function (c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join('')));
    }

    // ==================== TINY MARKDOWN RENDERER ===========================
    // Deliberately small: headings, bold/italic/code, lists, quotes, links,
    // ``` blocks, --- rules, and [[wikilinks]] between pages. That's the whole
    // grammar — on purpose.
    function mdInline(s) { // s is already HTML-escaped
      return s
        .replace(/\[\[([^\]\n]+)\]\]/g, function (_, name) {
          var p = pageByTitle(name.trim());
          return '<a class="wikilink' + (p ? '' : ' missing') + '" data-wiki="' + esc(name.trim()) + '">' + name.trim() + '</a>';
        })
        .replace(/\[([^\]\n]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        .replace(/`([^`\n]+)`/g, '<code>$1</code>');
    }
    function mdRender(src) {
      var lines = String(src || '').split('\n');
      var html = '', para = [], list = null, quote = [], inCode = false, codeBuf = [];
      function flushPara() { if (para.length) { html += '<p>' + mdInline(para.join('<br>')) + '</p>'; para = []; } }
      function flushList() { if (list) { html += '</' + list + '>'; list = null; } }
      function flushQuote() { if (quote.length) { html += '<blockquote>' + mdInline(quote.join('<br>')) + '</blockquote>'; quote = []; } }
      function flushAll() { flushPara(); flushList(); flushQuote(); }
      for (var i = 0; i < lines.length; i++) {
        var raw = lines[i];
        if (/^```/.test(raw)) {
          if (inCode) { html += '<pre><code>' + codeBuf.join('\n') + '</code></pre>'; codeBuf = []; inCode = false; }
          else { flushAll(); inCode = true; }
          continue;
        }
        if (inCode) { codeBuf.push(esc(raw)); continue; }
        var line = esc(raw);
        var m;
        if (!raw.trim()) { flushAll(); continue; }
        if ((m = line.match(/^(#{1,3})\s+(.*)$/))) { flushAll(); var h = m[1].length; html += '<h' + h + '>' + mdInline(m[2]) + '</h' + h + '>'; continue; }
        if (/^---+\s*$/.test(raw)) { flushAll(); html += '<hr>'; continue; }
        if ((m = line.match(/^&gt;\s?(.*)$/))) { flushPara(); flushList(); quote.push(m[1]); continue; }
        if ((m = line.match(/^[-*]\s+(.*)$/))) {
          flushPara(); flushQuote();
          if (list !== 'ul') { flushList(); html += '<ul>'; list = 'ul'; }
          html += '<li>' + mdInline(m[1]) + '</li>'; continue;
        }
        if ((m = line.match(/^\d+\.\s+(.*)$/))) {
          flushPara(); flushQuote();
          if (list !== 'ol') { flushList(); html += '<ol>'; list = 'ol'; }
          html += '<li>' + mdInline(m[1]) + '</li>'; continue;
        }
        flushList(); flushQuote(); para.push(line);
      }
      if (inCode) html += '<pre><code>' + codeBuf.join('\n') + '</code></pre>';
      flushAll();
      return html;
    }

    // ============================ SEED DATA ================================
    // The Roadmap board is seeded from FinMango's old public Notion roadmap
    // (finmango.notion.site, "FinMango Roadmap 🥭"), re-sorted into horizons.
    // It's a starting point — reorder it at the next leadership call.
    function seedDoc() {
      var mScott = { id: uid(), name: 'Scott', color: AVA_COLORS[0] };

      // ---- Roadmap board -------------------------------------------------
      var rb = uid();
      var hNow = { id: uid(), name: 'Now', color: '#FF6B35' };
      var hNext = { id: uid(), name: 'Next', color: '#E8A33D' };
      var hLater = { id: uid(), name: 'Later', color: '#4A7BD0' };
      var hSomeday = { id: uid(), name: 'Someday', color: '#9A9A93' };
      var hShipped = { id: uid(), name: 'Shipped 🚀', color: '#3E9A5F' };
      function initiative(colId, title, desc, tags, pub, discuss) {
        return { id: uid(), colId: colId, title: title, desc: desc || '', assignee: '', due: '',
          priority: '', tags: tags || [], comments: [], discuss: !!discuss, public: !!pub,
          createdAt: now(), updatedAt: now() };
      }
      var roadmapCards = [
        // ---- Now
        initiative(hNow.id, 'Financial Health Barometer', 'Real-time, state-level financial stress signals built from search trends and public data (BLS, Census, HUD, FRED). Live on finmango.org — ongoing refinement, validation, and expansion.', ['research', 'data', 'products'], true),
        initiative(hNow.id, 'Barrier Breakers 2026', 'Our program spotlighting students breaking financial barriers — applications, judging, projects, and the 2026 showcase.', ['programs', 'events'], true),
        initiative(hNow.id, 'Ambassador Program — 2026 cohort', 'Each year, young adults join FinMango as financial health ambassadors to strengthen a global understanding of what financial health means across communities.', ['programs', 'global'], true),
        initiative(hNow.id, 'Research with Eren Cifci, PhD (Austin Peay State University)', 'Three research projects: whether mental health-related searches can predict housing distress and eviction trends; AI adoption\'s impact on banking efficiency and employment; and how natural disasters affect community bank resilience.', ['research'], true),
        initiative(hNow.id, 'Research with Madhavi Venkatesan, PhD (Northeastern University)', 'Two research projects: sustainable investment search behavior as a market predictor, and what motivates Gen Z economic behavior across California, Maryland, and Massachusetts cohorts.', ['research'], true),
        // ---- Next
        initiative(hNext.id, 'FinMango Day 2026 (Kent State)', 'Annual event with Kent State University: top financial literacy students from Northeast Ohio network and compete for $10k+ in cash prizes and scholarships. Seeking sponsors and partners for 2026.', ['events'], true),
        initiative(hNext.id, 'FinMango Pulse', 'Proposed AI-powered community financial health monitoring: detect local economic distress signals early and help connect people to benefits they qualify for. Google.org Impact Challenge application in progress.', ['products', 'data'], false),
        initiative(hNext.id, 'Team hub rollout (this workspace!)', 'Get the whole team onto this workspace: roadmap, boards, and wiki pages as the one-stop hub for volunteers and everything FinMango.', ['internal'], false, true),
        // ---- Later
        initiative(hLater.id, 'Community platform', 'Nothing big has ever been done alone. A directory of industry leaders and community members with calls to action to collaborate.', ['products', 'global'], true),
        initiative(hLater.id, 'Pilot social hackathons', 'Students, young adults, and professionals rapidly probe innovative ideas for solving economic equity challenges. Less about deliverables, more about discovering solutions and career development — aiming for a scalable, freely-licensed model.', ['events', 'global'], true),
        // ---- Someday
        initiative(hSomeday.id, 'Climate Migration Trend Scanner', 'Real-time data and analysis on climate migration trends worldwide: interactive maps, customizable filters, and alerts when significant trends occur.', ['data', 'global'], true),
        initiative(hSomeday.id, 'Global FinHealth Awards', 'We love our community and want to honor those making a difference in financial health worldwide.', ['events', 'global'], true),
        // ---- Shipped
        initiative(hShipped.id, 'COVID-19 Open Data Project (with Google)', 'The world\'s most comprehensive COVID-19 dataset: sub-national cases and vaccine data for 20,000+ locations in 190+ countries. Used by the WHO (Covax), World Bank, IMF, Harvard research, USAID, and more.', ['data', 'global'], true),
        initiative(hShipped.id, 'FinHealth measurement toolkit', 'An openly shared toolkit of best practices for measuring financial health across geographies and cultures — including a piloted framework for measuring the financial health of refugees.', ['research', 'global'], true),
        initiative(hShipped.id, 'FinHealth ecosystem mapping', 'Mapped the players shaping the emerging field of financial health.', ['research'], true),
        initiative(hShipped.id, 'Ambassador Program launch', 'Launched the FinMango Ambassador Program, sharing powerful stories of young adults who have endured and overcome financial shocks.', ['programs'], true),
        initiative(hShipped.id, 'Open-sourced resources & case studies', 'Published housed resources and external case studies in a searchable format on our website.', ['transparency'], true),
        initiative(hShipped.id, 'Unified FinMango brand & website', 'Universalized the FinMango brand, voice, and design across the web. 😎', ['design'], true)
      ];
      var roadmapBoard = { id: rb, icon: '🧭', name: 'Roadmap', updatedAt: now(),
        columns: [hNow, hNext, hLater, hSomeday, hShipped], cards: roadmapCards };

      // ---- Team HQ task board ---------------------------------------------
      var tb = uid();
      var cTodo = { id: uid(), name: 'To do', color: COL_COLORS[0] };
      var cDoing = { id: uid(), name: 'In Progress', color: COL_COLORS[1] };
      var cDone = { id: uid(), name: 'Done', color: COL_COLORS[3] };
      function task(colId, title, desc, prio, tags) {
        return { id: uid(), colId: colId, title: title, desc: desc || '', assignee: '', due: '',
          priority: prio || '', tags: tags || [], comments: [], discuss: false, public: false,
          createdAt: now(), updatedAt: now() };
      }
      var teamBoard = { id: tb, icon: '🥭', name: 'Team HQ', updatedAt: now(),
        columns: [cTodo, cDoing, cDone],
        cards: [
          task(cTodo.id, 'Have everyone sign in with their @finmango.org account', 'Send the team the link — signing in adds them as members automatically, with their name and photo from Google.', 'medium', ['getting started']),
          task(cTodo.id, 'Review the seeded Roadmap at the next leadership call', 'The 🧭 Roadmap board was imported from our old Notion roadmap and pre-sorted into Now / Next / Later / Someday / Shipped. Drag things where they actually belong, edit details, and flag anything for discussion with the 📞 checkbox.', 'high', ['getting started']),
          task(cDoing.id, 'Set up team sync', 'Follow docs/TEAM-BOARD-SETUP.md in the website repo (~10 min, free) so everyone sees the same workspace.', 'high', ['getting started']),
          task(cDone.id, 'Build the FinMango team workspace', 'Done — you\'re looking at it! 🎉', '', [])
        ] };

      // ---- Wiki pages ------------------------------------------------------
      function pg(icon, title, body, pub) {
        return { id: uid(), icon: icon, title: title, body: body, public: !!pub, createdAt: now(), updatedAt: now() };
      }
      var pages = [
        pg('🏠', 'Start Here',
'# Welcome to FinMango HQ 👋\n\nThis is our one-stop hub: what we\'re working on, how to get involved, and everything the team needs in one place.\n\n## How this workspace is organized\n\n- **🧭 Roadmap** — the org-level view. What we\'re doing **Now**, what\'s **Next**, what\'s **Later / Someday**, and what we\'ve **Shipped**. This is the agenda for leadership calls.\n- **🥭 Team HQ** — day-to-day tasks. Grab something, drag it along, done.\n- **Pages** (this sidebar section) — our wiki: guides, notes, and how-tos.\n\n## House rules\n\n1. Keep it simple — boards, pages, members. That\'s the whole system.\n2. One card = one thing someone can own.\n3. Flag anything that needs a group decision with the **📞 Discuss at next call** checkbox — flagged cards + everything in Now form the call agenda automatically.\n4. **Never put passwords, keys, or sensitive personal info on cards or pages.**\n\n## Useful links\n\n- [finmango.org](https://www.finmango.org)\n- [Financial Health Barometer](https://www.finmango.org/barometer)\n- [Barrier Breakers](https://www.finmango.org/barrier-breakers)\n- See also: [[Get Involved]] and [[Leadership Call Notes]]', false),
        pg('🤝', 'Get Involved',
'# Ways to get involved with FinMango\n\nWe\'re volunteer-powered. Whatever your skills, there\'s a lane:\n\n## 🎓 Become an Ambassador\nJoin a yearly cohort of young adults strengthening the global understanding of financial health. Apply at [finmango.org/ambassador-apply](https://www.finmango.org/ambassador-apply).\n\n## 🔬 Research\nWe collaborate with university partners on financial health research — data analysis, writing, and literature review help is always welcome.\n\n## 🛠️ Engineering & design\nOur website, tools, and data pipelines are open source. Check the [GitHub repo](https://github.com/finmango/website).\n\n## 🎤 Events\nHelp organize FinMango Day, Barrier Breakers, and community events — outreach, logistics, judging, sponsorship.\n\n## ✍️ Content\nWrite for Mango Stories, build lesson content, or share your community\'s story on the [Community Wall](https://www.finmango.org/community-wall).\n\n---\n\nNot sure where you fit? Add yourself in **Team members** and drop a card in the 🥭 Team HQ board saying hi — someone will follow up.', false),
        pg('📞', 'Leadership Call Notes',
'# Leadership call notes\n\nOne section per call, newest on top. The agenda builds itself: open the 🧭 Roadmap board and hit **📞 Agenda** — it shows everything in **Now** plus every card flagged for discussion.\n\n---\n\n## Template (copy for each call)\n\n**Date:** \n**On the call:** \n\n### Now check-in\n*Anything stuck? Anything done → drag to Shipped.*\n\n### Flagged for discussion\n*Walk the 📞 flagged cards. Decide: pull into Now, park in Later, or drop. Unflag as you go.*\n\n### Decisions\n- \n\n### New owners\n- ', false),
        pg('💡', 'Initiative Template',
'# Initiative: (name)\n\n*Copy this page for any big idea before proposing it. Link it from the roadmap card. A few honest sentences per section beats a long deck.*\n\n## What is it?\n\n## Who does it serve?\n\n## Why now?\n\n## What does success look like?\n*How would we know in 6 months this was worth it?*\n\n## What will it take?\n*People, time, money, partners — rough is fine.*\n\n## Open questions\n- ', false)
      ];

      return {
        v: 1, workspace: 'FinMango HQ', updatedAt: now(),
        members: [mScott],
        tombstones: {},
        boards: [roadmapBoard, teamBoard],
        pages: pages
      };
    }

    // ============================ STATE ====================================
    var doc = null;                 // the whole workspace document
    var ui = { boardId: null, pageId: null, view: 'board', pageEdit: false, agenda: false,
      search: '', fAssignee: '', fPriority: '', sidebarClosed: false };
    var sync = { key: localStorage.getItem(LS_KEY) || '', serverVersion: 0, status: 'local',
      dirty: false, pushTimer: null, pushing: false, configured: null };
    var auth = null; // Google sign-in: {token, email, name, given, picture, exp}
    try { auth = JSON.parse(localStorage.getItem(LS_AUTH) || 'null'); } catch (e) {}
    var meId = localStorage.getItem(LS_ME) || '';
    var quickAddCol = null;         // column id currently showing the quick-add box
    var drag = null;                // { type:'card'|'col', id }

    function me() { return doc.members.find(function (m) { return m.id === meId; }) || null; }
    function board() { return doc.boards.find(function (b) { return b.id === ui.boardId; }) || doc.boards[0] || null; }
    function page() { return (doc.pages || []).find(function (p) { return p.id === ui.pageId; }) || null; }
    function member(id) { return doc.members.find(function (m) { return m.id === id; }) || null; }
    function pageByTitle(t) {
      t = String(t).toLowerCase();
      return (doc.pages || []).find(function (p) { return p.title.toLowerCase() === t; }) || null;
    }
    function inPageMode() { return ui.view === 'page' && page(); }

    // ======================== PERSISTENCE ==================================
    function persistLocal() {
      try { localStorage.setItem(LS_DOC, JSON.stringify(doc)); } catch (e) { /* storage full/blocked */ }
      try { localStorage.setItem(LS_UI, JSON.stringify({ boardId: ui.boardId, pageId: ui.pageId, view: ui.view, sidebarClosed: ui.sidebarClosed })); } catch (e) {}
    }
    function loadLocal() {
      try {
        var raw = localStorage.getItem(LS_DOC);
        if (raw) doc = JSON.parse(raw);
      } catch (e) { doc = null; }
      if (!doc || !doc.boards) doc = seedDoc();
      migrate();
      try {
        var u = JSON.parse(localStorage.getItem(LS_UI) || '{}');
        ui.boardId = u.boardId || null;
        ui.pageId = u.pageId || null;
        ui.view = (u.view === 'table' || u.view === 'page') ? u.view : 'board';
        ui.sidebarClosed = !!u.sidebarClosed;
      } catch (e) {}
      if (ui.view === 'page' && !page()) ui.view = 'board';
      if (!board()) ui.boardId = doc.boards[0] && doc.boards[0].id;
    }
    // Older local/server documents may predate pages/flags — fill the gaps.
    function migrate() {
      if (!doc.tombstones) doc.tombstones = {};
      if (!doc.pages) doc.pages = [];
    }

    // A mutation happened: stamp, persist, queue a sync push, re-render.
    function mutate(opts) {
      doc.updatedAt = now();
      persistLocal();
      sync.dirty = true;
      schedulePush();
      if (!opts || !opts.noRender) render();
    }

    // ====================== GOOGLE SIGN-IN (GIS) ===========================
    function gsiConfigured() { return GOOGLE_CLIENT_ID.indexOf('REPLACE_WITH') !== 0; }
    function authValid() { return !!(auth && auth.token && auth.exp && auth.exp * 1000 - 60000 > Date.now()); }
    function canSync() { return !!sync.key || authValid(); }
    // Credentials attached to every load/save. The signed-in identity wins so
    // edits are attributed to a real person; the team key is the fallback door.
    function creds() {
      if (authValid()) return { idToken: auth.token };
      if (sync.key) return { key: sync.key };
      return {};
    }
    function initGsi() {
      if (!gsiConfigured() || !window.google || !google.accounts || !google.accounts.id) return false;
      if (!initGsi.done) {
        google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential, auto_select: true });
        initGsi.done = true;
      }
      return true;
    }
    function renderGsiButton(elId) {
      if (!initGsi() || !$(elId)) return;
      google.accounts.id.renderButton($(elId), { theme: 'outline', size: 'large', shape: 'pill', text: 'signin_with', width: 260 });
    }
    function handleGoogleCredential(resp) {
      var claims;
      try { claims = decodeJwt(resp.credential); } catch (e) { toast('Sign-in failed — try again'); return; }
      var email = String(claims.email || '').toLowerCase();
      if (claims.hd !== ALLOWED_DOMAIN && email.slice(-(ALLOWED_DOMAIN.length + 1)) !== '@' + ALLOWED_DOMAIN) {
        toast('Please use your @' + ALLOWED_DOMAIN + ' account'); return;
      }
      auth = { token: resp.credential, email: email, name: claims.name || email,
        given: claims.given_name || '', picture: claims.picture || '', exp: claims.exp };
      try { localStorage.setItem(LS_AUTH, JSON.stringify(auth)); } catch (e) {}
      ensureGoogleMember();
      closeModal();
      render();
      pullLoad(true);
      toast('Signed in as ' + auth.name);
    }
    // Match the signed-in person to a member record (by email, then by an
    // unclaimed member with the same first name — covers the seeded "Scott"),
    // creating one if needed. Their Google name & photo flow onto it.
    function ensureGoogleMember() {
      if (!auth) return;
      var m = doc.members.find(function (x) { return (x.email || '').toLowerCase() === auth.email; });
      if (!m && auth.given) {
        m = doc.members.find(function (x) {
          return !x.email && x.name.split(/\s+/)[0].toLowerCase() === auth.given.toLowerCase(); });
      }
      var changed = false;
      if (!m) {
        m = { id: uid(), name: auth.name, color: AVA_COLORS[doc.members.length % AVA_COLORS.length],
          email: auth.email, photo: auth.picture };
        doc.members.push(m); changed = true;
      } else if (m.email !== auth.email || m.name !== auth.name || m.photo !== auth.picture) {
        m.email = auth.email; m.name = auth.name; m.photo = auth.picture; changed = true;
      }
      meId = m.id; localStorage.setItem(LS_ME, meId);
      if (changed) mutate({ noRender: true });
    }
    function signOutGoogle() {
      auth = null; localStorage.removeItem(LS_AUTH);
      try { if (initGsi.done) google.accounts.id.disableAutoSelect(); } catch (e) {}
      if (!sync.key) setSyncStatus('local');
      closeModal(); render();
      toast('Signed out');
    }
    // The backend answers 'Invalid token' when the ~1h Google token lapses:
    // drop it and let One Tap re-issue silently (auto_select), else re-prompt.
    function handleAuthExpiry() {
      auth = null; localStorage.removeItem(LS_AUTH);
      if (initGsi()) { try { google.accounts.id.prompt(); } catch (e) {} }
      setSyncStatus(sync.key ? 'busy' : 'error', sync.key ? null : 'Signed out');
      if (sync.key) { pullLoad(false); } else { toast('Session expired — sign in again from the sidebar'); }
    }

    // ========================== SYNC LAYER =================================
    function setSyncStatus(status, label) {
      sync.status = status;
      var dot = $('syncDot'), lab = $('syncLabel');
      dot.className = 'sync-dot' + (status === 'synced' ? ' on' : status === 'error' ? ' err' : status === 'busy' ? ' busy' : '');
      lab.textContent = label || (status === 'synced' ? 'Synced' : status === 'busy' ? 'Syncing…' : status === 'error' ? 'Sync error' : 'Local only');
    }
    function schedulePush() {
      if (!canSync()) return;
      clearTimeout(sync.pushTimer);
      sync.pushTimer = setTimeout(pushSave, 1200);
    }
    function pushSave() {
      if (!canSync() || sync.pushing) { if (sync.pushing) schedulePush(); return; }
      sync.pushing = true; sync.dirty = false;
      setSyncStatus('busy');
      fetch('/api/board', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: 'save', baseVersion: sync.serverVersion,
          author: me() ? me().name : '', data: doc }, creds()))
      }).then(function (r) { return r.json(); }).then(function (res) {
        sync.pushing = false;
        if (res.result === 'success') {
          sync.serverVersion = res.version;
          setSyncStatus(sync.dirty ? 'busy' : 'synced');
          if (sync.dirty) schedulePush();
        } else if (res.result === 'conflict') {
          // A teammate saved first — merge their document with ours and re-push.
          sync.serverVersion = res.version;
          doc = mergeDocs(doc, res.data || seedDoc());
          migrate();
          persistLocal(); render();
          sync.dirty = true; schedulePush();
          toast('Merged changes from ' + (res.updatedBy || 'a teammate'));
        } else if (String(res.error || '') === 'Invalid token') {
          sync.dirty = true; handleAuthExpiry();
        } else {
          setSyncStatus('error', res.error === 'Invalid access key' ? 'Wrong key' : 'Sync error');
        }
      }).catch(function () { sync.pushing = false; setSyncStatus('error'); });
    }
    function pullLoad(first) {
      if (!canSync()) return;
      setSyncStatus('busy');
      fetch('/api/board', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: 'load' }, creds()))
      })
        .then(function (r) {
          if (r.status === 503) { sync.configured = false; throw new Error('unconfigured'); }
          sync.configured = true; return r.json();
        })
        .then(function (res) {
          if (res.result !== 'success') {
            if (String(res.error || '') === 'Invalid token') { handleAuthExpiry(); return; }
            setSyncStatus('error', String(res.error || '').indexOf('key') > -1 ? 'Wrong key' : 'Sync error');
            return;
          }
          if (res.version === 0 || !res.data) {
            // First device to connect: publish the local workspace.
            sync.serverVersion = 0; sync.dirty = true; pushSave();
            return;
          }
          if (res.version !== sync.serverVersion || first) {
            doc = sync.dirty ? mergeDocs(doc, res.data) : res.data;
            migrate();
            sync.serverVersion = res.version;
            if (authValid()) ensureGoogleMember(); // the shared doc may not know me yet
            if (!board()) ui.boardId = doc.boards[0] && doc.boards[0].id;
            if (ui.view === 'page' && !page()) ui.view = 'board';
            persistLocal(); render();
            if (sync.dirty) { schedulePush(); return; }
          }
          setSyncStatus(sync.dirty ? 'busy' : 'synced');
        })
        .catch(function (e) {
          if (String(e.message) === 'unconfigured') setSyncStatus('local', 'Sync not set up');
          else setSyncStatus('error');
        });
    }
    // Merge two workspace documents. Item-level: newer updatedAt wins; unions
    // creations from both sides; tombstones stop deleted things resurrecting.
    function mergeDocs(a, b) {
      var out = clone(b);
      out.tombstones = out.tombstones || {};
      out.pages = out.pages || [];
      var tombs = out.tombstones;
      Object.keys(a.tombstones || {}).forEach(function (id) {
        if (!tombs[id] || a.tombstones[id] > tombs[id]) tombs[id] = a.tombstones[id];
      });
      (a.members || []).forEach(function (m) {
        var om = out.members.find(function (x) { return x.id === m.id; });
        if (!om && !tombs[m.id]) { out.members.push(clone(m)); return; }
        // A Google sign-in may have enriched this member on one side only.
        if (om && m.email && !om.email) { om.email = m.email; om.name = m.name; om.photo = m.photo || ''; }
      });
      // Pages: union by id, newest edit wins.
      (a.pages || []).forEach(function (ap) {
        var op = out.pages.find(function (x) { return x.id === ap.id; });
        if (!op) out.pages.push(clone(ap));
        else if ((ap.updatedAt || 0) > (op.updatedAt || 0)) out.pages[out.pages.indexOf(op)] = clone(ap);
      });
      out.pages = out.pages.filter(function (p) { return !(tombs[p.id] && tombs[p.id] > (p.updatedAt || 0)); });
      (a.boards || []).forEach(function (ab) {
        if (tombs[ab.id] && tombs[ab.id] > (ab.updatedAt || 0)) return;
        var ob = out.boards.find(function (x) { return x.id === ab.id; });
        if (!ob) { out.boards.push(clone(ab)); return; }
        var aNewer = (ab.updatedAt || 0) > (ob.updatedAt || 0);
        var structure = aNewer ? ab : ob;      // columns + card ordering
        // Union cards by id, newest edit wins.
        var byId = {};
        ob.cards.forEach(function (c) { byId[c.id] = c; });
        ab.cards.forEach(function (c) {
          if (!byId[c.id] || (c.updatedAt || 0) > (byId[c.id].updatedAt || 0)) byId[c.id] = clone(c);
        });
        Object.keys(tombs).forEach(function (id) {
          if (byId[id] && tombs[id] > (byId[id].updatedAt || 0)) delete byId[id];
        });
        var ordered = [];
        structure.cards.forEach(function (c) { if (byId[c.id]) { ordered.push(byId[c.id]); delete byId[c.id]; } });
        Object.keys(byId).forEach(function (id) { ordered.push(byId[id]); });
        ob.name = structure.name; ob.icon = structure.icon;
        ob.columns = clone(structure.columns); ob.updatedAt = structure.updatedAt;
        // Cards pointing at a column that no longer exists land in the first one.
        var colIds = {}; ob.columns.forEach(function (c) { colIds[c.id] = true; });
        ordered.forEach(function (c) { if (!colIds[c.colId] && ob.columns[0]) c.colId = ob.columns[0].id; });
        ob.cards = ordered;
      });
      // Drop tombstoned boards/members that survived the copy from b.
      out.boards = out.boards.filter(function (bd) { return !(tombs[bd.id] && tombs[bd.id] > (bd.updatedAt || 0)); });
      out.members = out.members.filter(function (m) { return !tombs[m.id]; });
      out.updatedAt = Math.max(a.updatedAt || 0, b.updatedAt || 0);
      return out;
    }
    function entomb(id) { doc.tombstones[id] = now(); pruneTombstones(); }
    function pruneTombstones() {
      var cutoff = now() - 90 * 86400000;
      Object.keys(doc.tombstones).forEach(function (id) { if (doc.tombstones[id] < cutoff) delete doc.tombstones[id]; });
    }

    // =========================== NAVIGATION ================================
    function openBoard(id) {
      ui.boardId = id; ui.pageId = null;
      if (ui.view === 'page') ui.view = 'board';
      quickAddCol = null;
      persistLocal(); render(); closeSidebarOnMobile();
    }
    function openPage(id, edit) {
      ui.pageId = id; ui.view = 'page'; ui.pageEdit = !!edit;
      persistLocal(); render(); closeSidebarOnMobile();
    }

    // =========================== RENDERING =================================
    function render() { renderSidebar(); renderTopbar(); renderView(); }

    function renderSidebar() {
      $('wsName').textContent = doc.workspace || 'FinMango HQ';
      var list = $('boardList'); list.innerHTML = '';
      doc.boards.forEach(function (b) {
        var btn = document.createElement('button');
        btn.className = 'side-item' + (b.id === ui.boardId && !inPageMode() ? ' active' : '');
        btn.innerHTML = '<span class="emoji">' + esc(b.icon || '📋') + '</span><span class="label">' + esc(b.name)
          + '</span><span class="count">' + b.cards.length + '</span>';
        btn.onclick = function () { openBoard(b.id); };
        list.appendChild(btn);
      });
      var plist = $('pageList'); plist.innerHTML = '';
      (doc.pages || []).forEach(function (p) {
        var btn = document.createElement('button');
        btn.className = 'side-item' + (inPageMode() && p.id === ui.pageId ? ' active' : '');
        btn.innerHTML = '<span class="emoji">' + esc(p.icon || '📄') + '</span><span class="label">' + esc(p.title)
          + '</span>' + (p.public ? '<span class="count" title="On the public roadmap page">🌐</span>' : '');
        btn.onclick = function () { openPage(p.id); };
        plist.appendChild(btn);
      });
      $('app').classList.toggle('sidebar-closed', ui.sidebarClosed);
    }

    function renderTopbar() {
      var pageMode = inPageMode();
      $('topbar').classList.toggle('page-mode', pageMode);
      if (pageMode) {
        var p = page();
        $('boardEmoji').textContent = p.icon || '📄';
        $('boardNameInput').value = p.title;
        $('pageReadBtn').classList.toggle('active', !ui.pageEdit);
        $('pageEditBtn').classList.toggle('active', ui.pageEdit);
      } else {
        var b = board();
        $('boardEmoji').textContent = b ? (b.icon || '📋') : '📋';
        $('boardNameInput').value = b ? b.name : '';
        $('viewBoardBtn').classList.toggle('active', ui.view === 'board');
        $('viewTableBtn').classList.toggle('active', ui.view === 'table');
        $('agendaBtn').classList.toggle('on', ui.agenda);
      }
      // Assignee filter options
      var fa = $('filterAssignee');
      var cur = ui.fAssignee;
      fa.innerHTML = '<option value="">Assignee</option><option value="__none">Unassigned</option>'
        + doc.members.map(function (m) { return '<option value="' + esc(m.id) + '">' + esc(m.name) + '</option>'; }).join('');
      fa.value = cur; fa.classList.toggle('on', !!cur);
      $('filterPriority').classList.toggle('on', !!ui.fPriority);
      // Member avatars
      var tv = $('topAvatars'); tv.innerHTML = '';
      doc.members.slice(0, 5).forEach(function (m) {
        var el = document.createElement('button');
        el.className = 'avatar'; el.style.background = m.color;
        el.innerHTML = esc(initials(m.name)) + (m.photo
          ? '<img src="' + esc(m.photo) + '" alt="" referrerpolicy="no-referrer" onerror="this.remove()">' : '');
        el.title = m.name + (m.id === meId ? ' (you)' : '');
        el.onclick = openMembersModal;
        tv.appendChild(el);
      });
      if (doc.members.length > 5) {
        var more = document.createElement('button'); more.className = 'avatar more';
        more.textContent = '+' + (doc.members.length - 5); more.onclick = openMembersModal; tv.appendChild(more);
      }
    }

    function visibleCards(b) {
      var q = ui.search.trim().toLowerCase();
      var nowColIds = {};
      if (ui.agenda) {
        b.columns.forEach(function (c) { if (/^now\b/i.test(c.name.trim())) nowColIds[c.id] = true; });
      }
      return b.cards.filter(function (c) {
        if (ui.agenda && !c.discuss && !nowColIds[c.colId]) return false;
        if (ui.fAssignee === '__none' && c.assignee) return false;
        if (ui.fAssignee && ui.fAssignee !== '__none' && c.assignee !== ui.fAssignee) return false;
        if (ui.fPriority && c.priority !== ui.fPriority) return false;
        if (q) {
          var hay = (c.title + ' ' + c.desc + ' ' + c.tags.join(' ')).toLowerCase();
          if (hay.indexOf(q) === -1) return false;
        }
        return true;
      });
    }

    function renderView() {
      var root = $('viewRoot'); root.innerHTML = '';
      if (inPageMode()) { renderPage(root, page()); return; }
      var b = board();
      if (!b) {
        root.innerHTML = '<div class="empty"><div><p style="font-size:2rem;">🗂️</p><p style="margin-top:.5rem;font-weight:600;">No boards yet</p>'
          + '<p style="font-size:.85rem;margin-top:.25rem;">Create one from the sidebar.</p></div></div>';
        return;
      }
      if (ui.view === 'table') renderTable(root, b); else renderBoard(root, b);
    }

    // --------------------------- page view ---------------------------------
    function renderPage(root, p) {
      var scroll = document.createElement('div'); scroll.className = 'page-scroll';
      var wrap = document.createElement('div'); wrap.className = 'page-wrap';

      var meta = document.createElement('div'); meta.className = 'page-meta';
      meta.innerHTML = '<span class="page-badge' + (p.public ? ' pub' : '') + '">' + (p.public ? '🌐 public' : '🔒 team only') + '</span>'
        + '<span class="meta-line">edited ' + esc(relTime(p.updatedAt)) + '</span>';
      wrap.appendChild(meta);

      if (ui.pageEdit) {
        var ta = document.createElement('textarea');
        ta.className = 'page-editor';
        ta.value = p.body;
        ta.placeholder = '# Start writing…\n\nMarkdown works: # headings, **bold**, - lists, [links](https://…), [[Other Page]] wikilinks, ``` code blocks.';
        ta.addEventListener('input', function () {
          p.body = ta.value; p.updatedAt = now();
          mutate({ noRender: true });
        });
        wrap.appendChild(ta);
        setTimeout(function () { ta.focus(); }, 0);
      } else {
        var mdiv = document.createElement('div'); mdiv.className = 'md';
        mdiv.innerHTML = p.body.trim() ? mdRender(p.body)
          : '<p class="page-empty-hint">This page is empty — hit <strong>Edit</strong> (top right) to start writing.</p>';
        // wikilink navigation (and create-on-click for missing targets)
        mdiv.addEventListener('click', function (e) {
          var a = e.target.closest ? e.target.closest('a.wikilink') : null;
          if (!a) return;
          e.preventDefault();
          var name = a.getAttribute('data-wiki');
          var target = pageByTitle(name);
          if (target) { openPage(target.id); return; }
          if (confirm('Create the page "' + name + '"?')) {
            var np = { id: uid(), icon: '📄', title: name, body: '', public: false, createdAt: now(), updatedAt: now() };
            doc.pages.push(np);
            mutate({ noRender: true });
            openPage(np.id, true);
          }
        });
        wrap.appendChild(mdiv);
      }
      scroll.appendChild(wrap); root.appendChild(scroll);
    }

    // --------------------------- board view --------------------------------
    function renderBoard(root, b) {
      var scroll = document.createElement('div'); scroll.className = 'board-scroll';
      var wrap = document.createElement('div'); wrap.className = 'board';
      var cards = visibleCards(b);

      b.columns.forEach(function (col) {
        var colEl = document.createElement('div'); colEl.className = 'col'; colEl.dataset.colId = col.id;
        var colCards = cards.filter(function (c) { return c.colId === col.id; });

        var head = document.createElement('div'); head.className = 'col-head'; head.draggable = true;
        head.innerHTML = '<span class="col-dot" style="background:' + esc(col.color) + '"></span>'
          + '<span class="col-name">' + esc(col.name) + '</span><span class="col-count">' + colCards.length + '</span>'
          + '<span class="spacer"></span>';
        var menuBtn = document.createElement('button'); menuBtn.className = 'icon-btn'; menuBtn.textContent = '⋯';
        menuBtn.title = 'Column options';
        menuBtn.onclick = function (e) { e.stopPropagation(); openColumnModal(col.id); };
        var addBtn = document.createElement('button'); addBtn.className = 'icon-btn'; addBtn.textContent = '＋';
        addBtn.title = 'New card';
        addBtn.onclick = function (e) { e.stopPropagation(); quickAddCol = col.id; render(); };
        head.appendChild(menuBtn); head.appendChild(addBtn);
        head.addEventListener('dragstart', function (e) {
          drag = { type: 'col', id: col.id }; e.dataTransfer.effectAllowed = 'move';
          try { e.dataTransfer.setData('text/plain', col.id); } catch (err) {}
        });
        head.addEventListener('dragend', function () { drag = null; clearDropHints(); });
        colEl.appendChild(head);

        var body = document.createElement('div'); body.className = 'col-body'; body.dataset.colId = col.id;
        colCards.forEach(function (c) { body.appendChild(cardEl(c)); });

        if (quickAddCol === col.id) body.appendChild(quickAddEl(b, col));
        colEl.appendChild(body);

        if (quickAddCol !== col.id) {
          var add = document.createElement('button'); add.className = 'add-card-btn';
          add.innerHTML = '＋ <span>New</span>';
          add.onclick = function () { quickAddCol = col.id; render(); };
          colEl.appendChild(add);
        }

        // Drop targets: cards into this column, or a column dragged over it.
        body.addEventListener('dragover', function (e) {
          if (!drag || drag.type !== 'card') return;
          e.preventDefault(); e.dataTransfer.dropEffect = 'move';
          showDropHint(body, e.clientY);
        });
        body.addEventListener('drop', function (e) {
          if (!drag || drag.type !== 'card') return;
          e.preventDefault();
          dropCard(b, drag.id, col.id, dropIndexFor(body, e.clientY));
        });
        colEl.addEventListener('dragover', function (e) {
          if (drag && drag.type === 'col' && drag.id !== col.id) { e.preventDefault(); colEl.classList.add('drag-over-col'); }
          if (drag && drag.type === 'card') e.preventDefault();
        });
        colEl.addEventListener('dragleave', function () { colEl.classList.remove('drag-over-col'); });
        colEl.addEventListener('drop', function (e) {
          colEl.classList.remove('drag-over-col');
          if (drag && drag.type === 'col' && drag.id !== col.id) { e.preventDefault(); dropColumn(b, drag.id, col.id); }
          else if (drag && drag.type === 'card') { e.preventDefault(); dropCard(b, drag.id, col.id, dropIndexFor(body, e.clientY)); }
        });

        wrap.appendChild(colEl);
      });

      // "+ Add column"
      var addCol = document.createElement('div'); addCol.className = 'add-col';
      var acBtn = document.createElement('button'); acBtn.textContent = '＋ Add column';
      acBtn.onclick = function () {
        var name = prompt('Column name'); if (!name || !name.trim()) return;
        b.columns.push({ id: uid(), name: name.trim(), color: COL_COLORS[b.columns.length % COL_COLORS.length] });
        b.updatedAt = now(); mutate();
      };
      addCol.appendChild(acBtn); wrap.appendChild(addCol);

      scroll.appendChild(wrap); root.appendChild(scroll);
    }

    function cardEl(c) {
      var el = document.createElement('div'); el.className = 'card'; el.draggable = true; el.dataset.cardId = c.id;
      var html = '<div class="card-title">' + esc(c.title) + '</div>';
      if (c.desc) html += '<div class="card-desc-hint">' + esc(c.desc.split('\n')[0]) + '</div>';
      if (c.tags.length) {
        html += '<div class="card-tags">' + c.tags.map(function (t) {
          var tc = tagColor(t);
          return '<span class="tag" style="background:' + tc[0] + ';color:' + tc[1] + '">' + esc(t) + '</span>';
        }).join('') + '</div>';
      }
      var foot = '';
      var m = c.assignee ? member(c.assignee) : null;
      if (m) foot += avatarHtml(m);
      var due = fmtDue(c.due);
      if (due) foot += '<span class="due ' + due.cls + '">🗓 ' + esc(due.label) + '</span>';
      if (c.comments.length) foot += '<span class="comments-n">💬 ' + c.comments.length + '</span>';
      if (c.discuss) foot += '<span class="mini-badge" title="Flagged for the next leadership call">📞</span>';
      if (c.public) foot += '<span class="mini-badge" title="Shown on the public roadmap page">🌐</span>';
      if (c.priority && PRIO[c.priority]) foot += '<span class="prio" style="color:' + PRIO[c.priority][1] + '">' + PRIO[c.priority][0] + '</span>';
      if (foot) html += '<div class="card-foot">' + foot + '</div>';
      el.innerHTML = html;
      el.onclick = function () { openCardModal(c.id); };
      el.addEventListener('dragstart', function (e) {
        drag = { type: 'card', id: c.id }; el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', c.id); } catch (err) {}
        e.stopPropagation();
      });
      el.addEventListener('dragend', function () { el.classList.remove('dragging'); drag = null; clearDropHints(); });
      return el;
    }

    function quickAddEl(b, col) {
      var box = document.createElement('div'); box.className = 'quick-add';
      var ta = document.createElement('textarea'); ta.rows = 2; ta.placeholder = 'Card title…';
      var row = document.createElement('div'); row.className = 'quick-add-row';
      var addB = document.createElement('button'); addB.className = 'btn-sm primary'; addB.textContent = 'Add card';
      var cancelB = document.createElement('button'); cancelB.className = 'btn-sm ghost'; cancelB.textContent = 'Cancel';
      function commit() {
        var t = ta.value.trim();
        if (t) {
          b.cards.push({ id: uid(), colId: col.id, title: t, desc: '', assignee: '', due: '', priority: '',
            tags: [], comments: [], discuss: false, public: false, createdAt: now(), updatedAt: now() });
          b.updatedAt = now();
          mutate({ noRender: true });
        }
        ta.value = '';
        render();
        // keep the quick-add open for rapid entry
        var again = document.querySelector('.col-body[data-col-id="' + col.id + '"] .quick-add textarea');
        if (again) again.focus();
      }
      addB.onclick = commit;
      cancelB.onclick = function () { quickAddCol = null; render(); };
      ta.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { quickAddCol = null; render(); }
      });
      row.appendChild(addB); row.appendChild(cancelB);
      box.appendChild(ta); box.appendChild(row);
      setTimeout(function () { ta.focus(); }, 0);
      return box;
    }

    // Drag-and-drop helpers -------------------------------------------------
    function cardNodes(body) {
      return Array.prototype.filter.call(body.children, function (n) {
        return n.classList.contains('card') && !n.classList.contains('dragging');
      });
    }
    function dropIndexFor(body, y) {
      var nodes = cardNodes(body);
      for (var i = 0; i < nodes.length; i++) {
        var r = nodes[i].getBoundingClientRect();
        if (y < r.top + r.height / 2) return i;
      }
      return nodes.length;
    }
    function clearDropHints() {
      document.querySelectorAll('.drop-hint').forEach(function (n) { n.remove(); });
    }
    function showDropHint(body, y) {
      clearDropHints();
      var hint = document.createElement('div'); hint.className = 'drop-hint';
      var nodes = cardNodes(body), idx = dropIndexFor(body, y);
      if (idx >= nodes.length) body.appendChild(hint);
      else body.insertBefore(hint, nodes[idx]);
    }
    function dropCard(b, cardId, colId, visIndex) {
      clearDropHints();
      var card = b.cards.find(function (c) { return c.id === cardId; });
      if (!card) return;
      // visIndex counts only *visible* cards in the target column; translate it
      // into a position in the full cards array.
      var vis = visibleCards(b).filter(function (c) { return c.colId === colId && c.id !== cardId; });
      b.cards.splice(b.cards.indexOf(card), 1);
      card.colId = colId; card.updatedAt = now();
      var insertAt;
      if (visIndex >= vis.length) {
        var last = vis.length ? b.cards.indexOf(vis[vis.length - 1]) : -1;
        insertAt = last >= 0 ? last + 1 : b.cards.length;
      } else {
        insertAt = b.cards.indexOf(vis[visIndex]);
      }
      b.cards.splice(insertAt, 0, card);
      b.updatedAt = now();
      drag = null;
      mutate();
    }
    function dropColumn(b, dragId, targetId) {
      var from = b.columns.findIndex(function (c) { return c.id === dragId; });
      var to = b.columns.findIndex(function (c) { return c.id === targetId; });
      if (from < 0 || to < 0 || from === to) return;
      var col = b.columns.splice(from, 1)[0];
      b.columns.splice(to, 0, col);
      b.updatedAt = now();
      drag = null;
      mutate();
    }

    // --------------------------- table view --------------------------------
    function renderTable(root, b) {
      var scroll = document.createElement('div'); scroll.className = 'table-scroll';
      var cards = visibleCards(b);
      var html = '<table class="props"><thead><tr><th style="width:38%">Name</th><th>Status</th><th>Assignee</th>'
        + '<th>Due</th><th>Priority</th><th>Tags</th><th>Updated</th></tr></thead><tbody>';
      b.columns.forEach(function (col) {
        var rows = cards.filter(function (c) { return c.colId === col.id; });
        if (!rows.length) return;
        html += '<tr><td colspan="7" class="table-group"><span class="col-dot" style="display:inline-block;background:'
          + esc(col.color) + ';margin-right:.45rem;"></span>' + esc(col.name)
          + ' <span class="col-count">' + rows.length + '</span></td></tr>';
        rows.forEach(function (c) {
          var m = c.assignee ? member(c.assignee) : null;
          var due = fmtDue(c.due);
          html += '<tr class="rowcard" data-card-id="' + esc(c.id) + '">'
            + '<td style="font-weight:600;">' + esc(c.title)
              + (c.discuss ? ' <span class="mini-badge" title="Flagged for next call">📞</span>' : '')
              + (c.public ? ' <span class="mini-badge" title="Public">🌐</span>' : '') + '</td>'
            + '<td><span class="status-chip"><span class="col-dot" style="background:' + esc(col.color) + '"></span>' + esc(col.name) + '</span></td>'
            + '<td>' + (m ? '<span class="cell-assignee">' + avatarHtml(m) + esc(m.name) + '</span>'
              : '<span style="color:var(--ink-faint)">—</span>') + '</td>'
            + '<td>' + (due ? '<span class="due ' + due.cls + '">' + esc(due.label) + '</span>' : '<span style="color:var(--ink-faint)">—</span>') + '</td>'
            + '<td>' + (c.priority && PRIO[c.priority] ? '<span class="prio" style="color:' + PRIO[c.priority][1] + '">' + PRIO[c.priority][0] + '</span>' : '<span style="color:var(--ink-faint)">—</span>') + '</td>'
            + '<td>' + c.tags.map(function (t) { var tc = tagColor(t);
                return '<span class="tag" style="background:' + tc[0] + ';color:' + tc[1] + ';margin-right:.25rem;">' + esc(t) + '</span>'; }).join('') + '</td>'
            + '<td><span class="mono" style="text-transform:none;letter-spacing:0;">' + esc(relTime(c.updatedAt)) + '</span></td></tr>';
        });
      });
      html += '</tbody></table>';
      if (!cards.length) html = '<div class="empty" style="padding-top:4rem;"><div><p style="font-size:2rem;">🔍</p><p style="margin-top:.5rem;">Nothing matches.</p></div></div>';
      scroll.innerHTML = html;
      scroll.querySelectorAll('tr.rowcard').forEach(function (tr) {
        tr.onclick = function () { openCardModal(tr.dataset.cardId); };
      });
      root.appendChild(scroll);
    }

    // ============================ MODALS ===================================
    function openModal(html, narrow) {
      var box = $('modalBox');
      box.className = 'modal' + (narrow ? ' narrow' : '');
      box.innerHTML = '<button class="icon-btn modal-close" id="modalClose" aria-label="Close">✕</button>' + html;
      $('modalClose').onclick = closeModal;
      $('overlay').classList.add('open');
    }
    function closeModal() { $('overlay').classList.remove('open'); $('modalBox').innerHTML = ''; }
    $('overlay').addEventListener('mousedown', function (e) { if (e.target === $('overlay')) closeModal(); });

    // --------------------------- card modal --------------------------------
    function openCardModal(cardId) {
      var b = board(); if (!b) return;
      var c = b.cards.find(function (x) { return x.id === cardId; }); if (!c) return;

      function touch() { c.updatedAt = now(); b.updatedAt = now(); mutate({ noRender: true }); }

      var html = '<input class="m-title" id="cTitle" value="' + esc(c.title) + '" aria-label="Card title" />'
        + '<div class="prop-grid">'
        + '<label>Status</label><select id="cStatus">' + b.columns.map(function (col) {
            return '<option value="' + esc(col.id) + '"' + (col.id === c.colId ? ' selected' : '') + '>' + esc(col.name) + '</option>'; }).join('') + '</select>'
        + '<label>Assignee</label><select id="cAssignee"><option value="">Unassigned</option>' + doc.members.map(function (m) {
            return '<option value="' + esc(m.id) + '"' + (m.id === c.assignee ? ' selected' : '') + '>' + esc(m.name) + '</option>'; }).join('') + '</select>'
        + '<label>Due date</label><input type="date" id="cDue" value="' + esc(c.due) + '" />'
        + '<label>Priority</label><select id="cPrio"><option value="">None</option>'
          + ['low', 'medium', 'high', 'urgent'].map(function (p) {
            return '<option value="' + p + '"' + (p === c.priority ? ' selected' : '') + '>' + p.charAt(0).toUpperCase() + p.slice(1) + '</option>'; }).join('') + '</select>'
        + '<label>Tags</label><input id="cTags" placeholder="comma, separated" value="' + esc(c.tags.join(', ')) + '" />'
        + '<label>Next call</label><label class="check-row"><input type="checkbox" id="cDiscuss"' + (c.discuss ? ' checked' : '') + '> 📞 Discuss at next leadership call</label>'
        + '<label>Visibility</label><label class="check-row"><input type="checkbox" id="cPublic"' + (c.public ? ' checked' : '') + '> 🌐 Show on the public roadmap <span class="hint">(title, notes &amp; tags only)</span></label>'
        + '</div>'
        + '<div class="m-section">Notes</div>'
        + '<textarea class="m-desc" id="cDesc" placeholder="Add details… (everyone on the board can see this)">' + esc(c.desc) + '</textarea>'
        + '<div class="m-section">Comments</div>'
        + '<div id="cComments"></div>'
        + '<div class="comment-row"><input id="cCommentInput" placeholder="Write a comment… (never shown publicly)" />'
        + '<button class="btn-sm primary" id="cCommentAdd">Send</button></div>'
        + '<div class="modal-foot"><span class="meta-line">created ' + esc(relTime(c.createdAt)) + ' · edited ' + esc(relTime(c.updatedAt)) + '</span>'
        + '<button class="btn-sm danger" id="cDelete">Delete card</button></div>';
      openModal(html);

      function renderComments() {
        $('cComments').innerHTML = c.comments.length ? c.comments.map(function (cm) {
          return '<div class="comment">' + avatarHtml({ name: cm.author, color: cm.color, photo: cm.photo })
            + '<div class="body"><span class="who">' + esc(cm.author)
            + '</span><span class="when">' + esc(relTime(cm.ts)) + '</span><div class="text">' + esc(cm.text) + '</div></div></div>';
        }).join('') : '<p style="font-size:.82rem;color:var(--ink-faint);">No comments yet.</p>';
      }
      renderComments();

      $('cTitle').oninput = function () { c.title = this.value; touch(); };
      $('cTitle').onblur = function () { if (!c.title.trim()) { c.title = 'Untitled'; touch(); } render(); };
      $('cStatus').onchange = function () { c.colId = this.value; touch(); render(); };
      $('cAssignee').onchange = function () { c.assignee = this.value; touch(); render(); };
      $('cDue').onchange = function () { c.due = this.value; touch(); render(); };
      $('cPrio').onchange = function () { c.priority = this.value; touch(); render(); };
      $('cTags').onchange = function () {
        c.tags = this.value.split(',').map(function (t) { return t.trim(); }).filter(Boolean).slice(0, 8);
        touch(); render();
      };
      $('cDiscuss').onchange = function () { c.discuss = this.checked; touch(); render(); };
      $('cPublic').onchange = function () { c.public = this.checked; touch(); render(); };
      $('cDesc').oninput = function () { c.desc = this.value; touch(); };
      $('cDesc').onblur = function () { render(); };
      function addComment() {
        var v = $('cCommentInput').value.trim(); if (!v) return;
        var m = me();
        c.comments.push({ id: uid(), author: m ? m.name : 'Someone', color: m ? m.color : '#9A9A93',
          photo: m && m.photo ? m.photo : '', text: v, ts: now() });
        $('cCommentInput').value = '';
        touch(); renderComments(); render();
      }
      $('cCommentAdd').onclick = addComment;
      $('cCommentInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') addComment(); });
      $('cDelete').onclick = function () {
        if (!confirm('Delete "' + c.title + '"?')) return;
        entomb(c.id);
        b.cards.splice(b.cards.indexOf(c), 1);
        b.updatedAt = now();
        closeModal(); mutate();
      };
    }

    // --------------------------- column modal ------------------------------
    function openColumnModal(colId) {
      var b = board(); if (!b) return;
      var col = b.columns.find(function (x) { return x.id === colId; }); if (!col) return;
      var html = '<h2>Edit column</h2>'
        + '<label class="field-label">Name</label><input class="text-input" id="colName" value="' + esc(col.name) + '" />'
        + '<label class="field-label">Color</label><div class="color-row" id="colColors">'
        + COL_COLORS.map(function (cc) {
            return '<button data-c="' + cc + '" class="' + (cc === col.color ? 'sel' : '') + '" style="background:' + cc + '" aria-label="color"></button>'; }).join('')
        + '</div>'
        + '<div class="modal-foot"><button class="btn-sm danger" id="colDelete">Delete column</button>'
        + '<button class="btn-sm primary" id="colSave">Save</button></div>';
      openModal(html, true);
      var picked = col.color;
      $('colColors').querySelectorAll('button').forEach(function (btn) {
        btn.onclick = function () {
          picked = btn.dataset.c;

          btn.classList.add('sel');
        };
      });

        col.color = picked;

        closeModal(); mutate();
      };
      $('colDelete').onclick = function () {
        var cardsIn = b.cards.filter(function (c) { return c.colId === col.id; });
        if (b.columns.length === 1) { toast('A board needs at least one column'); return; }
        var msg = cardsIn.length
          ? 'Delete "' + col.name + '"? Its ' + cardsIn.length + ' card(s) move to the first column.'
          : 'Delete "' + col.name + '"?';
        if (!confirm(msg)) return;
        b.columns.splice(b.columns.indexOf(col), 1);
        var first = b.columns[0];
        cardsIn.forEach(function (c) { c.colId = first.id; c.updatedAt = now(); });
        b.updatedAt = now();
        closeModal(); mutate();
      };

    // --------------------------- members modal -----------------------------

    // --------------------------- sync modal --------------------------------
    function openSyncModal() {
      var status;
      if (!canSync()) status = 'Not connected — this workspace lives only in this browser.';
      else if (sync.configured === false) status = 'The sync backend isn\'t deployed yet (see below).';
      else if (sync.status === 'synced') status = '✅ Connected — the whole team sees this workspace.';
      else if (sync.status === 'error') status = '⚠️ Connection trouble — check your access, or try again.';
      else status = 'Connecting…';
      var html = '<h2>Access &amp; sync</h2>'
        + '<p class="help-note">' + esc(status) + '</p>'
        + '<div class="m-section">Sign in with FinMango</div>'
        + (authValid()
          ? '<div class="signed-in-row">' + avatarHtml({ name: auth.name, color: '#FF6B35', photo: auth.picture }, 'margin:0;')
            + '<span class="who"><span class="n">' + esc(auth.name) + '</span><br><span class="e">' + esc(auth.email) + '</span></span>'
            + '<button class="btn-sm ghost" id="gsiSignOut">Sign out</button></div>'
          : gsiConfigured()
            ? '<div class="gsi-wrap" id="gsiBtnSync"></div>'
              + '<p class="help-note">For @' + esc(ALLOWED_DOMAIN) + ' accounts — your name and photo carry over automatically, no key needed.</p>'
            : '<p class="help-note">Not configured yet — see the Google Sign-In section of <code>docs/TEAM-BOARD-SETUP.md</code>.</p>')
        + '<div class="m-section">Team key (fallback)</div>'
        + '<input class="text-input" id="syncKey" type="password" placeholder="Shared team passphrase" value="' + esc(sync.key) + '" />'
        + '<p class="help-note">A shared passphrase for access without a FinMango account — ask Scott. Note: names and photos come from Google sign-in, so key-only edits aren\'t attributed to a person.</p>'
        + '<p class="help-note">Either door syncs every change to a shared Google Sheet (free) and updates everyone\'s workspace within seconds. First-time backend setup: <code>docs/TEAM-BOARD-SETUP.md</code>.</p>'
        + '<div class="modal-foot">'
        + (sync.key ? '<button class="btn-sm danger" id="syncOff">Forget key</button>' : '<span></span>')
        + '<button class="btn-sm primary" id="syncOn">' + (sync.key ? 'Update key' : 'Connect with key') + '</button></div>';
      openModal(html, true);
      renderGsiButton('gsiBtnSync');
      var so = $('gsiSignOut');
      if (so) so.onclick = signOutGoogle;
      $('syncOn').onclick = function () {
        var k = $('syncKey').value.trim();
        if (!k) { toast('Enter the team key first'); return; }
        sync.key = k; localStorage.setItem(LS_KEY, k);
        sync.serverVersion = 0;
        closeModal(); pullLoad(true);
      };
      var off = $('syncOff');
      if (off) off.onclick = function () {
        sync.key = ''; localStorage.removeItem(LS_KEY);
        sync.serverVersion = 0; sync.configured = null;
        if (!authValid()) setSyncStatus('local');
        closeModal();
        toast('Key forgotten' + (authValid() ? ' — still signed in with Google' : ' — changes stay on this device'));
      };
    }

    // --------------------------- backup modal ------------------------------
    function openBackupModal() {
      var html = '<h2>Backup / restore</h2>'
        + '<p class="help-note">Download the whole workspace as a JSON file, or restore from one. Handy before big reorganizations.</p>'
        + '<div class="modal-foot" style="border:none;margin-top:.8rem;padding:0;">'
        + '<button class="btn-sm ghost" id="importBtn">⬆ Restore from file…</button>'
        + '<button class="btn-sm primary" id="exportBtn">⬇ Download backup</button></div>'
        + '<input type="file" id="importFile" accept="application/json" style="display:none;" />';
      openModal(html, true);
      $('exportBtn').onclick = function () {
        var blob = new Blob([JSON.stringify(doc, null, 2)], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'finmango-hq-' + new Date().toISOString().slice(0, 10) + '.json';
        a.click(); URL.revokeObjectURL(a.href);
      };
      $('importBtn').onclick = function () { $('importFile').click(); };
      $('importFile').onchange = function () {
        var f = this.files[0]; if (!f) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var d = JSON.parse(reader.result);
            if (!d || !Array.isArray(d.boards)) throw new Error('bad');
            if (!confirm('Replace the current workspace with this backup?')) return;
            doc = d; migrate();
            ui.boardId = doc.boards[0] && doc.boards[0].id;
            ui.pageId = null; ui.view = 'board';
            closeModal(); mutate(); toast('Workspace restored');
          } catch (e) { toast('That file doesn\'t look like a workspace backup'); }
        };
        reader.readAsText(f);
      };
    }

    // ------------------------- quick find (⌘K) ------------------------------
    function openQuickFind() {
      var html = '<h2 style="margin-bottom:.6rem;">Quick find</h2>'
        + '<input class="qf-input" id="qfInput" placeholder="Search boards, cards, and pages…" autocomplete="off" />'
        + '<div class="qf-results" id="qfResults"></div>';
      openModal(html, true);
      var input = $('qfInput'), results = $('qfResults');
      var items = [];
      function collect(q) {
        q = q.toLowerCase();
        var out = [];
        (doc.pages || []).forEach(function (p) {
          if (!q || (p.title + ' ' + p.body).toLowerCase().indexOf(q) > -1) {
            out.push({ icon: p.icon || '📄', label: p.title, path: 'page', go: function () { closeModal(); openPage(p.id); } });
          }
        });
        doc.boards.forEach(function (b) {
          if (!q || b.name.toLowerCase().indexOf(q) > -1) {
            out.push({ icon: b.icon || '📋', label: b.name, path: 'board', go: function () { closeModal(); openBoard(b.id); } });
          }
          b.cards.forEach(function (c) {
            if (!q) return; // cards only appear once you type — keeps the default list short
            if ((c.title + ' ' + c.desc + ' ' + c.tags.join(' ')).toLowerCase().indexOf(q) > -1) {
              var col = b.columns.find(function (x) { return x.id === c.colId; });
              out.push({ icon: '▸', label: c.title, path: b.name + ' › ' + (col ? col.name : ''), go: function () {
                closeModal(); openBoard(b.id); openCardModal(c.id);
              } });
            }
          });
        });
        return out.slice(0, 12);
      }
      function draw() {
        items = collect(input.value.trim());
        results.innerHTML = items.length ? items.map(function (it, i) {
          return '<button class="qf-item' + (i === 0 ? ' hot' : '') + '" data-i="' + i + '"><span class="emoji">' + esc(it.icon)
            + '</span><span>' + esc(it.label) + '</span><span class="path">' + esc(it.path) + '</span></button>';
        }).join('') : '<div class="qf-empty">No matches.</div>';
        results.querySelectorAll('.qf-item').forEach(function (btn) {
          btn.onclick = function () { items[Number(btn.dataset.i)].go(); };
        });
      }
      input.addEventListener('input', draw);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && items.length) { e.preventDefault(); items[0].go(); }
      });
      draw();
      setTimeout(function () { input.focus(); }, 0);
    }

    // ========================= TOP-LEVEL WIRING =============================
    $('hamburger').onclick = function () { ui.sidebarClosed = !ui.sidebarClosed; persistLocal(); renderSidebar(); };
    function closeSidebarOnMobile() {
      if (window.innerWidth <= 760) { ui.sidebarClosed = true; persistLocal(); renderSidebar(); }
    }
    $('addBoardBtn').onclick = function () {
      var name = prompt('Board name'); if (!name || !name.trim()) return;
      var bId = uid();
      doc.boards.push({
        id: bId, icon: EMOJIS[doc.boards.length % EMOJIS.length], name: name.trim().slice(0, 60), updatedAt: now(),
        columns: [
          { id: uid(), name: 'To do', color: COL_COLORS[0] },
          { id: uid(), name: 'In Progress', color: COL_COLORS[1] },
          { id: uid(), name: 'Done', color: COL_COLORS[3] }
        ],
        cards: []
      });
      openBoard(bId);
      mutate();
    };
    $('addPageBtn').onclick = function () {
      var name = prompt('Page title'); if (!name || !name.trim()) return;
      var p = { id: uid(), icon: '📄', title: name.trim().slice(0, 80), body: '', public: false, createdAt: now(), updatedAt: now() };
      doc.pages.push(p);
      mutate({ noRender: true });
      openPage(p.id, true);
    };
    $('boardNameInput').addEventListener('change', function () {
      var v = this.value.trim();
      if (inPageMode()) {
        var p = page();
        if (v) { p.title = v.slice(0, 80); p.updatedAt = now(); mutate(); } else this.value = p.title;
      } else {
        var b = board(); if (!b) return;
        if (v) { b.name = v.slice(0, 60); b.updatedAt = now(); mutate(); } else this.value = b.name;
      }
    });
    $('boardEmoji').onclick = openBoardMenu;
    $('boardMenuBtn').onclick = openBoardMenu;
    $('viewBoardBtn').onclick = function () { ui.view = 'board'; persistLocal(); render(); };
    $('viewTableBtn').onclick = function () { ui.view = 'table'; persistLocal(); render(); };
    $('pageReadBtn').onclick = function () { ui.pageEdit = false; render(); };
    $('pageEditBtn').onclick = function () { ui.pageEdit = true; render(); };
    $('agendaBtn').onclick = function () { ui.agenda = !ui.agenda; render(); };
    $('searchInput').addEventListener('input', function () { ui.search = this.value; renderView(); });
    $('filterAssignee').addEventListener('change', function () { ui.fAssignee = this.value; render(); });
    $('filterPriority').addEventListener('change', function () { ui.fPriority = this.value; render(); });
    $('membersBtn').onclick = openMembersModal;
    $('syncBtn').onclick = openSyncModal;
    $('backupBtn').onclick = openBackupModal;
    $('qfHint').onclick = openQuickFind;
    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openQuickFind(); return; }
      if (e.key === 'Escape') closeModal();
    });

    // ============================== INIT ===================================
    loadLocal();
    if (authValid()) { ensureGoogleMember(); }
    else if (auth) { auth = null; localStorage.removeItem(LS_AUTH); } // expired token from a previous visit
    if (window.innerWidth <= 760) ui.sidebarClosed = true;
    render();
    setSyncStatus('local');
    if (canSync()) pullLoad(true);
    // First visit, not connected: open the access modal so signing in is the
    // obvious first step (identity comes from Google — no name-picking).
    if (!authValid() && !canSync()) setTimeout(openSyncModal, 400);

    // Once the GIS script lands: enable One Tap so returning @finmango.org
    // folks are silently re-signed-in when their ~1h token has lapsed.
    window.addEventListener('load', function () {
      if (initGsi() && !authValid()) {
        try { google.accounts.id.prompt(); } catch (e) {}
      }
    });

    // Poll for teammates' changes; also refresh when the tab regains focus.
    setInterval(function () {
      if (canSync() && !sync.dirty && !sync.pushing && !document.hidden) pullLoad(false);
    }, 15000);
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && canSync() && !sync.dirty && !sync.pushing) pullLoad(false);
    });
    window.addEventListener('beforeunload', function () {
      if (sync.dirty && canSync()) {
        // best-effort final save
        try {
          navigator.sendBeacon && navigator.sendBeacon('/api/board', new Blob([JSON.stringify(Object.assign({
            action: 'save', baseVersion: sync.serverVersion,
            author: me() ? me().name : '', data: doc }, creds()))], { type: 'text/plain' }));
        } catch (e) {}
      }
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinMango HQ — Team Workspace</title>
  <meta name="description" content="FinMango's internal team workspace — roadmap, boards, and wiki.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap">
  <!-- Google Identity Services — powers "Sign in with FinMango" (see docs/TEAM-BOARD-SETUP.md) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* ===== FINMANGO EDITORIAL FOUNDATION ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --paper: #FAFAF7; --ink: #0A0A0A; --orange: #FF6B35; --orange-deep: #E5511B;
      --ink-dim: rgba(10,10,10,.62); --ink-faint: rgba(10,10,10,.38);
      --ink-line: rgba(10,10,10,.1); --ink-line-soft: rgba(10,10,10,.06);
      --sidebar-bg: #F2F1EC; --card-bg: #FFFFFF;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      --shadow-card: 0 1px 2px rgba(10,10,10,.05), 0 1px 1px rgba(10,10,10,.03);
      --shadow-pop: 0 12px 40px rgba(10,10,10,.16), 0 2px 8px rgba(10,10,10,.08);
      --radius: 8px;
    }
    html, body { height: 100%; }
    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); font-size: 15px;
      line-height: 1.5; -webkit-font-smoothing: antialiased; font-feature-settings: "ss01" on, "cv11" on; overflow: hidden; }
    ::selection { background: var(--orange); color: #fff; }
    :focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }
    button { font-family: inherit; font-size: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
    .mono { font-family: var(--font-mono); font-size: .66rem; font-weight: 500; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-faint); }

    /* ===== APP SHELL ===== */
    .app { display: flex; height: 100vh; height: 100dvh; }

    /* ===== SIDEBAR ===== */
    .sidebar { width: 248px; min-width: 248px; background: var(--sidebar-bg); border-right: 1px solid var(--ink-line-soft);
      display: flex; flex-direction: column; transition: margin-left .25s ease; z-index: 60; }
    .app.sidebar-closed .sidebar { margin-left: -248px; }
    .side-head { display: flex; align-items: center; gap: .6rem; padding: 1rem .9rem .8rem; }
    /* the mark PNG carries built-in transparent padding, so render it larger
       with negative margins to keep the header height unchanged */
    .side-head .ws-logo { width: 40px; height: 40px; margin: -6px -8px -6px -7px; flex-shrink: 0; display: grid; place-items: center; }
    .side-head .ws-logo img { width: 100%; height: 100%; object-fit: contain; }
    .side-head .ws-name { font-weight: 700; font-size: .92rem; letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .side-head .kbd-hint { font-family: var(--font-mono); font-size: .58rem; color: var(--ink-faint); border: 1px solid var(--ink-line);
      border-radius: 4px; padding: .1rem .3rem; cursor: pointer; }
    .side-scroll { flex: 1; overflow-y: auto; padding: .35rem .55rem; }
    .side-label { padding: .55rem .4rem .3rem; display: flex; justify-content: space-between; align-items: center; }
    .side-label button { color: var(--ink-faint); border-radius: 4px; width: 20px; height: 20px; line-height: 1; font-size: .95rem; }
    .side-label button:hover { background: var(--ink-line); color: var(--ink); }
    .side-item { display: flex; align-items: center; gap: .55rem; width: 100%; text-align: left; padding: .4rem .5rem;
      border-radius: 6px; color: var(--ink-dim); font-weight: 500; font-size: .88rem; }
    .side-item:hover { background: rgba(10,10,10,.055); color: var(--ink); }
    .side-item.active { background: rgba(10,10,10,.08); color: var(--ink); font-weight: 600; }
    .side-item .emoji { width: 1.25em; text-align: center; flex-shrink: 0; }
    .side-item .label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .side-item .count { font-family: var(--font-mono); font-size: .62rem; color: var(--ink-faint); }
    /* dragging a page row to re-nest it */
    .side-item.dragging { opacity: .4; }
    .side-item.drop-into, .side-label.drop-into { outline: 2px solid var(--orange); outline-offset: -2px; border-radius: 6px; }
    /* while dragging a nested page, the "Pages" header advertises itself as
       the way back out of the tree */
    .side-label.drop-hint-zone { outline: 1.5px dashed var(--orange); border-radius: 6px; }
    .side-label.drop-hint-zone .mono { color: var(--orange-deep); }
    .side-item.drag-ghost-row { position: fixed; z-index: 400; pointer-events: none; background: #fff;
      box-shadow: var(--shadow-pop); border-radius: 6px; opacity: .95; margin: 0; }
    .side-foot { margin-top: auto; padding: .55rem; border-top: 1px solid var(--ink-line-soft); }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-faint); flex-shrink: 0; }
    .sync-dot.on { background: #3E9A5F; } .sync-dot.err { background: #D9534F; } .sync-dot.busy { background: #E8A33D; }

    /* ===== MAIN ===== */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar { display: flex; align-items: center; gap: .75rem; padding: .65rem 1.1rem; border-bottom: 1px solid var(--ink-line-soft); flex-wrap: wrap; }
    .hamburger { font-size: 1rem; color: var(--ink-dim); padding: .3rem .45rem; border-radius: 6px; }
    .hamburger:hover { background: var(--ink-line-soft); }
    .crumb { display: flex; align-items: center; gap: .5rem; font-weight: 700; font-size: 1rem; letter-spacing: -.01em; min-width: 0; }
    .crumb .board-emoji { font-size: 1.05rem; cursor: pointer; border-radius: 5px; padding: .1rem .2rem; }
    .crumb .board-emoji:hover { background: var(--ink-line-soft); }
    .crumb input { border: none; background: transparent; font-weight: 700; font-size: 1rem; letter-spacing: -.01em;
      width: 100%; min-width: 60px; max-width: 340px; padding: .1rem .25rem; border-radius: 5px; }
    .crumb input:hover { background: var(--ink-line-soft); }
    .crumb input:focus { background: #fff; outline: 2px solid var(--orange); }
    .topbar .spacer { flex: 1; }
    .view-switch { display: flex; background: var(--ink-line-soft); border-radius: 7px; padding: 2px; }
    .view-switch button { padding: .28rem .7rem; border-radius: 5px; font-size: .8rem; font-weight: 600; color: var(--ink-dim); }
    .view-switch button.active { background: #fff; color: var(--ink); box-shadow: var(--shadow-card); }
    .search-box { display: flex; align-items: center; gap: .4rem; background: #fff; border: 1px solid var(--ink-line);
      border-radius: 7px; padding: .3rem .6rem; width: 170px; }
    .search-box input { border: none; outline: none; background: transparent; width: 100%; font-size: .85rem; }
    .search-box svg { flex-shrink: 0; opacity: .4; }
    .top-filter { font-size: .8rem; font-weight: 600; color: var(--ink-dim); border: 1px solid var(--ink-line);
      background: #fff; border-radius: 7px; padding: .32rem .55rem; max-width: 130px; }
    .top-filter.on { border-color: var(--orange); color: var(--orange-deep); }
    button.top-filter:hover { border-color: var(--ink-faint); }
    .avatars { display: flex; }
    .avatar { width: 26px; height: 26px; border-radius: 50%; color: #fff; display: grid; place-items: center;
      font-size: .68rem; font-weight: 700; border: 2px solid var(--paper); margin-left: -6px; flex-shrink: 0;
      position: relative; overflow: hidden; }
    /* clicking a topbar avatar filters the board to that person's cards */
    .avatars button.avatar.on { outline: 2px solid var(--orange); outline-offset: 1px; }
    .avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar:first-child { margin-left: 0; }
    .avatars button.avatar { cursor: pointer; }
    .avatar.more { background: var(--ink-line); color: var(--ink-dim); }
    /* page/notes modes hide board-only controls */
    .topbar.page-mode .board-only { display: none !important; }
    .topbar:not(.page-mode) .page-only { display: none !important; }
    .topbar.notes-mode .board-only, .topbar.notes-mode .page-only { display: none !important; }
    .topbar.notes-mode #boardMenuBtn { visibility: hidden; }
    .notes-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: .4rem; }
    .pr-row.open { border-color: var(--orange); }
    .note-detail { margin-top: .6rem; border-top: 1px solid var(--ink-line-soft); padding-top: .6rem; }
    .note-body { font-size: .92rem; }
    .note-body img { max-width: 100%; border-radius: 8px; }
    .note-body iframe { width: 100%; aspect-ratio: 16/9; border: 0; border-radius: 8px; }
    .note-review { font-size: .82rem; padding: .25rem 0; color: var(--ink-dim); }
    .draft-editing { outline: 2px solid var(--orange); border-radius: 8px; padding: .6rem .8rem; background: #fff; min-height: 120px; }
    .draft-editing:focus { outline: 2px solid var(--orange-deep); }
    .draft-editing.drag-over { outline: 2px dashed var(--orange-deep); background: rgba(255,107,53,.05); }

    /* ===== BOARD VIEW ===== */
    .board-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; }
    .board { display: flex; gap: .9rem; padding: 1rem 1.1rem 1.25rem; height: 100%; align-items: flex-start; min-width: min-content; }
    .col { width: 280px; min-width: 280px; display: flex; flex-direction: column; max-height: 100%; border-radius: 10px; }
    .col.drag-over-col { outline: 2px dashed var(--orange); outline-offset: 4px; }
    .col-head { display: flex; align-items: center; gap: .5rem; padding: .25rem .35rem .55rem; cursor: grab; }
    .col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .col-name { font-weight: 700; font-size: .86rem; letter-spacing: -.005em; }
    .col-count { font-family: var(--font-mono); font-size: .62rem; color: var(--ink-faint); }
    .col-head .spacer { flex: 1; }
    .icon-btn { width: 24px; height: 24px; border-radius: 5px; display: grid; place-items: center; color: var(--ink-faint); font-size: .95rem; line-height: 1; }
    .icon-btn:hover { background: var(--ink-line-soft); color: var(--ink); }
    .col-body { overflow-y: auto; display: flex; flex-direction: column; gap: .5rem; padding: 2px 2px 6px; min-height: 40px; }
    .drop-hint { height: 3px; border-radius: 2px; background: var(--orange); margin: -1px 4px; }
    .card { background: var(--card-bg); border: 1px solid var(--ink-line-soft); border-radius: var(--radius);
      box-shadow: var(--shadow-card); padding: .6rem .7rem; cursor: pointer; transition: box-shadow .15s, transform .15s;
      user-select: none; -webkit-user-select: none; }
    .card:hover { box-shadow: 0 3px 10px rgba(10,10,10,.09); }
    .card.dragging { opacity: .4; }
    /* the lifted copy that follows the finger/pointer during a drag */
    .card.drag-ghost { position: fixed; z-index: 400; margin: 0; pointer-events: none;
      transform: rotate(2deg); box-shadow: 0 14px 34px rgba(10,10,10,.28); transition: none; }
    .card-title { font-weight: 600; font-size: .88rem; line-height: 1.35; word-wrap: break-word; }
    .card-desc-hint { color: var(--ink-faint); font-size: .76rem; margin-top: .15rem; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .45rem; }
    .tag { font-size: .68rem; font-weight: 600; padding: .08rem .48rem; border-radius: 99px; }
    .card-foot { display: flex; align-items: center; gap: .45rem; margin-top: .55rem; flex-wrap: wrap; }
    .card-foot .avatar { width: 21px; height: 21px; font-size: .58rem; border-width: 1px; margin: 0; }
    .due { font-family: var(--font-mono); font-size: .64rem; color: var(--ink-dim); display: inline-flex; align-items: center; gap: .25rem; }
    .due.overdue { color: #C62828; font-weight: 500; }
    .due.soon { color: var(--orange-deep); }
    .prio { font-size: .62rem; font-weight: 700; font-family: var(--font-mono); letter-spacing: .06em; margin-left: auto; }
    .mini-badge { font-size: .68rem; opacity: .75; }
    .comments-n { font-family: var(--font-mono); font-size: .62rem; color: var(--ink-faint); }
    .add-card-btn { display: flex; align-items: center; gap: .45rem; padding: .45rem .55rem; border-radius: 7px;
      color: var(--ink-faint); font-size: .82rem; font-weight: 600; text-align: left; width: 100%; margin-top: .15rem; }
    .add-card-btn:hover { background: var(--ink-line-soft); color: var(--ink); }
    .quick-add { background: #fff; border: 1px solid var(--orange); border-radius: var(--radius); padding: .5rem .6rem; }
    .quick-add textarea { width: 100%; border: none; outline: none; resize: none; font-size: .88rem; font-weight: 600; line-height: 1.35; }
    .quick-add-row { display: flex; gap: .4rem; margin-top: .35rem; }
    .btn-sm { padding: .3rem .7rem; border-radius: 6px; font-size: .78rem; font-weight: 700; }
    .btn-sm.primary { background: var(--orange); color: #fff; }
    .btn-sm.primary:hover { background: var(--ink); }
    .btn-sm.ghost { color: var(--ink-dim); } .btn-sm.ghost:hover { background: var(--ink-line-soft); }
    .btn-sm.danger { color: #C62828; } .btn-sm.danger:hover { background: rgba(198,40,40,.08); }
    .add-col { min-width: 220px; }
    .add-col button { width: 100%; text-align: left; padding: .5rem .7rem; border-radius: 8px; border: 1px dashed var(--ink-line);
      color: var(--ink-faint); font-weight: 600; font-size: .84rem; }
    .add-col button:hover { border-color: var(--orange); color: var(--orange-deep); background: rgba(255,107,53,.04); }

    /* ===== WHITEBOARD VIEW (canvas boards) ===== */
    .wb-scroll { flex: 1; overflow: auto; position: relative; }
    .wb-canvas { position: relative; width: 2400px; height: 1600px; cursor: crosshair;
      background-image: radial-gradient(var(--ink-line) 1px, transparent 1px); background-size: 24px 24px; }
    .wb-toolbar { position: sticky; top: 0; left: 0; z-index: 5; display: flex; align-items: center; gap: .6rem;
      padding: .5rem .9rem; pointer-events: none; width: 100%; }
    .wb-toolbar > * { pointer-events: auto; }
    .wb-add { background: var(--orange); color: #fff; font-weight: 700; font-size: .82rem;
      padding: .42rem .9rem; border-radius: 99px; box-shadow: 0 2px 8px rgba(10,10,10,.18); }
    .wb-add:hover { background: var(--ink); }
    .wb-hint { font-size: .74rem; color: var(--ink-faint); background: var(--paper, #fff); border: 1px solid var(--ink-line-soft);
      padding: .3rem .7rem; border-radius: 99px; }
    .sticky { position: absolute; width: 190px; min-height: 120px; padding: .8rem .85rem 1.9rem; cursor: grab;
      box-shadow: 2px 4px 10px rgba(10,10,10,.14); font-size: .86rem; line-height: 1.4; word-wrap: break-word;
      touch-action: none; user-select: none; transition: box-shadow .15s; }
    .sticky:hover { box-shadow: 3px 7px 18px rgba(10,10,10,.22); z-index: 3; }
    .sticky.wb-dragging { cursor: grabbing; z-index: 6; box-shadow: 6px 12px 26px rgba(10,10,10,.3); }
    .sticky.wb-editing { cursor: text; user-select: text; z-index: 4; outline: 2px solid var(--orange); }
    .sticky-text { min-height: 3.4em; white-space: pre-wrap; outline: none; font-weight: 500; }
    .sticky-text:empty::before { content: 'Type your idea…'; color: rgba(10,10,10,.35); }
    .sticky-author { position: absolute; left: .85rem; bottom: .5rem; font-size: .62rem; font-family: var(--font-mono);
      color: rgba(10,10,10,.45); max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sticky-tools { position: absolute; right: .4rem; bottom: .35rem; display: none; align-items: center; gap: .25rem; }
    .sticky:hover .sticky-tools, .sticky.wb-editing .sticky-tools { display: flex; }
    .sticky-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(10,10,10,.25); }
    .sticky-dot:hover { transform: scale(1.25); }
    .sticky-tool { font-size: .72rem; line-height: 1; padding: .15rem .25rem; border-radius: 4px; color: rgba(10,10,10,.55); }
    .sticky-tool:hover { background: rgba(10,10,10,.1); color: rgba(10,10,10,.85); }
    @media (max-width: 760px) { .sticky { width: 160px; } }

    /* ===== TABLE VIEW ===== */
    .table-scroll { flex: 1; overflow: auto; padding: .5rem 1.1rem 1.5rem; }
    table.props { width: 100%; border-collapse: collapse; min-width: 760px; }
    table.props th { text-align: left; font-family: var(--font-mono); font-size: .62rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: .12em; color: var(--ink-faint); padding: .6rem .6rem .45rem; border-bottom: 1px solid var(--ink-line); white-space: nowrap; }
    table.props td { padding: .55rem .6rem; border-bottom: 1px solid var(--ink-line-soft); font-size: .86rem; vertical-align: middle; }
    table.props tr.rowcard { cursor: pointer; }
    table.props tr.rowcard:hover td { background: rgba(10,10,10,.025); }
    .status-chip { display: inline-flex; align-items: center; gap: .4rem; font-size: .78rem; font-weight: 600; padding: .12rem .55rem;
      border-radius: 99px; background: var(--ink-line-soft); white-space: nowrap; }
    .status-chip .col-dot { width: 7px; height: 7px; }
    .cell-assignee { display: inline-flex; align-items: center; gap: .4rem; white-space: nowrap; }
    .cell-assignee .avatar { width: 20px; height: 20px; font-size: .56rem; margin: 0; border-width: 1px; }
    .table-group { font-weight: 800; font-size: .8rem; padding-top: 1.1rem; }

    /* ===== PAGE (WIKI) VIEW ===== */
    .page-scroll { flex: 1; overflow-y: auto; }
    .page-wrap { max-width: 760px; margin: 0 auto; padding: 1.6rem 1.6rem 4rem; }
    .page-meta { display: flex; align-items: center; gap: .7rem; margin-bottom: 1rem; }
    .page-badge { font-family: var(--font-mono); font-size: .6rem; text-transform: uppercase; letter-spacing: .12em;
      padding: .18rem .5rem; border-radius: 99px; background: var(--ink-line-soft); color: var(--ink-dim); }
    .page-badge.pub { background: #EAF3EC; color: #1F7A40; }
    .page-editor { width: 100%; min-height: 62vh; border: none; outline: none; background: transparent; resize: none;
      font-family: var(--font-mono); font-size: .86rem; line-height: 1.7; color: var(--ink); }
    .md { font-size: 1rem; line-height: 1.7; }
    .md h1 { font-size: 1.7rem; letter-spacing: -.02em; margin: 1.6rem 0 .6rem; line-height: 1.25; }
    .md h2 { font-size: 1.3rem; letter-spacing: -.015em; margin: 1.5rem 0 .5rem; }
    .md h3 { font-size: 1.05rem; margin: 1.2rem 0 .4rem; }
    .md h1:first-child, .md h2:first-child { margin-top: .3rem; }
    .md p { margin: .55rem 0; }
    .md ul, .md ol { margin: .55rem 0 .55rem 1.4rem; }
    .md li { margin: .25rem 0; }
    .md blockquote { border-left: 3px solid var(--orange); padding: .2rem 0 .2rem 1rem; margin: .8rem 0; color: var(--ink-dim); }
    .md code { font-family: var(--font-mono); font-size: .82em; background: var(--ink-line-soft); padding: .08rem .35rem; border-radius: 4px; }
    .md pre { background: #14140F; color: #FAFAF7; padding: .9rem 1.1rem; border-radius: 8px; overflow-x: auto; margin: .8rem 0; }
    .md pre code { background: none; padding: 0; color: inherit; font-size: .8rem; line-height: 1.6; }
    .md hr { border: none; border-top: 1px solid var(--ink-line); margin: 1.5rem 0; }
    .md li.task { list-style: none; margin-left: -1.25rem; }
    .md li.task label { display: flex; gap: .55rem; align-items: baseline; cursor: pointer; }
    .md li.task input { width: 15px; height: 15px; accent-color: var(--orange); cursor: pointer; flex-shrink: 0; transform: translateY(2px); }
    .md li.task input:checked ~ span { color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--ink-line); }
    .md .tablewrap { overflow-x: auto; margin: .8rem 0; }
    .md table { border-collapse: collapse; width: 100%; font-size: .88em; }
    .md th, .md td { border: 1px solid var(--ink-line); padding: .45rem .6rem; text-align: left; vertical-align: top; }
    .md th { background: var(--ink-line-soft); font-weight: 700; white-space: nowrap; }
    .md [contenteditable]:hover { background: rgba(255,107,53,.05); cursor: text; }
    .md [contenteditable]:focus { outline: 2px solid var(--orange); outline-offset: -2px; background: #fff; }
    .md [data-src]:not(.task):hover { background: rgba(255,107,53,.04); border-radius: 4px; cursor: text; }
    /* blocks being edited in place (WYSIWYG) + the fresh "keep typing" line */
    .md .block-editing { outline: 2px solid var(--orange); outline-offset: -2px; background: #fff; border-radius: 4px; }
    .md .ghost-block { min-height: 1.5em; }
    .md .ghost-block:empty::before { content: 'Keep typing — click away when done'; color: var(--ink-faint); }
    .task-edit { opacity: 0; margin-left: .45rem; color: var(--ink-faint); font-size: .75rem; transition: opacity .12s; }
    li.task:hover .task-edit { opacity: .7; }
    .task-edit:hover { color: var(--orange-deep); }
    .tbl-del { position: absolute; display: none; width: 18px; height: 18px; line-height: 16px; text-align: center; font-size: .68rem;

    .qf-input { width: 100%; border: none; background: transparent; font-size: 1.05rem; font-weight: 600; padding: .2rem .1rem .7rem;

    .gate-key-toggle { display: block; margin: .9rem auto 0; color: var(--ink-line); font-size: 1rem; line-height: 1;
      padding: .2rem .6rem; border-radius: 6px; }
    .gate-key-toggle:hover { color: var(--ink-faint); }
    .gate-key-row { display: flex; gap: .5rem; margin-top: 1rem; }

    .gate-key-row input:focus { outline: 2px solid var(--orange); border-color: transparent; }

    /* ===== PAGE COMMENTS (highlight → 💬) ===== */

    }
  </style>
</head>

  <script>

    var COL_COLORS = ['#9A9A93', '#4A7BD0', '#E8A33D', '#3E9A5F', '#FF6B35', '#8B5CF6', '#D9534F', '#2E9E9E'];

    var TAG_COLORS = [['#FFF0E8', '#C2410C'], ['#EAF3EC', '#1F7A40'], ['#EAF0FA', '#2B5AB8'], ['#F3EDFC', '#6D3FC4'],
      ['#FDF3E0', '#9A6A0B'], ['#E8F4F4', '#1D7A7A'], ['#FBEAEA', '#B23030'], ['#F0F0ED', '#55554F']];
    var EMOJIS = ['🥭','📋','🧭','🚀','📣','🎓','💡','🌱','📊','✅','🗓️','💰','🌍','🤝','✍️','🎯','🔬','📚','🛠️','🏆','❤️','🔥','⭐','📌','🏠','📞','📄','🗂️','🧪','🎤','🖥️','🌾'];

    // ============================ UTILITIES ================================

    function mdInline(s) { // s is already HTML-escaped
      // Finished anchors are stashed and restored at the end so later passes

'# Welcome to FinMango HQ 👋\n\nThis is our one-stop hub: what we\'re working on, how to get involved, and everything the team needs in one place.\n\n## How this workspace is organized\n\n- **🧭 Roadmap** — the org-level view. What we\'re doing **Now**, what\'s **Next**, what\'s **Later / Someday**, and what we\'ve **Shipped**. This is the agenda for leadership calls.\n- **🥭 Team HQ** — day-to-day tasks. Grab something, drag it along, done.\n- **Pages** (this sidebar section) — our wiki: guides, notes, and how-tos.\n\n## House rules\n\n1. Keep it simple — boards, pages, members. That\'s the whole system.\n2. One card = one thing someone can own.\n3. Flag anything that needs a group decision with the **📞 Discuss at next call** checkbox — flagged cards + everything in Now form the call agenda automatically.\n4. **Never put passwords, keys, or sensitive personal info on cards or pages.**\n\n## Useful links\n\n- [finmango.org](https://www.finmango.org)\n- [Financial Health Barometer](https://www.finmango.org/barometer)\n- [Barrier Breakers](https://www.finmango.org/barrier-breakers)\n- See also: [[Get Involved]] and [[Leadership Call Notes]]', false),
        pg('🤝', 'Get Involved',
'# Ways to get involved with FinMango\n\nWe\'re volunteer-powered. Whatever your skills, there\'s a lane:\n\n## 🎓 Become an Ambassador\nJoin a yearly cohort of young adults strengthening the global understanding of financial health. Apply at [finmango.org/ambassador-apply](https://www.finmango.org/ambassador-apply).\n\n## 🔬 Research\nWe collaborate with university partners on financial health research — data analysis, writing, and literature review help is always welcome.\n\n## 🛠️ Engineering & design\nOur website, tools, and data pipelines are open source. Check the [GitHub repo](https://github.com/finmango/website).\n\n## 🎤 Events\nHelp organize FinMango Day, Barrier Breakers, and community events — outreach, logistics, judging, sponsorship.\n\n## ✍️ Content\nWrite for Mango Stories, build lesson content, or share your community\'s story on the [Community Wall](https://www.finmango.org/community-wall).\n\n---\n\nNot sure where you fit? Add yourself in **Team members** and drop a card in the 🥭 Team HQ board saying hi — someone will follow up.', false),
        pg('📞', 'Leadership Call Notes',
'# Leadership call notes\n\nOne section per call, newest on top. The agenda builds itself: open the 🧭 Roadmap board and hit **📞 Agenda** — it shows everything in **Now** plus every card flagged for discussion.\n\n---\n\n## Template (copy for each call)\n\n**Date:** \n**On the call:** \n\n### Now check-in\n*Anything stuck? Anything done → drag to Shipped.*\n\n### Flagged for discussion\n*Walk the 📞 flagged cards. Decide: pull into Now, park in Later, or drop. Unflag as you go.*\n\n### Decisions\n- \n\n### New owners\n- ', false),
        pg('💡', 'Initiative Template',
'# Initiative: (name)\n\n*Copy this page for any big idea before proposing it. Link it from the roadmap card. A few honest sentences per section beats a long deck.*\n\n## What is it?\n\n## Who does it serve?\n\n## Why now?\n\n## What does success look like?\n*How would we know in 6 months this was worth it?*\n\n## What will it take?\n*People, time, money, partners — rough is fine.*\n\n## Open questions\n- ', false),
        pg('📡', 'AI & The Economic Signal',
'# Initiative: AI & The Economic Signal\n\n*Living doc — edit freely. Public page: [finmango.org/ai-economic-signal](https://www.finmango.org/ai-economic-signal)*\n\n## What is it?\nFinancial stress shows up before the unemployment numbers do. Most measurement tells you what already happened — we\'re building the signal that catches stress **early** (search trends + public data, the Barometer methodology), plus the tools to route people to help.\n\n**Two arms, one system:** measurement (the signal) and intervention (the routing). Both independent. Both open.\n\n## Who does it serve?\nPolicymakers and community organizations who need to see distress before it becomes crisis statistics — and ultimately the families behind the signal, reached earlier.\n\n## Why now?\nAI makes real-time synthesis of many weak signals practical, and we\'ve already proven the pipeline with the Financial Health Barometer and the COVID-19 Open Data Project.\n\n## What does success look like?\nThe planned **two research papers** published as the validated foundation, then tools that partners actually use for early intervention. The papers are the foundation — not the finish line.\n\n## What will it take?\nResearch partners (building on the Cifci and Venkatesan collaborations), data pipeline work, and validation against real outcomes.\n\n## Open questions\n- Which intervention partner do we pilot the routing arm with first?\n- Funding pathway — Google.org Impact Challenge (Pulse) or other?', false),
        pg('🏠', 'Housing NavTech',
'# Initiative: Housing NavTech\n\n*Living doc — edit freely. Public page: [finmango.org/housing-navtech](https://www.finmango.org/housing-navtech)*\n\n## What is it?\nHousing help that arrives **before** the crisis. Many families are one late notice from losing their home; we\'re building a navigation layer that moves them from at-risk to stabilized — and gives frontline workers the workflow to drive it, from diagnosis to done.\n\n## Who does it serve?\nFamilies at risk of housing instability, and the frontline workers (case managers, community orgs) who help them navigate assistance.\n\n## What\'s live today?\nFirst tools are already on the site: the [housing calculator](https://www.finmango.org/housing-calculator), [rent vs buy](https://www.finmango.org/rent-vs-buy), the [Housing Policy Lab](https://www.finmango.org/housing-policy-lab), and [housing affordability stories](https://www.finmango.org/housing-affordability-stories). The Barometer\'s housing-stress signal feeds the "before the crisis" part.\n\n## What does success look like?\nA frontline worker can take a family from "at risk" to "stabilized" inside one workflow — and we can show it happened faster than the status quo.\n\n## What will it take?\nPartnerships with frontline organizations, workflow design with real case workers, and integration with the Economic Signal work.\n\n## Open questions\n- First pilot org / geography?\n- How does this share infrastructure with Food NavTech?', false),
        pg('🥫', 'FreshFind',
'# Initiative: FreshFind\n\n*Living doc — edit freely. Live at [freshfind.org](https://freshfind.org/) · see also [finmango.org/food-navtech](https://www.finmango.org/food-navtech)*\n\n## What is it?\n**An early warning system for food crises. Built for government.** FreshFind uses AI to identify communities facing food insecurity *before* crises materialize, gives officials precise information about where intervention is needed, and equips them with response tools through trusted channels.\n\n**Three stages:**\n1. **Detect** — monitors financial stress signals and policy changes across all 50 states in real time\n2. **Inform** — structured briefings with specific zip codes, affected household counts, demographics, and recommended actions\n3. **Respond** — eligibility screeners, food access routing, and enrollment assistance tools\n\n## Who does it serve?\nGovernment decision-makers responsible for food assistance — state SNAP directors, emergency management officials — and, through them, the families the signal is about.\n\n## What\'s live today?\n[freshfind.org](https://freshfind.org/) itself, with three built-in tools: the [Financial Health Barometer](https://www.finmango.org/barometer), the [Food Desert Analyzer](https://www.finmango.org/food-desert-analyzer), and the [Food Assistance Calculator](https://www.finmango.org/food-assistance-calculator).\n\n## Research foundation\nA two-year field study partnership with the **University of Virginia** across five pilot communities: Chicago, Atlanta, Kansas City, and Wolfe County, Kentucky. Supported through **Google.org\'s Impact Challenge for AI for Government Innovation**.\n\n## What does success look like?\nGovernment partners acting on FreshFind briefings — families connected to assistance they qualify for before the fridge is empty, measured through the UVA study.\n\n## What will it take?\nPilot-community execution, government partner onboarding, and shared infrastructure with [[Housing NavTech]] and [[AI & The Economic Signal]].\n\n## Open questions\n- Which pilot community moves first?\n- What does the state-level onboarding playbook look like?', false)
      ];

    }
    function inPageMode() { return ui.view === 'page' && page(); }

    // ======================== PERSISTENCE ==================================
    function persistLocal() {
      try { localStorage.setItem(LS_DOC, JSON.stringify(doc)); } catch (e) { /* storage full/blocked */ }
      try { localStorage.setItem(LS_UI, JSON.stringify({ boardId: ui.boardId, pageId: ui.pageId, view: ui.view, sidebarClosed: ui.sidebarClosed })); } catch (e) {}
    }
    function loadLocal() {
      try {
        var raw = localStorage.getItem(LS_DOC);
        if (raw) doc = JSON.parse(raw);
      } catch (e) { doc = null; }
      if (!doc || !doc.boards) doc = seedDoc();
      migrate();
      try {
        var u = JSON.parse(localStorage.getItem(LS_UI) || '{}');
        ui.boardId = u.boardId || null;
        ui.pageId = u.pageId || null;
        ui.view = (u.view === 'table' || u.view === 'page' || u.view === 'notes') ? u.view : 'board';
        ui.sidebarClosed = !!u.sidebarClosed;
      } catch (e) {}
      if (ui.view === 'page' && !page()) ui.view = 'board';
      if (!board()) ui.boardId = doc.boards[0] && doc.boards[0].id;
    }
    // Older local/server documents may predate pages/flags — fill the gaps.
    function migrate() {
      if (!doc.tombstones) doc.tombstones = {};
      if (!doc.pages) doc.pages = [];

    }

    function seedAmbassadorsPage() {
      if (doc.ambassadorsSeeded) return;
      doc.ambassadorsSeeded = true;
      if (doc.tombstones[AMB_PAGE_ID]) return;
      if (doc.pages.some(function (p) { return p.id === AMB_PAGE_ID; })) return;
      var body;
      try {
        body = decodeURIComponent(atob(AMB_PAGE_BODY).split('').map(function (c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''));
      } catch (e) { return; }
      doc.pages.push({ id: AMB_PAGE_ID, icon: '🎓', title: 'Ambassadors', body: body,
        public: false, createdAt: now(), updatedAt: now() });
    }

    // A mutation happened: stamp, persist, queue a sync push, re-render.
    function mutate(opts) {
      doc.updatedAt = now();
      persistLocal();
      sync.dirty = true;
      schedulePush();
      if (!opts || !opts.noRender) render();
    }

    // ====================== GOOGLE SIGN-IN (GIS) ===========================
    function gsiConfigured() { return GOOGLE_CLIENT_ID.indexOf('REPLACE_WITH') !== 0; }
    function authValid() { return !!(auth && auth.token && auth.exp && auth.exp * 1000 - 60000 > Date.now()); }
    function canSync() { return !!sync.key || authValid(); }
    // Credentials attached to every load/save. The signed-in identity wins so
    // edits are attributed to a real person; the team key is the fallback door.
    function creds() {
      if (authValid()) return { idToken: auth.token };
      if (sync.key) return { key: sync.key };
      return {};
    }
    function initGsi() {
      if (!gsiConfigured() || !window.google || !google.accounts || !google.accounts.id) return false;
      if (!initGsi.done) {
        google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential, auto_select: true });
        initGsi.done = true;
      }
      return true;
    }
    function renderGsiButton(elId) {
      if (!initGsi() || !$(elId)) return;
      google.accounts.id.renderButton($(elId), { theme: 'outline', size: 'large', shape: 'pill', text: 'signin_with', width: 260 });
    }
    function handleGoogleCredential(resp) {
      var claims;
      try { claims = decodeJwt(resp.credential); } catch (e) { toast('Sign-in failed — try again'); return; }
      var email = String(claims.email || '').toLowerCase();
      if (claims.hd !== ALLOWED_DOMAIN && email.slice(-(ALLOWED_DOMAIN.length + 1)) !== '@' + ALLOWED_DOMAIN) {
        toast('Please use your @' + ALLOWED_DOMAIN + ' account'); return;
      }
      auth = { token: resp.credential, email: email, name: claims.name || email,
        given: claims.given_name || '', picture: claims.picture || '', exp: claims.exp };
      try { localStorage.setItem(LS_AUTH, JSON.stringify(auth)); } catch (e) {}
      if (!booted) { bootApp(); toast('Signed in as ' + auth.name); return; }
      ensureGoogleMember();
      closeModal();
      render();
      pullLoad(true);
      toast('Signed in as ' + auth.name);
    }
    // Match the signed-in person to a member record (by email, then by an
    // unclaimed member with the same first name — covers the seeded "Scott"),
    // creating one if needed. Their Google name & photo flow onto it.
    function ensureGoogleMember() {
      if (!auth) return;
      var m = doc.members.find(function (x) { return (x.email || '').toLowerCase() === auth.email; });
      if (!m && auth.given) {
        m = doc.members.find(function (x) {
          return !x.email && x.name.split(/\s+/)[0].toLowerCase() === auth.given.toLowerCase(); });
      }
      var changed = false;
      if (!m) {
        m = { id: uid(), name: auth.name, color: AVA_COLORS[doc.members.length % AVA_COLORS.length],
          email: auth.email, photo: auth.picture };
        doc.members.push(m); changed = true;
      } else if (m.email !== auth.email || m.name !== auth.name || m.photo !== auth.picture) {
        m.email = auth.email; m.name = auth.name; m.photo = auth.picture; changed = true;
      }
      meId = m.id; localStorage.setItem(LS_ME, meId);
      if (changed) mutate({ noRender: true });
    }
    function signOutGoogle() {
      auth = null; localStorage.removeItem(LS_AUTH);
      try { if (initGsi.done) google.accounts.id.disableAutoSelect(); } catch (e) {}
      if (!sync.key) setSyncStatus('local');
      closeModal(); render();
      toast('Signed out');
    }
    // The backend answers 'Invalid token' when the ~1h Google token lapses:
    // drop it and let One Tap re-issue silently (auto_select), else re-prompt.
    function handleAuthExpiry() {
      auth = null; localStorage.removeItem(LS_AUTH);
      if (initGsi()) { try { google.accounts.id.prompt(); } catch (e) {} }
      setSyncStatus(sync.key ? 'busy' : 'error', sync.key ? null : 'Signed out');
      if (sync.key) { pullLoad(false); } else { toast('Session expired — sign in again from the sidebar'); }
    }

    // ========================== SYNC LAYER =================================
    function setSyncStatus(status, label) {
      sync.status = status;
      var dot = $('syncDot'), lab = $('syncLabel');
      dot.className = 'sync-dot' + (status === 'synced' ? ' on' : status === 'error' ? ' err' : status === 'busy' ? ' busy' : '');
      lab.textContent = label || (status === 'synced' ? 'Synced' : status === 'busy' ? 'Syncing…' : status === 'error' ? 'Sync error' : 'Local only');
    }
    function schedulePush() {
      if (!canSync()) return;
      clearTimeout(sync.pushTimer);
      sync.pushTimer = setTimeout(pushSave, 1200);
    }
    function pushSave() {
      if (!canSync() || sync.pushing) { if (sync.pushing) schedulePush(); return; }
      sync.pushing = true; sync.dirty = false;
      setSyncStatus('busy');
      fetch('/api/board', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: 'save', baseVersion: sync.serverVersion,
          author: me() ? me().name : '', data: doc }, creds()))
      }).then(function (r) { return r.json(); }).then(function (res) {
        sync.pushing = false;
        if (res.result === 'success') {
          sync.serverVersion = res.version;
          setSyncStatus(sync.dirty ? 'busy' : 'synced');
          if (sync.dirty) schedulePush();
        } else if (res.result === 'conflict') {
          // A teammate saved first — merge their document with ours and re-push.
          sync.serverVersion = res.version;
          doc = mergeDocs(doc, res.data || seedDoc());
          migrate();
          persistLocal(); render();
          sync.dirty = true; schedulePush();
          toast('Merged changes from ' + (res.updatedBy || 'a teammate'));
        } else if (String(res.error || '') === 'Invalid token') {
          sync.dirty = true; handleAuthExpiry();
        } else {
          setSyncStatus('error', res.error === 'Invalid access key' ? 'Wrong key' : 'Sync error');
        }
      }).catch(function () { sync.pushing = false; setSyncStatus('error'); });
    }
    function pullLoad(first) {
      if (!canSync()) return;
      setSyncStatus('busy');
      fetch('/api/board', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: 'load' }, creds()))
      })
        .then(function (r) {
          if (r.status === 503) { sync.configured = false; throw new Error('unconfigured'); }
          sync.configured = true; return r.json();
        })
        .then(function (res) {
          if (res.result !== 'success') {
            if (String(res.error || '') === 'Invalid token') { handleAuthExpiry(); return; }
            setSyncStatus('error', String(res.error || '').indexOf('key') > -1 ? 'Wrong key' : 'Sync error');
            return;
          }
          if (res.version === 0 || !res.data) {
            // First device to connect: publish the local workspace.
            sync.serverVersion = 0; sync.dirty = true; pushSave();
            return;
          }
          if (res.version !== sync.serverVersion || first) {
            doc = sync.dirty ? mergeDocs(doc, res.data) : res.data;
            migrate();
            sync.serverVersion = res.version;
            if (authValid()) ensureGoogleMember(); // the shared doc may not know me yet
            if (!board()) ui.boardId = doc.boards[0] && doc.boards[0].id;
            if (ui.view === 'page' && !page()) ui.view = 'board';
            persistLocal(); render();
            if (sync.dirty) { schedulePush(); return; }
          }
          setSyncStatus(sync.dirty ? 'busy' : 'synced');
        })
        .catch(function (e) {
          if (String(e.message) === 'unconfigured') setSyncStatus('local', 'Sync not set up');
          else setSyncStatus('error');
        });
    }
    // Merge two workspace documents. Item-level: newer updatedAt wins; unions
    // creations from both sides; tombstones stop deleted things resurrecting.
    function mergeDocs(a, b) {
      var out = clone(b);
      out.tombstones = out.tombstones || {};
      out.pages = out.pages || [];
      var tombs = out.tombstones;
      Object.keys(a.tombstones || {}).forEach(function (id) {
        if (!tombs[id] || a.tombstones[id] > tombs[id]) tombs[id] = a.tombstones[id];
      });
      (a.members || []).forEach(function (m) {
        var om = out.members.find(function (x) { return x.id === m.id; });
        if (!om && !tombs[m.id]) { out.members.push(clone(m)); return; }
        // A Google sign-in may have enriched this member on one side only.
        if (om && m.email && !om.email) { om.email = m.email; om.name = m.name; om.photo = m.photo || ''; }
      });
      // Pages: union by id, newest edit wins.
      (a.pages || []).forEach(function (ap) {
        var op = out.pages.find(function (x) { return x.id === ap.id; });
        if (!op) out.pages.push(clone(ap));
        else if ((ap.updatedAt || 0) > (op.updatedAt || 0)) out.pages[out.pages.indexOf(op)] = clone(ap);
      });
      out.pages = out.pages.filter(function (p) { return !(tombs[p.id] && tombs[p.id] > (p.updatedAt || 0)); });
      // Comment threads: union by id, newest edit wins — two people commenting
      // on the same page concurrently both survive.
      out.comments = out.comments || [];
      (a.comments || []).forEach(function (ac) {
        var oc = out.comments.find(function (x) { return x.id === ac.id; });
        if (!oc) out.comments.push(clone(ac));
        else if ((ac.updatedAt || 0) > (oc.updatedAt || 0)) out.comments[out.comments.indexOf(oc)] = clone(ac);
      });
      out.comments = out.comments.filter(function (c) { return !(tombs[c.id] && tombs[c.id] > (c.updatedAt || 0)); });
      (a.boards || []).forEach(function (ab) {
        if (tombs[ab.id] && tombs[ab.id] > (ab.updatedAt || 0)) return;
        var ob = out.boards.find(function (x) { return x.id === ab.id; });
        if (!ob) { out.boards.push(clone(ab)); return; }
        var aNewer = (ab.updatedAt || 0) > (ob.updatedAt || 0);
        var structure = aNewer ? ab : ob;      // columns + card ordering
        // Union cards by id, newest edit wins.
        var byId = {};
        ob.cards.forEach(function (c) { byId[c.id] = c; });
        ab.cards.forEach(function (c) {
          if (!byId[c.id] || (c.updatedAt || 0) > (byId[c.id].updatedAt || 0)) byId[c.id] = clone(c);
        });
        Object.keys(tombs).forEach(function (id) {
          if (byId[id] && tombs[id] > (byId[id].updatedAt || 0)) delete byId[id];
        });
        var ordered = [];
        structure.cards.forEach(function (c) { if (byId[c.id]) { ordered.push(byId[c.id]); delete byId[c.id]; } });
        Object.keys(byId).forEach(function (id) { ordered.push(byId[id]); });
        ob.name = structure.name; ob.icon = structure.icon; ob.type = structure.type;
        ob.columns = clone(structure.columns); ob.updatedAt = structure.updatedAt;
        // Cards pointing at a column that no longer exists land in the first one.
        var colIds = {}; ob.columns.forEach(function (c) { colIds[c.id] = true; });
        ordered.forEach(function (c) { if (!colIds[c.colId] && ob.columns[0]) c.colId = ob.columns[0].id; });
        ob.cards = ordered;
      });
      // Drop tombstoned boards/members that survived the copy from b.
      out.boards = out.boards.filter(function (bd) { return !(tombs[bd.id] && tombs[bd.id] > (bd.updatedAt || 0)); });
      out.members = out.members.filter(function (m) { return !tombs[m.id]; });
      out.updatedAt = Math.max(a.updatedAt || 0, b.updatedAt || 0);
      return out;
    }
    function entomb(id) { doc.tombstones[id] = now(); pruneTombstones(); }
    function pruneTombstones() {
      var cutoff = now() - 90 * 86400000;
      Object.keys(doc.tombstones).forEach(function (id) { if (doc.tombstones[id] < cutoff) delete doc.tombstones[id]; });
    }

    function renderSidebar() {
      $('wsName').textContent = doc.workspace || 'FinMango HQ';
      var list = $('boardList'); list.innerHTML = '';
      doc.boards.forEach(function (b) {
        var btn = document.createElement('button');

        btn.innerHTML = '<span class="emoji">' + esc(b.icon || '📋') + '</span><span class="label">' + esc(b.name)
          + '</span><span class="count">' + b.cards.length + '</span>';
        btn.onclick = function () { openBoard(b.id); };
        list.appendChild(btn);
      });
      // Pages render as a tree: a page with a parentId sits indented under its
      // parent. Orphans (parent deleted on another device) surface at the top
      // level instead of vanishing; the visited set guards against merge cycles.
      var plist = $('pageList'); plist.innerHTML = '';
      var allPages = doc.pages || [];
      var pageIds = {}; allPages.forEach(function (x) { pageIds[x.id] = true; });
      var seen = {};
      function pageRow(p, depth) {
        if (seen[p.id]) return;
        seen[p.id] = true;

        btn.className = 'side-item' + (inPageMode() && p.id === ui.pageId ? ' active' : '');
        btn.dataset.pageId = p.id;

          + '</span>' + (p.public ? '<span class="count" title="On the public roadmap page">🌐</span>' : '');
        btn.onclick = function () {
          if (btn._dragged) { btn._dragged = false; return; } // a drag just ended, not a click
          openPage(p.id);
        };
        attachPageDrag(btn, p);
        plist.appendChild(btn);
        allPages.forEach(function (ch) { if (ch.parentId === p.id) pageRow(ch, depth + 1); });
      }
      allPages.forEach(function (p) {
        if (!p.parentId || !pageIds[p.parentId]) pageRow(p, 0);
      });

    // ---- drag a page row to re-nest it ------------------------------------
    // Drag a page onto another page → it becomes that page's sub-page. Drag it
    // onto the "Pages" header → back to the top level. Same feel as dragging
    // cards: mouse lifts after ~6px, touch after a short hold (tap still opens).
    var pageDrag = null; // { page, el, ghost, x, y, target, scroller, raf }
    function attachPageDrag(btn, p) {
      btn.addEventListener('contextmenu', function (e) { if (pageDrag) e.preventDefault(); });
      btn.addEventListener('pointerdown', function (e) {
        if (pageDrag || cardDrag) return;
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        var startX = e.clientX, startY = e.clientY;
        var touch = e.pointerType !== 'mouse';
        var pressTimer = touch ? setTimeout(lift, 250) : null;
        function lift() {
          pressTimer = null;
          btn._dragged = true; // swallow the click that follows pointerup
          startPageDrag(btn, p, startX, startY);
        }
        function onMove(ev) {
          if (!pageDrag) {
            var dist = Math.abs(ev.clientX - startX) + Math.abs(ev.clientY - startY);
            if (touch) { // moved before the hold completed → it's a scroll
              if (dist > 8 && pressTimer) { clearTimeout(pressTimer); cleanup(); }
              return;
            }
            if (dist < 6) return;
            lift();
          }
          movePageDrag(ev.clientX, ev.clientY);
        }
        function onUp() { var was = !!pageDrag; cleanup(); if (was) finishPageDrag(true); }
        function onCancel() { var was = !!pageDrag; cleanup(); if (was) finishPageDrag(false); }
        function cleanup() {
          if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          document.removeEventListener('pointercancel', onCancel);
        }
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
        document.addEventListener('pointercancel', onCancel);
      });
    }
    function startPageDrag(btn, p, px, py) {
      var r = btn.getBoundingClientRect();
      var ghost = btn.cloneNode(true);
      ghost.classList.add('drag-ghost-row');
      ghost.style.width = r.width + 'px';
      ghost.style.paddingLeft = ''; // ghost loses its tree indent — reads cleaner
      document.body.appendChild(ghost);
      btn.classList.add('dragging');
      pageDrag = { page: p, el: btn, ghost: ghost, x: px, y: py, target: null,
        scroller: document.querySelector('.side-scroll'), raf: 0, lblOld: '' };
      // Dragging a sub-page? Show the way out while the drag lasts.
      if (p.parentId) {
        var lbl = $('pagesLabel').querySelector('.mono');
        pageDrag.lblOld = lbl.textContent;
        lbl.textContent = 'Drop here → top level';
        $('pagesLabel').classList.add('drop-hint-zone');
      }
      movePageDrag(px, py);
      pageDrag.raf = requestAnimationFrame(pageDragAutoScroll);
    }
    function clearPageDropMarks() {
      document.querySelectorAll('.drop-into').forEach(function (n) { n.classList.remove('drop-into'); });
    }
    function movePageDrag(px, py) {
      var pd = pageDrag; if (!pd) return;
      pd.x = px; pd.y = py;
      pd.ghost.style.left = (px - 14) + 'px';
      pd.ghost.style.top = (py - 16) + 'px';
      clearPageDropMarks();
      pd.target = null;
      var under = document.elementFromPoint(px, py); // the ghost is pointer-events:none
      if (!under || !under.closest) return;
      var row = under.closest('#pageList .side-item');
      if (row && row !== pd.el) {
        row.classList.add('drop-into');
        pd.target = { row: row };
        return;
      }
      // "Out of the tree" targets: the Pages header, or any empty stretch of
      // the sidebar (below the lists) — dragging a sub-page out just works.
      if (under.closest('#pagesLabel') || under.id === 'pageList'
        || under.classList.contains('side-scroll')) {
        $('pagesLabel').classList.add('drop-into');
        pd.target = { top: true };
      }
    }
    function pageDragAutoScroll() {
      var pd = pageDrag; if (!pd) return;
      if (pd.scroller) {
        var r = pd.scroller.getBoundingClientRect();
        if (pd.y < r.top + 40) pd.scroller.scrollTop -= 8;
        else if (pd.y > r.bottom - 40) pd.scroller.scrollTop += 8;
      }
      pd.raf = requestAnimationFrame(pageDragAutoScroll);
    }
    function finishPageDrag(drop) {
      var pd = pageDrag; pageDrag = null;
      cancelAnimationFrame(pd.raf);
      pd.ghost.remove();
      pd.el.classList.remove('dragging');
      if (pd.lblOld) {
        $('pagesLabel').querySelector('.mono').textContent = pd.lblOld;
        $('pagesLabel').classList.remove('drop-hint-zone');
      }
      var target = pd.target;
      clearPageDropMarks();
      setTimeout(function () { pd.el._dragged = false; }, 350); // in case no click follows
      if (!drop || !target) return;
      var p = pd.page;
      var prev = p.parentId || '';
      function moveTo(parentId, msg) {
        p.parentId = parentId; p.updatedAt = now();
        mutate();
        toastUndo(msg, function () {
          p.parentId = prev; p.updatedAt = now();
          mutate();
        });
      }
      if (target.top) {
        if (!prev) return;
        moveTo('', 'Moved to top level');
        return;
      }
      var parent = (doc.pages || []).find(function (x) { return x.id === target.row.dataset.pageId; });
      if (!parent || parent.id === p.id) return;
      if (pageDescendants(p)[parent.id]) { toast('Can’t nest a page inside its own sub-pages'); return; }
      if (prev === parent.id) return;
      moveTo(parent.id, 'Moved under “' + parent.title + '”');
    }

    function visibleCards(b) {

    function renderView() {

    // ------------------ in-place table editing (read view) -----------------
    // Tables are the "site builder" surface: click any cell to edit it right
    // there, ＋ Row / ＋ Column below each table. All edits write back to the
    // markdown source lines, so the wiki format stays the source of truth.
    function tblParseLine(text) {
      return text.trim().replace(/^\|/, '').replace(/\|\s*$/, '').split('|').map(function (c) { return c.trim(); });
    }
    function tblBuildLine(cells) { return '| ' + cells.join(' | ') + ' |'; }
    function setupTableEditing(mdiv, p) {
      mdiv.querySelectorAll('.tablewrap [data-ln]').forEach(function (cell) {
        cell.setAttribute('contenteditable', 'plaintext-only');
        if (cell.contentEditable !== 'plaintext-only') cell.setAttribute('contenteditable', 'true');
        cell.addEventListener('input', function () { cell._dirty = true; });
        cell.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); cell.blur(); }
        });
        cell.addEventListener('blur', function () {
          if (!cell._dirty) return; // untouched cells never round-trip (keeps
          cell._dirty = false;      // bold/links in cells intact)
          var ln = Number(cell.dataset.ln), j = Number(cell.dataset.cell);
          var lines = p.body.split('\n');
          if (ln < 0 || ln >= lines.length) return;
          var cells = tblParseLine(lines[ln]);
          while (cells.length <= j) cells.push('');
          cells[j] = (cell.textContent || '').replace(/[|\n]/g, ' ').trim();
          lines[ln] = tblBuildLine(cells);
          p.body = lines.join('\n'); p.updatedAt = now();
          mutate({ noRender: true });
        });
      });
      mdiv.querySelectorAll('.tablewrap').forEach(function (wrap) {
        var first = Number(wrap.dataset.first), last = Number(wrap.dataset.last);
        wrap.querySelector('.tbl-add-row').onclick = function () {
          var lines = p.body.split('\n');
          var cols = tblParseLine(lines[first]).length;
          lines.splice(last + 1, 0, tblBuildLine(new Array(cols).fill('')));
          p.body = lines.join('\n'); p.updatedAt = now();
          mutate(); // re-render (scroll is preserved) so the new row is editable
        };
        wrap.querySelector('.tbl-add-col').onclick = function () {
          var lines = p.body.split('\n');
          for (var ln = first; ln <= last && ln < lines.length; ln++) {
            var cells = tblParseLine(lines[ln]);
            var isSep = cells.length > 0 && cells.every(function (x) { return /^:?-{2,}:?$/.test(x); });
            cells.push(isSep ? '---' : '');
            lines[ln] = tblBuildLine(cells);
          }
          p.body = lines.join('\n'); p.updatedAt = now();
          mutate();
        };

        // Hover ✕ buttons: delete the row you're on, or the column you're in.
        var rowDel = document.createElement('button');
        rowDel.className = 'tbl-del'; rowDel.textContent = '✕'; rowDel.title = 'Delete this row';
        var colDel = document.createElement('button');
        colDel.className = 'tbl-del'; colDel.textContent = '✕'; colDel.title = 'Delete this column';
        wrap.appendChild(rowDel); wrap.appendChild(colDel);
        var curRowLn = -1, curColIdx = -1;
        wrap.addEventListener('mouseover', function (e) {
          var tbl = wrap.querySelector('table');
          var td = e.target.closest('td[data-ln]');
          if (td) {
            var tr = td.parentElement;
            curRowLn = Number(td.dataset.ln);
            rowDel.style.display = 'block';
            rowDel.style.top = (tbl.offsetTop + tr.offsetTop + tr.offsetHeight / 2 - 9) + 'px';
            rowDel.style.left = (tbl.offsetLeft + tbl.offsetWidth - 22) + 'px';
          }
          var cell = e.target.closest('th[data-ln], td[data-ln]');
          if (cell) {
            curColIdx = Number(cell.dataset.cell);
            colDel.style.display = 'block';
            colDel.style.left = (tbl.offsetLeft + cell.offsetLeft + cell.offsetWidth - 20) + 'px';
            colDel.style.top = (tbl.offsetTop + 2) + 'px';
          }
        });
        wrap.addEventListener('mouseleave', function () {
          rowDel.style.display = 'none'; colDel.style.display = 'none';
        });
        rowDel.onclick = function () {
          var lines = p.body.split('\n');
          if (curRowLn < first || curRowLn > last || curRowLn >= lines.length) return;
          var hasContent = tblParseLine(lines[curRowLn]).some(function (x) { return x !== ''; });
          var before = p.body;
          lines.splice(curRowLn, 1);
          p.body = lines.join('\n'); p.updatedAt = now(); mutate();
          if (hasContent) toastUndo('Row deleted', function () { p.body = before; p.updatedAt = now(); mutate(); });
        };
        colDel.onclick = function () {
          var lines = p.body.split('\n');
          if (tblParseLine(lines[first]).length <= 1) { toast('A table needs at least one column'); return; }
          var before = p.body;
          for (var ln = first; ln <= last && ln < lines.length; ln++) {
            var cells = tblParseLine(lines[ln]);
            if (curColIdx >= 0 && curColIdx < cells.length) cells.splice(curColIdx, 1);
            lines[ln] = tblBuildLine(cells);
          }
          p.body = lines.join('\n'); p.updatedAt = now(); mutate();
          toastUndo('Column deleted', function () { p.body = before; p.updatedAt = now(); mutate(); });
        };
      });
    }

    // ---------------- page comments (highlight → 💬) -----------------------
    // Threads live at doc level ({id, pageId, quote, resolved, items[]}) and
    // anchor to the exact highlighted text: on render, the first occurrence of
    // the quote is wrapped in <mark>. If the text is later edited away, the
    // thread survives in the comments panel marked "text changed".
    function pageThreads(p) {
      return (doc.comments || []).filter(function (c) { return c.pageId === p.id; });
    }
    function addThread(p, quote, text) {
      var m = me();
      doc.comments.push({
        id: uid(), pageId: p.id, quote: String(quote || '').slice(0, 300), resolved: false,
        createdAt: now(), updatedAt: now(),
        items: [{ id: uid(), author: m ? m.name : 'Someone', color: m ? m.color : '#9A9A93',

    // Wrap the first occurrence of `quote` (searching across inline elements)

    function applyCommentHighlights(mdiv, p) {

    // -------------- click-any-block-to-edit (read view) --------------------
    // Clicking a paragraph, heading, list item, or quote makes that block
    // editable right where it is, fully rendered — bold looks bold while you
    // type, exactly like the ambassador-notes editor. No markdown on screen:
    // select text and a B / I / 🔗 pill appears; Ctrl+B / Ctrl+I work too.
    // Enter commits and keeps you writing in a fresh block below; Shift+Enter
    // is a line break; Escape cancels; emptying the text deletes the block.
    // Markdown stays the storage format — the HTML is converted back on save.
    function htmlToMdInline(node) {
      var out = '';
      Array.prototype.forEach.call(node.childNodes, function (n) {
        if (n.nodeType === 3) { out += n.nodeValue; return; }
        if (n.nodeType !== 1) return;
        var tag = n.tagName;
        if (tag === 'BR') { out += '\n'; return; }
        if (tag === 'INPUT' || tag === 'BUTTON') return; // task checkbox / ✎
        var inner = htmlToMdInline(n);
        if (tag === 'STRONG' || tag === 'B') out += inner.trim() ? '**' + inner + '**' : inner;
        else if (tag === 'EM' || tag === 'I') out += inner.trim() ? '*' + inner + '*' : inner;
        else if (tag === 'CODE') out += '`' + n.textContent + '`';
        else if (tag === 'A') out += n.classList.contains('wikilink')
          ? '[[' + n.textContent + ']]'
          : inner.trim() ? '[' + inner + '](' + (n.getAttribute('href') || '') + ')' : '';
        else if (tag === 'DIV' || tag === 'P' || tag === 'LI') out += (out && out.slice(-1) !== '\n' ? '\n' : '') + inner;

    // Floating B / I / 🔗 pill over a selection inside the block being edited.
    var fmtPill = null, fmtRegion = null, fmtPaused = false;
    function fmtLink() {

    function ensureFmtPill() {

      fmtPill.innerHTML = '<button data-cmd="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>'
        + '<button data-cmd="italic" title="Italic (Ctrl+I)"><em>I</em></button>'
        + '<button data-cmd="link" title="Add link (Ctrl+K)">🔗 Link</button>';

    function placeFmtPill() {

    function editBlockInPlace(el, p, selectAll) {
      if (fmtRegion) return; // one block at a time
      var r = (el.dataset.src || '').split('-').map(Number);
      if (isNaN(r[0]) || isNaN(r[1])) return;
      var first = p.body.split('\n')[r[0]] || '';

      // set aside and re-attached on commit — only the text gets edited.
      var pm = first.match(/^(#{1,3}\s+|[-*]\s+\[[ xX]\]\s+|[-*]\s+|\d+\.\s+|>\s?)/);
      var prefix = pm ? pm[1] : '';
      var isQuote = prefix.charAt(0) === '>';
      var isTask = /\[[ xX]\]/.test(prefix);

        selectAll: selectAll,
        commit: function (text, wantMore) {

    // Enter at the end of a block keeps the flow going: a fresh editable line

    function openGhostBlock(p, afterLine, prefix, wasLi) {

      Array.prototype.some.call(mdiv.querySelectorAll('[data-src]'), function (b) {
        var rr = b.dataset.src.split('-').map(Number);
        if (afterLine >= rr[0] && afterLine <= rr[1]) { refEl = b; return true; }
        return false;
      });
      if (!refEl) return;
      var isLi = wasLi && refEl.tagName === 'LI';
      var liPrefix = isLi ? (/\[[ xX]\]/.test(prefix) ? '- [ ] ' : /^\d/.test(prefix) ? '1. ' : '- ') : '';

    // Shared engine for both: make `region` contenteditable, wire the pill,

    function startRegionEdit(region, opts) {

        region.removeEventListener('keydown', onKey);
        region.removeEventListener('paste', onPaste);

        region.classList.remove('block-editing');

    function setupBlockEditing(mdiv, p) {

    // ----------------- ＋ Add block (read view) ----------------------------

    // ------------------ editor toolbar (edit view) -------------------------
    // Nobody should need to know markdown: one click inserts the right thing.
    function buildEditorToolbar(ta, onChanged) {

        ['I', function () { wrapSelection(ta, '*', '*', onChanged) || wrapCollapsed(ta, '*italic*', onChanged); }],
        ['🔗 Link', function () { insertLinkInEditor(ta, onChanged); }],
        ['• List', function () { prefixLine(ta, '- ', onChanged); }],
        ['☑ Task', function () { prefixLine(ta, '- [ ] ', onChanged); }],
        ['⊞ Table', function () { insertBlock(ta, TABLE_SNIPPET, onChanged); }],
        ['― Divider', function () { insertBlock(ta, '---\n', onChanged); }]

    // --------------------------- page view ---------------------------------
    function renderPage(root, p) {
      var scroll = document.createElement('div'); scroll.className = 'page-scroll';
      var wrap = document.createElement('div'); wrap.className = 'page-wrap';

      var meta = document.createElement('div'); meta.className = 'page-meta';
      var openCmts = pageThreads(p).filter(function (t) { return !t.resolved; }).length;
      meta.innerHTML = '<span class="page-badge' + (p.public ? ' pub' : '') + '">' + (p.public ? '🌐 public' : '🔒 team only') + '</span>'
        + '<button class="page-badge" id="pageCmtsBtn" title="Comments">💬' + (openCmts ? ' ' + openCmts : '') + '</button>'
        + '<span class="meta-line">edited ' + esc(relTime(p.updatedAt)) + '</span>';
      wrap.appendChild(meta);
      meta.querySelector('#pageCmtsBtn').onclick = function () { openCommentsModal(p); };

      if (ui.pageEdit) {
        var ta = document.createElement('textarea');
        ta.className = 'page-editor';
        ta.value = p.body;
        ta.placeholder = '# Start writing…\n\nMarkdown works: # headings, **bold**, - lists, [[Other Page]] wikilinks, ``` code blocks.\nLinks: just paste a URL (it auto-links), paste a URL over selected text, or Ctrl+K.';
        function pageChanged() { p.body = ta.value; p.updatedAt = now(); mutate({ noRender: true }); }
        ta.addEventListener('input', pageChanged);

      } else {

          : '<p class="page-empty-hint">This page is empty — click <strong>＋ Add</strong> below to start.</p>';
        // Task checkboxes are live: clicking one flips [ ]/[x] on its source
        // line, saves, and syncs like any other edit.
        mdiv.addEventListener('change', function (e) {
          var cb = e.target;
          if (!cb.matches || !cb.matches('input[type=checkbox][data-ln]')) return;
          var ln = Number(cb.getAttribute('data-ln'));
          var lines = p.body.split('\n');
          if (ln < 0 || ln >= lines.length) return;
          lines[ln] = lines[ln].replace(/^(\s*[-*]\s*)\[[ xX]\]/, '$1' + (cb.checked ? '[x]' : '[ ]'));
          p.body = lines.join('\n');
          p.updatedAt = now();
          // noRender: the checkbox and its CSS strikethrough already reflect the
          // new state natively — a full re-render would yank the scroll position.
          mutate({ noRender: true });
        });
        // wikilink navigation (and create-on-click for missing targets)
        mdiv.addEventListener('click', function (e) {
          var a = e.target.closest ? e.target.closest('a.wikilink') : null;
          if (!a) return;
          e.preventDefault();
          var name = a.getAttribute('data-wiki');
          var target = pageByTitle(name);
          if (target) { openPage(target.id); return; }
          // Notion-style: clicking a missing wikilink just creates the page.
          var np = { id: uid(), icon: '📄', title: name, body: '', public: false, createdAt: now(), updatedAt: now() };
          doc.pages.push(np);
          mutate({ noRender: true });
          openPage(np.id, true);
          toast('Created "' + name + '"');
        });
        wrap.appendChild(mdiv);
        applyCommentHighlights(mdiv, p);
        setupTableEditing(mdiv, p);
        setupBlockEditing(mdiv, p);

        appendAddBlock(wrap, p);

      scroll.appendChild(wrap); root.appendChild(scroll);
    }

    // --------------------------- board view --------------------------------
    function renderBoard(root, b) {
      var scroll = document.createElement('div'); scroll.className = 'board-scroll';

      var cards = visibleCards(b);

      b.columns.forEach(function (col) {

        var colCards = cards.filter(function (c) { return c.colId === col.id; });

        head.innerHTML = '<span class="col-dot" style="background:' + esc(col.color) + '"></span>'

          + '<span class="spacer"></span>';

        menuBtn.title = 'Column options';

    // ---------------- whiteboard boards (type: 'canvas') -------------------
    // A board can be a freeform canvas instead of kanban columns: cards carry
    // x/y/color and render as draggable sticky notes. Same sync engine — a
    // sticky is just a card, so merge, tombstones, comments and search all
    // work unchanged. Nothing on a whiteboard is ever exposed publicly (the
    // public roadmap only reads column-based boards).
    var STICKY_COLORS = ['#FFF3A3', '#FFC9DE', '#BFE3FF', '#C8F0C8', '#FFD9A3', '#E3D1FF'];
    function stickyTilt(id) {
      var h = 0;
      for (var i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) % 997;
      return (h % 50) / 10 - 2.5; // a stable -2.5°…+2.4° tilt per note
    }
    function renderWhiteboard(root, b) {
      var scroll = document.createElement('div'); scroll.className = 'wb-scroll';
      var bar = document.createElement('div'); bar.className = 'wb-toolbar';
      var addB = document.createElement('button'); addB.className = 'wb-add'; addB.textContent = '＋ Sticky note';
      addB.onclick = function () {
        addSticky(b, scroll.scrollLeft + 60 + Math.random() * 260, scroll.scrollTop + 80 + Math.random() * 200);
      };
      var hint = document.createElement('span'); hint.className = 'wb-hint';
      hint.textContent = 'Double-click anywhere to add a note · drag to move · click a note to type';
      bar.appendChild(addB); bar.appendChild(hint);
      var canvas = document.createElement('div'); canvas.className = 'wb-canvas';
      visibleCards(b).forEach(function (c) { canvas.appendChild(stickyEl(b, c)); });
      canvas.addEventListener('dblclick', function (e) {
        if (e.target !== canvas) return;
        var r = canvas.getBoundingClientRect();
        addSticky(b, e.clientX - r.left - 95, e.clientY - r.top - 40);
      });
      scroll.appendChild(bar); scroll.appendChild(canvas); root.appendChild(scroll);
    }

    function stickyEl(b, c) {
      var el = document.createElement('div'); el.className = 'sticky'; el.dataset.cardId = c.id;
      el.style.left = (c.x || 0) + 'px'; el.style.top = (c.y || 0) + 'px';
      el.style.background = c.color || STICKY_COLORS[0];
      el.style.transform = 'rotate(' + stickyTilt(c.id) + 'deg)';
      var txt = document.createElement('div'); txt.className = 'sticky-text'; txt.textContent = c.title || '';
      var who = document.createElement('div'); who.className = 'sticky-author'; who.textContent = c.author || '';
      var tools = document.createElement('div'); tools.className = 'sticky-tools';
      STICKY_COLORS.forEach(function (sc) {
        var d = document.createElement('button'); d.className = 'sticky-dot'; d.style.background = sc; d.title = 'Color';
        d.onclick = function (e) {
          e.stopPropagation();
          c.color = sc; c.updatedAt = now();
          el.style.background = sc;
          mutate({ noRender: true });
        };
        tools.appendChild(d);
      });
      var cmt = document.createElement('button'); cmt.className = 'sticky-tool';
      cmt.textContent = '💬' + (c.comments.length || '');
      cmt.title = 'Comments & details';
      cmt.onclick = function (e) { e.stopPropagation(); openCardModal(c.id); };
      var del = document.createElement('button'); del.className = 'sticky-tool'; del.textContent = '✕'; del.title = 'Delete note';
      del.onclick = function (e) {
        e.stopPropagation();
        var idx = b.cards.indexOf(c);
        entomb(c.id);
        b.cards.splice(idx, 1);
        b.updatedAt = now();
        mutate();
        toastUndo('Note deleted', function () {
          disentomb(c.id, c);
          b.cards.splice(Math.min(idx, b.cards.length), 0, c);
          b.updatedAt = now();
          mutate();
        });
      };
      tools.appendChild(cmt); tools.appendChild(del);
      el.appendChild(txt); el.appendChild(who); el.appendChild(tools);

      // One gesture, two meanings: moving past 5px is a drag; a plain click
      // (or tap) opens the note for typing.
      el.addEventListener('pointerdown', function (e) {
        if (el.classList.contains('wb-editing')) return;
        if (e.target.closest('.sticky-tools')) return;
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        var startX = e.clientX, startY = e.clientY;
        var baseL = c.x || 0, baseT = c.y || 0, moved = false;
        var canvas = el.parentNode;
        function onMove(ev) {
          var dx = ev.clientX - startX, dy = ev.clientY - startY;
          if (!moved && Math.abs(dx) + Math.abs(dy) < 5) return;
          moved = true; el.classList.add('wb-dragging');
          c.x = Math.max(0, Math.min(canvas.offsetWidth - 110, baseL + dx));
          c.y = Math.max(0, Math.min(canvas.offsetHeight - 70, baseT + dy));
          el.style.left = c.x + 'px'; el.style.top = c.y + 'px';
        }
        function onUp() {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          el.classList.remove('wb-dragging');
          if (moved) { c.updatedAt = now(); b.updatedAt = now(); mutate({ noRender: true }); }
          else startStickyEdit(b, c, el, txt);
        }
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
        e.preventDefault();
      });
      return el;
    }

    function startStickyEdit(b, c, el, txt) {
      el.classList.add('wb-editing');
      txt.setAttribute('contenteditable', 'plaintext-only');
      if (txt.contentEditable !== 'plaintext-only') txt.setAttribute('contenteditable', 'true');
      txt.focus();
      var sel = window.getSelection(), range = document.createRange();
      range.selectNodeContents(txt); range.collapse(false);
      sel.removeAllRanges(); sel.addRange(range);
      function done() {
        txt.removeEventListener('blur', done);
        txt.removeAttribute('contenteditable');
        el.classList.remove('wb-editing');
        var v = (txt.innerText || '').replace(/\u00a0/g, ' ').trim();
        if (!v && !c.title) {
          // A brand-new note left empty evaporates instead of littering.
          entomb(c.id);
          var i = b.cards.indexOf(c);
          if (i >= 0) b.cards.splice(i, 1);
          b.updatedAt = now();
          mutate();
          return;
        }
        if (!v) { txt.textContent = c.title; return; } // cleared by accident — keep the old text
        if (v !== c.title) { c.title = v.slice(0, 500); c.updatedAt = now(); mutate({ noRender: true }); }
      }
      txt.addEventListener('blur', done);
      txt.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { e.preventDefault(); txt.blur(); }
      });
    }

    function addSticky(b, x, y) {
      var m = me();
      var c = { id: uid(), colId: '', title: '', desc: '', assignee: '', due: '',
        tags: [], comments: [], discuss: false, public: false,
        x: Math.max(0, Math.round(x)), y: Math.max(0, Math.round(y)),
        color: STICKY_COLORS[Math.floor(Math.random() * STICKY_COLORS.length)],
        author: m ? m.name : '', createdAt: now(), updatedAt: now() };
      b.cards.push(c); b.updatedAt = now();
      mutate();
      var el = document.querySelector('.sticky[data-card-id="' + c.id + '"]');
      if (el) startStickyEdit(b, c, el, el.querySelector('.sticky-text'));
    }

    function cardEl(c) {
      var el = document.createElement('div'); el.className = 'card'; el.dataset.cardId = c.id;
      var html = '<div class="card-title">' + esc(c.title) + '</div>';
      if (c.desc) html += '<div class="card-desc-hint">' + esc(c.desc.split('\n')[0]) + '</div>';
      if (c.tags.length) {
        html += '<div class="card-tags">' + c.tags.map(function (t) {
          var tc = tagColor(t);
          return '<span class="tag" style="background:' + tc[0] + ';color:' + tc[1] + '">' + esc(t) + '</span>';
        }).join('') + '</div>';
      }
      var foot = '';
      var m = c.assignee ? member(c.assignee) : null;
      if (m) foot += avatarHtml(m);
      var due = fmtDue(c.due);
      if (due) foot += '<span class="due ' + due.cls + '">🗓 ' + esc(due.label) + '</span>';
      if (c.comments.length) foot += '<span class="comments-n">💬 ' + c.comments.length + '</span>';
      if (c.discuss) foot += '<span class="mini-badge" title="Flagged for the next leadership call">📞</span>';
      if (c.public) foot += '<span class="mini-badge" title="Shown on the public roadmap page">🌐</span>';
      if (foot) html += '<div class="card-foot">' + foot + '</div>';
      el.innerHTML = html;
      el.onclick = function () {
        if (el._dragged) { el._dragged = false; return; } // a drag just ended, not a click
        openCardModal(c.id);
      };
      attachCardDrag(el, c);
      return el;
    }

    function quickAddEl(b, col) {
      var box = document.createElement('div'); box.className = 'quick-add';
      var ta = document.createElement('textarea'); ta.rows = 2; ta.placeholder = 'Card title…';
      var row = document.createElement('div'); row.className = 'quick-add-row';
      var addB = document.createElement('button'); addB.className = 'btn-sm primary'; addB.textContent = 'Add card';
      var cancelB = document.createElement('button'); cancelB.className = 'btn-sm ghost'; cancelB.textContent = 'Cancel';
      function commit() {
        var t = ta.value.trim();
        if (t) {
          b.cards.push({ id: uid(), colId: col.id, title: t, desc: '', assignee: '', due: '',
            tags: [], comments: [], discuss: false, public: false, createdAt: now(), updatedAt: now() });
          b.updatedAt = now();
          mutate({ noRender: true });
        }
        ta.value = '';
        render();
        // keep the quick-add open for rapid entry
        var again = document.querySelector('.col-body[data-col-id="' + col.id + '"] .quick-add textarea');
        if (again) again.focus();
      }
      addB.onclick = commit;
      cancelB.onclick = function () { quickAddCol = null; render(); };
      ta.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { quickAddCol = null; render(); }
      });
      row.appendChild(addB); row.appendChild(cancelB);
      box.appendChild(ta); box.appendChild(row);
      setTimeout(function () { ta.focus(); }, 0);
      return box;
    }

    // Drag-and-drop helpers -------------------------------------------------
    // Cards drag via pointer events so phones work too (HTML5 drag-and-drop
    // never fires from touch). Mouse: press and move ~6px to lift. Touch:
    // hold a quarter second to lift — a plain swipe still scrolls the board,
    // and a tap still opens the card.
    var cardDrag = null; // { cardId, el, ghost, offX, offY, x, y, body, scroller, raf }
    document.addEventListener('touchmove', function (e) {
      if (cardDrag || pageDrag) e.preventDefault(); // the finger is moving a card/page, not scrolling
    }, { passive: false });

    function attachCardDrag(el, c) {
      el.addEventListener('contextmenu', function (e) { if (cardDrag) e.preventDefault(); });
      el.addEventListener('pointerdown', function (e) {
        if (cardDrag) return;
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        var startX = e.clientX, startY = e.clientY;
        var touch = e.pointerType !== 'mouse';
        var pressTimer = touch ? setTimeout(lift, 250) : null;

        function lift() {
          pressTimer = null;
          el._dragged = true; // swallow the click that follows pointerup
          startCardDrag(el, c, startX, startY);
        }
        function onMove(ev) {
          if (!cardDrag) {
            var dist = Math.abs(ev.clientX - startX) + Math.abs(ev.clientY - startY);
            if (touch) { // moved before the hold completed → it's a scroll
              if (dist > 8 && pressTimer) { clearTimeout(pressTimer); cleanup(); }
              return;
            }
            if (dist < 6) return;
            lift();
          }
          moveCardDrag(ev.clientX, ev.clientY);
        }
        function onUp() { var was = !!cardDrag; cleanup(); if (was) finishCardDrag(true); }
        function onCancel() { var was = !!cardDrag; cleanup(); if (was) finishCardDrag(false); }
        function cleanup() {
          if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          document.removeEventListener('pointercancel', onCancel);
        }
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
        document.addEventListener('pointercancel', onCancel);
      });
    }
    function startCardDrag(el, c, px, py) {
      var r = el.getBoundingClientRect();
      var ghost = el.cloneNode(true);
      ghost.classList.add('drag-ghost');
      ghost.style.width = r.width + 'px';
      document.body.appendChild(ghost);
      el.classList.add('dragging');
      cardDrag = { cardId: c.id, el: el, ghost: ghost, offX: px - r.left, offY: py - r.top,
        x: px, y: py, body: null, scroller: document.querySelector('.board-scroll'), raf: 0 };
      moveCardDrag(px, py);
      cardDrag.raf = requestAnimationFrame(dragAutoScroll);
    }
    function moveCardDrag(px, py) {
      var cd = cardDrag; if (!cd) return;
      cd.x = px; cd.y = py;
      cd.ghost.style.left = (px - cd.offX) + 'px';
      cd.ghost.style.top = (py - cd.offY) + 'px';
      var under = document.elementFromPoint(px, py); // the ghost is pointer-events:none
      var colEl = under && under.closest ? under.closest('.col') : null;
      // Over a gap (between columns, below a short one)? Keep the last hovered
      // column as the target — the drop hint stays visible, so the drop always
      // does exactly what the hint shows.
      if (colEl) cd.body = colEl.querySelector('.col-body');
      else if (cd.body && !document.contains(cd.body)) cd.body = null;
      if (cd.body) showDropHint(cd.body, py); else clearDropHints();
    }
    // Nudge the board sideways / the column vertically when the pointer nears
    // an edge, so every column is reachable even on a phone screen.
    function dragAutoScroll() {
      var cd = cardDrag; if (!cd) return;
      if (cd.scroller) {
        var r = cd.scroller.getBoundingClientRect();
        if (cd.x < r.left + 48) cd.scroller.scrollLeft -= 11;
        else if (cd.x > r.right - 48) cd.scroller.scrollLeft += 11;
      }
      if (cd.body) {
        var br = cd.body.getBoundingClientRect();
        if (cd.y < br.top + 44) cd.body.scrollTop -= 8;
        else if (cd.y > br.bottom - 44) cd.body.scrollTop += 8;
      }
      cd.raf = requestAnimationFrame(dragAutoScroll);
    }
    function finishCardDrag(drop) {
      var cd = cardDrag; cardDrag = null;
      cancelAnimationFrame(cd.raf);
      cd.ghost.remove();
      var b = board();
      // Compute the drop while the source card still has .dragging (cardNodes
      // excludes it), then let the re-render rebuild everything.
      if (drop && cd.body && b) dropCard(b, cd.cardId, cd.body.dataset.colId, dropIndexFor(cd.body, cd.y));
      else clearDropHints();
      cd.el.classList.remove('dragging');
      setTimeout(function () { cd.el._dragged = false; }, 350); // in case no click follows
    }

    function cardNodes(body) {
      return Array.prototype.filter.call(body.children, function (n) {
        return n.classList.contains('card') && !n.classList.contains('dragging');
      });
    }
    function dropIndexFor(body, y) {
      var nodes = cardNodes(body);
      for (var i = 0; i < nodes.length; i++) {
        var r = nodes[i].getBoundingClientRect();
        if (y < r.top + r.height / 2) return i;
      }
      return nodes.length;
    }
    function clearDropHints() {
      document.querySelectorAll('.drop-hint').forEach(function (n) { n.remove(); });
    }
    function showDropHint(body, y) {
      clearDropHints();
      var hint = document.createElement('div'); hint.className = 'drop-hint';
      var nodes = cardNodes(body), idx = dropIndexFor(body, y);
      if (idx >= nodes.length) body.appendChild(hint);
      else body.insertBefore(hint, nodes[idx]);
    }
    function dropCard(b, cardId, colId, visIndex) {
      clearDropHints();
      var card = b.cards.find(function (c) { return c.id === cardId; });
      if (!card) return;
      // visIndex counts only *visible* cards in the target column; translate it
      // into a position in the full cards array.
      var vis = visibleCards(b).filter(function (c) { return c.colId === colId && c.id !== cardId; });
      b.cards.splice(b.cards.indexOf(card), 1);
      card.colId = colId; card.updatedAt = now();
      var insertAt;
      if (visIndex >= vis.length) {
        var last = vis.length ? b.cards.indexOf(vis[vis.length - 1]) : -1;
        insertAt = last >= 0 ? last + 1 : b.cards.length;
      } else {
        insertAt = b.cards.indexOf(vis[visIndex]);
      }
      b.cards.splice(insertAt, 0, card);
      b.updatedAt = now();
      drag = null;
      mutate();
    }
    function dropColumn(b, dragId, targetId) {
      var from = b.columns.findIndex(function (c) { return c.id === dragId; });
      var to = b.columns.findIndex(function (c) { return c.id === targetId; });
      if (from < 0 || to < 0 || from === to) return;
      var col = b.columns.splice(from, 1)[0];
      b.columns.splice(to, 0, col);
      b.updatedAt = now();
      drag = null;
      mutate();
    }

    // --------------------------- table view --------------------------------
    function renderTable(root, b) {
      var scroll = document.createElement('div'); scroll.className = 'table-scroll';
      var cards = visibleCards(b);
      var html = '<table class="props"><thead><tr><th style="width:38%">Name</th><th>Status</th><th>Assignee</th>'
        + '<th>Due</th><th>Tags</th><th>Updated</th></tr></thead><tbody>';
      b.columns.forEach(function (col) {
        var rows = cards.filter(function (c) { return c.colId === col.id; });

          + esc(col.color) + ';margin-right:.45rem;"></span>' + esc(col.name)
          + ' <span class="col-count">' + rows.length + '</span></td></tr>';
        rows.forEach(function (c) {
          var m = c.assignee ? member(c.assignee) : null;
          var due = fmtDue(c.due);
          html += '<tr class="rowcard" data-card-id="' + esc(c.id) + '">'
            + '<td style="font-weight:600;">' + esc(c.title)
              + (c.discuss ? ' <span class="mini-badge" title="Flagged for next call">📞</span>' : '')
              + (c.public ? ' <span class="mini-badge" title="Public">🌐</span>' : '') + '</td>'
            + '<td><span class="status-chip"><span class="col-dot" style="background:' + esc(col.color) + '"></span>' + esc(col.name) + '</span></td>'
            + '<td>' + (m ? '<span class="cell-assignee">' + avatarHtml(m) + esc(m.name) + '</span>'
              : '<span style="color:var(--ink-faint)">—</span>') + '</td>'
            + '<td>' + (due ? '<span class="due ' + due.cls + '">' + esc(due.label) + '</span>' : '<span style="color:var(--ink-faint)">—</span>') + '</td>'
            + '<td>' + c.tags.map(function (t) { var tc = tagColor(t);
                return '<span class="tag" style="background:' + tc[0] + ';color:' + tc[1] + ';margin-right:.25rem;">' + esc(t) + '</span>'; }).join('') + '</td>'
            + '<td><span class="mono" style="text-transform:none;letter-spacing:0;">' + esc(relTime(c.updatedAt)) + '</span></td></tr>';
        });
      });
      html += '</tbody></table>';
      if (!cards.length) html = '<div class="empty" style="padding-top:4rem;"><div><p style="font-size:2rem;">🔍</p><p style="margin-top:.5rem;">Nothing matches.</p></div></div>';
      scroll.innerHTML = html;
      scroll.querySelectorAll('tr.rowcard').forEach(function (tr) {
        tr.onclick = function () { openCardModal(tr.dataset.cardId); };

    // ============================ MODALS ===================================
    function openModal(html, narrow) {
      var box = $('modalBox');
      box.className = 'modal' + (narrow ? ' narrow' : '');
      box.innerHTML = '<button class="icon-btn modal-close" id="modalClose" aria-label="Close">✕</button>' + html;
      $('modalClose').onclick = closeModal;
      $('overlay').classList.add('open');
    }
    function closeModal() { $('overlay').classList.remove('open'); $('modalBox').innerHTML = ''; }
    $('overlay').addEventListener('mousedown', function (e) { if (e.target === $('overlay')) closeModal(); });

    // --------------------------- card modal --------------------------------
    function openCardModal(cardId) {
      var b = board(); if (!b) return;
      var c = b.cards.find(function (x) { return x.id === cardId; }); if (!c) return;

      function touch() { c.updatedAt = now(); b.updatedAt = now(); mutate({ noRender: true }); }

      // Whiteboard stickies are cards too, but Status (no columns) and the
      // public-roadmap flag (whiteboards are never published) don't apply.
      var isWb = b.type === 'canvas';
      var html = '<input class="m-title" id="cTitle" value="' + esc(c.title) + '" aria-label="Card title" />'
        + '<div class="prop-grid">'
        + (isWb ? '' : '<label>Status</label><select id="cStatus">' + b.columns.map(function (col) {
            return '<option value="' + esc(col.id) + '"' + (col.id === c.colId ? ' selected' : '') + '>' + esc(col.name) + '</option>'; }).join('') + '</select>')
        + '<label>Assignee</label><select id="cAssignee"><option value="">Unassigned</option>' + doc.members.map(function (m) {
            return '<option value="' + esc(m.id) + '"' + (m.id === c.assignee ? ' selected' : '') + '>' + esc(m.name) + '</option>'; }).join('') + '</select>'
        + '<label>Due date</label><input type="date" id="cDue" value="' + esc(c.due) + '" />'
        + '<label>Tags</label><input id="cTags" placeholder="comma, separated" value="' + esc(c.tags.join(', ')) + '" />'
        + '<label>Next call</label><label class="check-row"><input type="checkbox" id="cDiscuss"' + (c.discuss ? ' checked' : '') + '> 📞 Discuss at next leadership call</label>'
        + (isWb ? '' : '<label>Visibility</label><label class="check-row"><input type="checkbox" id="cPublic"' + (c.public ? ' checked' : '') + '> 🌐 Show on the public roadmap <span class="hint">(title, notes &amp; tags only)</span></label>')
        + '</div>'
        + '<div class="m-section">Notes</div>'
        + '<textarea class="m-desc" id="cDesc" placeholder="Add details… Paste any URL (docs, sheets, sites) and it shows up as a clickable link below.">' + esc(c.desc) + '</textarea>'
        + '<div class="link-chips" id="cLinks"></div>'
        + '<div class="m-section">Comments</div>'
        + '<div id="cComments"></div>'
        + '<div class="comment-row"><input id="cCommentInput" placeholder="Write a comment… (never shown publicly)" />'
        + '<button class="btn-sm primary" id="cCommentAdd">Send</button></div>'
        + '<div class="modal-foot"><span class="meta-line">created ' + esc(relTime(c.createdAt)) + ' · edited ' + esc(relTime(c.updatedAt)) + '</span>'
        + '<button class="btn-sm danger" id="cDelete">Delete card</button></div>';
      openModal(html);

      function renderComments() {
        $('cComments').innerHTML = c.comments.length ? c.comments.map(function (cm) {
          return '<div class="comment">' + avatarHtml({ name: cm.author, color: cm.color, photo: cm.photo })
            + '<div class="body"><span class="who">' + esc(cm.author)
            + '</span><span class="when">' + esc(relTime(cm.ts)) + '</span><div class="text">' + esc(cm.text) + '</div></div></div>';
        }).join('') : '<p style="font-size:.82rem;color:var(--ink-faint);">No comments yet.</p>';
      }
      renderComments();

      $('cTitle').oninput = function () { c.title = this.value; touch(); };
      $('cTitle').onblur = function () { if (!c.title.trim()) { c.title = 'Untitled'; touch(); } render(); };
      if ($('cStatus')) $('cStatus').onchange = function () { c.colId = this.value; touch(); render(); };
      $('cAssignee').onchange = function () { c.assignee = this.value; touch(); render(); };
      $('cDue').onchange = function () { c.due = this.value; touch(); render(); };
      $('cTags').onchange = function () {
        c.tags = this.value.split(',').map(function (t) { return t.trim(); }).filter(Boolean).slice(0, 8);
        touch(); render();
      };
      $('cDiscuss').onchange = function () { c.discuss = this.checked; touch(); render(); };
      if ($('cPublic')) $('cPublic').onchange = function () { c.public = this.checked; touch(); render(); };
      function renderCardLinks() {
        var urls = extractUrls(c.desc);
        $('cLinks').innerHTML = urls.map(function (u) {
          var label = u.replace(/^https?:\/\/(www\.)?/, '');
          if (label.length > 42) label = label.slice(0, 40) + '…';
          return '<a class="link-chip" href="' + esc(u) + '" target="_blank" rel="noopener">🔗 ' + esc(label) + '</a>';
        }).join('');
      }
      renderCardLinks();
      $('cDesc').oninput = function () { c.desc = this.value; touch(); renderCardLinks(); };
      $('cDesc').onblur = function () { render(); };
      attachLinkPaste($('cDesc'), function () { c.desc = $('cDesc').value; touch(); renderCardLinks(); });
      attachSelectionToolbar($('cDesc'), function () { c.desc = $('cDesc').value; touch(); renderCardLinks(); });
      function addComment() {
        var v = $('cCommentInput').value.trim(); if (!v) return;
        var m = me();
        c.comments.push({ id: uid(), author: m ? m.name : 'Someone', color: m ? m.color : '#9A9A93',
          photo: m && m.photo ? m.photo : '', text: v, ts: now() });
        $('cCommentInput').value = '';
        touch(); renderComments(); render();
      }
      $('cCommentAdd').onclick = addComment;
      $('cCommentInput').addEventListener('keydown', function (e) { if (e.key === 'Enter') addComment(); });
      $('cDelete').onclick = function () {
        var idx = b.cards.indexOf(c);
        entomb(c.id);
        b.cards.splice(idx, 1);
        b.updatedAt = now();
        closeModal(); mutate();
        toastUndo('Card deleted', function () {
          disentomb(c.id, c);
          b.cards.splice(Math.min(idx, b.cards.length), 0, c);
          b.updatedAt = now();
          mutate();
        });
      };
    }

    // --------------------------- column modal ------------------------------

        };

        b.columns.splice(idx, 1);
        var first = b.columns[0];
        cardsIn.forEach(function (c) { c.colId = first.id; c.updatedAt = now(); });
        b.updatedAt = now();
        closeModal(); mutate();
        toastUndo('Column deleted' + (cardsIn.length ? ' — its cards moved to ' + first.name : ''), function () {
          b.columns.splice(Math.min(idx, b.columns.length), 0, col);
          cardsIn.forEach(function (c) { c.colId = col.id; c.updatedAt = now(); });
          b.updatedAt = now();
          mutate();
        });
      };
    }

    // ----------------------- board / page options --------------------------
    function openBoardMenu() {
      if (inPageMode()) { openPageMenu(); return; }
      var b = board(); if (!b) return;
      var html = '<h2>Board options</h2>'
        + '<label class="field-label">Name</label><input class="text-input" id="bName" value="' + esc(b.name) + '" />'
        + '<label class="field-label">Icon</label><div class="emoji-grid" id="bEmojis">'
        + EMOJIS.map(function (e) { return '<button data-e="' + e + '"' + (e === b.icon ? ' class="sel"' : '') + '>' + e + '</button>'; }).join('') + '</div>'
        + '<div class="modal-foot"><button class="btn-sm danger" id="bDelete">Delete board</button>'
        + '<button class="btn-sm primary" id="bSave">Save</button></div>';
      openModal(html, true);
      var icon = b.icon;
      $('bEmojis').querySelectorAll('button').forEach(function (btn) {
        btn.onclick = function () {
          icon = btn.dataset.e;
          $('bEmojis').querySelectorAll('button').forEach(function (x) { x.classList.remove('sel'); });
          btn.classList.add('sel');
        };
      });
      $('bSave').onclick = function () {
        var v = $('bName').value.trim();
        if (v) b.name = v;
        b.icon = icon; b.updatedAt = now();
        closeModal(); mutate();
      };
      $('bDelete').onclick = function () {
        if (doc.boards.length === 1) { toast('Keep at least one board'); return; }
        var idx = doc.boards.indexOf(b);
        entomb(b.id);
        doc.boards.splice(idx, 1);
        ui.boardId = doc.boards[0].id;
        closeModal(); mutate();
        toastUndo('Board "' + b.name + '" deleted', function () {
          disentomb(b.id, b);
          doc.boards.splice(Math.min(idx, doc.boards.length), 0, b);
          ui.boardId = b.id;
          mutate();
        });
      };
    }
    // Every page that may not become p's parent: itself and its descendants
    // (nesting under your own child would orphan the whole subtree in a loop).
    function pageDescendants(p) {
      var out = {}; out[p.id] = true;
      var grew = true;
      while (grew) {
        grew = false;
        (doc.pages || []).forEach(function (x) {
          if (x.parentId && out[x.parentId] && !out[x.id]) { out[x.id] = true; grew = true; }
        });
      }
      return out;
    }
    function openPageMenu() {
      var p = page(); if (!p) return;
      var blocked = pageDescendants(p);
      var html = '<h2>Page options</h2>'
        + '<label class="field-label">Icon</label><div class="emoji-grid" id="pEmojis">'
        + EMOJIS.map(function (e) { return '<button data-e="' + e + '"' + (e === p.icon ? ' class="sel"' : '') + '>' + e + '</button>'; }).join('') + '</div>'
        + '<label class="field-label" style="margin-top:1rem;">Nest under</label>'
        + '<select class="text-input" id="pParent"><option value="">— Top level —</option>'
        + (doc.pages || []).filter(function (x) { return !blocked[x.id]; }).map(function (x) {
            return '<option value="' + esc(x.id) + '"' + (x.id === p.parentId ? ' selected' : '') + '>'
              + esc((x.icon || '📄') + ' ' + x.title) + '</option>'; }).join('') + '</select>'
        + '<p class="help-note">Make this a sub-page of another page — it tucks in underneath it in the sidebar.</p>'
        + '<label class="field-label" style="margin-top:1rem;">Visibility</label>'
        + '<label class="check-row"><input type="checkbox" id="pPublic"' + (p.public ? ' checked' : '') + '> 🌐 Show on the public roadmap page</label>'
        + '<p class="help-note">Public pages appear (rendered) on finmango.org/roadmap for anyone to read. Everything else stays team-only.</p>'
        + '<div class="modal-foot"><button class="btn-sm danger" id="pDelete">Delete page</button>'
        + '<button class="btn-sm primary" id="pSave">Save</button></div>';
      openModal(html, true);
      var icon = p.icon;
      $('pEmojis').querySelectorAll('button').forEach(function (btn) {
        btn.onclick = function () {
          icon = btn.dataset.e;
          $('pEmojis').querySelectorAll('button').forEach(function (x) { x.classList.remove('sel'); });
          btn.classList.add('sel');
        };
      });
      $('pSave').onclick = function () {
        p.icon = icon;
        p.public = $('pPublic').checked;
        p.parentId = $('pParent').value || '';
        p.updatedAt = now();
        closeModal(); mutate();
      };
      $('pDelete').onclick = function () {
        var idx = doc.pages.indexOf(p);
        // Sub-pages survive: they move up to the deleted page's own parent.
        var kids = doc.pages.filter(function (x) { return x.parentId === p.id; });
        kids.forEach(function (k) { k.parentId = p.parentId || ''; k.updatedAt = now(); });
        entomb(p.id);
        doc.pages.splice(idx, 1);
        ui.pageId = null; ui.view = 'board';
        closeModal(); mutate();
        toastUndo('Page "' + p.title + '" deleted', function () {
          disentomb(p.id, p);
          doc.pages.splice(Math.min(idx, doc.pages.length), 0, p);
          kids.forEach(function (k) { k.parentId = p.id; k.updatedAt = now(); });
          openPage(p.id);
          mutate();
        });
      };
    }

    // --------------------------- members modal -----------------------------
    function openMembersModal() {
      var rows = doc.members.map(function (m) {
        return '<div class="member-row">' + avatarHtml(m, 'margin:0;')
          + '<span class="name">' + esc(m.name) + (m.email ? ' <span class="you" title="Signed in with Google">✓</span>' : '')
          + (m.id === meId ? ' <span class="you">— you</span>' : '') + '</span>'
          + '<button class="btn-sm danger" data-del="' + esc(m.id) + '">Remove</button></div>';
      }).join('');
      var html = '<h2>Team members</h2>' + (rows || '<p class="help-note">No members yet — everyone appears here automatically when they sign in.</p>')
        + '<p class="help-note" style="margin-top:.9rem;">Members are added automatically when someone signs in with their @' + esc(ALLOWED_DOMAIN)
        + ' account — names and photos come straight from Google. Assign cards and sign comments as them.</p>';
      openModal(html, true);
      document.querySelectorAll('[data-del]').forEach(function (btn) {
        btn.onclick = function () {
          var m = member(btn.dataset.del); if (!m) return;
          var idx = doc.members.indexOf(m), wasMe = meId === m.id, had = [];
          entomb(m.id);
          doc.boards.forEach(function (bd) { bd.cards.forEach(function (c) {
            if (c.assignee === m.id) { had.push(c); c.assignee = ''; c.updatedAt = now(); } }); });
          doc.members.splice(idx, 1);
          if (wasMe) { meId = ''; localStorage.removeItem(LS_ME); }
          mutate(); openMembersModal();
          toastUndo(m.name + ' removed', function () {
            disentomb(m.id);
            doc.members.splice(Math.min(idx, doc.members.length), 0, m);
            had.forEach(function (c) { c.assignee = m.id; c.updatedAt = now(); });
            if (wasMe) { meId = m.id; localStorage.setItem(LS_ME, meId); }
            mutate();
            if ($('overlay').classList.contains('open')) openMembersModal();
          });
        };
      });
    }

    // --------------------------- sync modal --------------------------------
    function openSyncModal() {
      var status;
      if (!canSync()) status = 'Not connected — this workspace lives only in this browser.';
      else if (sync.configured === false) status = 'The sync backend isn\'t deployed yet (see below).';
      else if (sync.status === 'synced') status = '✅ Connected — the whole team sees this workspace.';
      else if (sync.status === 'error') status = '⚠️ Connection trouble — check your access, or try again.';
      else status = 'Connecting…';
      var html = '<h2>Access &amp; sync</h2>'
        + '<p class="help-note">' + esc(status) + '</p>'
        + '<div class="m-section">Sign in with FinMango</div>'
        + (authValid()
          ? '<div class="signed-in-row">' + avatarHtml({ name: auth.name, color: '#FF6B35', photo: auth.picture }, 'margin:0;')
            + '<span class="who"><span class="n">' + esc(auth.name) + '</span><br><span class="e">' + esc(auth.email) + '</span></span>'
            + '<button class="btn-sm ghost" id="gsiSignOut">Sign out</button></div>'
          : gsiConfigured()
            ? '<div class="gsi-wrap" id="gsiBtnSync"></div>'
              + '<p class="help-note">For @' + esc(ALLOWED_DOMAIN) + ' accounts — your name and photo carry over automatically, no key needed.</p>'
            : '<p class="help-note">Not configured yet — see the Google Sign-In section of <code>docs/TEAM-BOARD-SETUP.md</code>.</p>')
        + '<div class="m-section">Team key (fallback)</div>'
        + '<input class="text-input" id="syncKey" type="password" placeholder="Shared team passphrase" value="' + esc(sync.key) + '" />'
        + '<p class="help-note">A shared passphrase for access without a FinMango account — ask Scott. Note: names and photos come from Google sign-in, so key-only edits aren\'t attributed to a person.</p>'
        + '<p class="help-note">Either door syncs every change to a shared Google Sheet (free) and updates everyone\'s workspace within seconds. First-time backend setup: <code>docs/TEAM-BOARD-SETUP.md</code>.</p>'
        + '<div class="m-section">Backup</div>'
        + '<div style="display:flex;gap:.5rem;flex-wrap:wrap;">'
        + '<button class="btn-sm ghost" id="exportBtn" style="border:1px dashed var(--ink-line);">⬇ Download backup</button>'
        + '<button class="btn-sm ghost" id="importBtn" style="border:1px dashed var(--ink-line);">⬆ Restore from file…</button></div>'
        + '<p class="help-note">The whole workspace as a JSON file — handy before big reorganizations. Every synced version is also kept in the storage Sheet (<strong>File → Version history</strong> in Google Sheets).</p>'
        + '<input type="file" id="importFile" accept="application/json" style="display:none;" />'
        + '<div class="modal-foot">'
        + (sync.key ? '<button class="btn-sm danger" id="syncOff">Forget key</button>' : '<span></span>')
        + '<button class="btn-sm primary" id="syncOn">' + (sync.key ? 'Update key' : 'Connect with key') + '</button></div>';
      openModal(html, true);
      $('exportBtn').onclick = function () {
        var blob = new Blob([JSON.stringify(doc, null, 2)], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'finmango-hq-' + new Date().toISOString().slice(0, 10) + '.json';
        a.click(); URL.revokeObjectURL(a.href);
      };
      $('importBtn').onclick = function () { $('importFile').click(); };
      $('importFile').onchange = function () {
        var f = this.files[0]; if (!f) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var d = JSON.parse(reader.result);
            if (!d || !Array.isArray(d.boards)) throw new Error('bad');
            if (!confirm('Replace the current workspace with this backup?')) return;
            doc = d; migrate();
            ui.boardId = doc.boards[0] && doc.boards[0].id;
            ui.pageId = null; ui.view = 'board';
            closeModal(); mutate(); toast('Workspace restored');
          } catch (e) { toast('That file doesn\'t look like a workspace backup'); }
        };
        reader.readAsText(f);
      };
      renderGsiButton('gsiBtnSync');
      var so = $('gsiSignOut');
      if (so) so.onclick = signOutGoogle;
      $('syncOn').onclick = function () {
        var k = $('syncKey').value.trim();
        if (!k) { toast('Enter the team key first'); return; }
        sync.key = k; localStorage.setItem(LS_KEY, k);
        sync.serverVersion = 0;
        closeModal(); pullLoad(true);
      };
      var off = $('syncOff');
      if (off) off.onclick = function () {
        sync.key = ''; localStorage.removeItem(LS_KEY);
        sync.serverVersion = 0; sync.configured = null;
        if (!authValid()) setSyncStatus('local');
        closeModal();
        toast('Key forgotten' + (authValid() ? ' — still signed in with Google' : ' — changes stay on this device'));
      };
    }

    // --------------------------- backup modal ------------------------------
    // ---------------------- ambassador notes (review tab) -------------------
    // The full write.html → review → publish pipeline, living inside HQ as a
    // first-class tab. The backend bridges to the posts Apps Script with a
    // server-side review key, so being signed in here is the only credential.
    var PR_STATUS = { pending: ['Pending', '#E8A33D'], changes: ['Changes requested', '#E5511B'],
      approved: ['Approved', '#3E9A5F'], rejected: ['Rejected', '#D9534F'], published: ['Published', '#9A9A93'] };
    // The queue paints instantly from the last-seen copy (localStorage) and
    // refreshes in the background — the two Apps Script cold starts behind
    // each live fetch cost ~4-5s, so we never make the user wait on them.
    var notes = { posts: null, loading: false, refreshing: false, error: null, openId: null, detail: {} };
    try {
      var cachedNotes = JSON.parse(localStorage.getItem(LS_NOTES) || 'null');
      if (cachedNotes && cachedNotes.posts) notes.posts = cachedNotes.posts;
    } catch (e) {}
    function postsApi(payload) {
      return fetch('/api/board', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify(Object.assign(payload, creds()))

      UL: [], OL: [], LI: [], BLOCKQUOTE: [], HR: [], IMG: ['src', 'alt'], FIGURE: [], FIGCAPTION: [], DIV: [], SPAN: [], IFRAME: [] };

        Array.prototype.slice.call(node.childNodes).forEach(function (child) {
          if (child.nodeType === 1) {

            // source text can't leak into the post); other unknown tags unwrap,
            // preserving their text content.
            if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'NOSCRIPT' || tag === 'TEMPLATE') { node.removeChild(child); return; }

              while (child.firstChild) node.insertBefore(child.firstChild, child);
              node.removeChild(child); return walk(node);
            }

        var p = page();
        if (v) { p.title = v.slice(0, 80); p.updatedAt = now(); mutate(); } else this.value = p.title;
      } else {
        var b = board(); if (!b) return;
        if (v) { b.name = v.slice(0, 60); b.updatedAt = now(); mutate(); } else this.value = b.name;
      }
    });
    $('boardEmoji').onclick = openBoardMenu;
    $('boardMenuBtn').onclick = openBoardMenu;
    $('viewBoardBtn').onclick = function () { ui.view = 'board'; persistLocal(); render(); };
    $('viewTableBtn').onclick = function () { ui.view = 'table'; persistLocal(); render(); };
    $('pageSrcBtn').onclick = function () { ui.pageEdit = !ui.pageEdit; render(); };
    $('agendaBtn').onclick = function () { ui.agenda = !ui.agenda; render(); };
    $('searchInput').addEventListener('input', function () { ui.search = this.value; renderView(); });
    $('membersBtn').onclick = openMembersModal;
    $('notesNavBtn').onclick = openNotesView;
    $('syncBtn').onclick = openSyncModal;
    $('qfHint').onclick = openQuickFind;
    // Clicking anywhere outside an open ＋ Add menu closes it.
    document.addEventListener('click', function (e) {
      document.querySelectorAll('.add-block-menu').forEach(function (m) {
        if (m.style.display !== 'none' && !m.parentNode.contains(e.target)) m.style.display = 'none';
      });
    });
    document.addEventListener('keydown', function (e) {
      if (!booted) return;
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        // In an editor, Ctrl/Cmd+K means "insert link" (the universal muscle
        // memory); anywhere else it opens quick find.
        var ae = document.activeElement;
        if (fmtRegion && ae === fmtRegion) { fmtLink(); return; }
        if (ae && ae.tagName === 'TEXTAREA' && (ae.classList.contains('page-editor') || ae.id === 'cDesc')) {
          insertLinkInEditor(ae, function () {
            ae.dispatchEvent(new Event('input', { bubbles: false }));
          });
          return;
        }
        openQuickFind(); return;
      }
      if (e.key === 'Escape') {
        closeModal();
        document.querySelectorAll('.add-block-menu').forEach(function (m) { m.style.display = 'none'; });
      }
    });

    // ============================== BOOT / GATE ============================
    // Nothing renders — not even the seeded starter content — until the
    // visitor is signed in (Google) or has entered the team key. Data safety
    // lives server-side; the gate keeps the workspace out of casual view and
    // stops teammates from unknowingly editing an unsynced local copy.
    var booted = false;

    function bootApp() {
      if (booted) return;
      booted = true;
      $('gate').style.display = 'none';
      $('app').style.display = 'flex';
      loadLocal();
      if (authValid()) ensureGoogleMember();
      if (window.innerWidth <= 760) ui.sidebarClosed = true;
      render();
      setSyncStatus('local');
      if (canSync()) {
        pullLoad(true);
        // Warm the ambassador-notes queue in the background so the tab (and
        // its badge) are ready before anyone clicks — the live fetch takes
        // several seconds through two Apps Script cold starts.
        setTimeout(function () { if (!notes.loading) loadNotes(); }, 2500);
      }
    }

    function showGate() {
      $('gate').style.display = 'flex';
      // The GIS script loads async — keep trying briefly, then render the
      // button and fire One Tap so returning folks re-enter with one click.
      var tries = 0;
      var timer = setInterval(function () {
        if (initGsi()) {
          clearInterval(timer);
          renderGsiButton('gsiBtnGate');
          try { google.accounts.id.prompt(); } catch (e) {}
        } else if (++tries > 40) { clearInterval(timer); }
      }, 250);
      function submitKey() {
        var k = $('gateKey').value.trim();
        if (!k) { $('gateErr').textContent = 'Enter the team key first.'; return; }
        $('gateErr').textContent = '';
        $('gateGo').disabled = true; $('gateGo').textContent = '…';
        // Pre-verify against the backend so a wrong key doesn't get past the door.
        fetch('/api/board', {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ action: 'load', key: k })
        }).then(function (r) { return r.status === 503 ? { result: 'unconfigured' } : r.json(); })
          .then(function (res) {
            $('gateGo').disabled = false; $('gateGo').textContent = 'Enter';
            if (res.result === 'success' || res.result === 'unconfigured') {
              // 'unconfigured' = backend not deployed yet; let the key holder in
              // to work locally rather than locking the team out during setup.
              sync.key = k; localStorage.setItem(LS_KEY, k);
              bootApp();
            } else if (String(res.error || '').indexOf('key') > -1 || String(res.error || '').indexOf('ACCESS_KEY') > -1) {
              $('gateErr').textContent = 'That key doesn\'t match — check with Scott.';
            } else {
              $('gateErr').textContent = 'Couldn\'t reach the backend — try again in a minute.';
            }
          })
          .catch(function () {
            $('gateGo').disabled = false; $('gateGo').textContent = 'Enter';
            $('gateErr').textContent = 'Couldn\'t reach the backend — try again in a minute.';
          });
      }
      $('gateGo').onclick = submitKey;
      $('gateKey').addEventListener('keydown', function (e) { if (e.key === 'Enter') submitKey(); });
      $('gateKeyToggle').onclick = function () {
        this.style.display = 'none';
        $('gateKeyArea').style.display = 'block';
        $('gateKey').focus();
      };
    }

    // ============================== INIT ===================================
    if (auth && !authValid()) { auth = null; localStorage.removeItem(LS_AUTH); } // expired token from a previous visit
    if (authValid() || sync.key) bootApp(); else showGate();

    // Once the GIS script lands (post-boot path): enable One Tap so returning
    // @finmango.org folks are silently re-signed-in when their token lapses.
    window.addEventListener('load', function () {
      if (booted && initGsi() && !authValid()) {
        try { google.accounts.id.prompt(); } catch (e) {}
      }
    });

    // Poll for teammates' changes; also refresh when the tab regains focus.
    setInterval(function () {
      if (booted && canSync() && !sync.dirty && !sync.pushing && !document.hidden) pullLoad(false);
    }, 15000);
    document.addEventListener('visibilitychange', function () {
      if (booted && !document.hidden && canSync() && !sync.dirty && !sync.pushing) pullLoad(false);
    });
    window.addEventListener('beforeunload', function () {
      if (booted && sync.dirty && canSync()) {
        // best-effort final save
        try {
          navigator.sendBeacon && navigator.sendBeacon('/api/board', new Blob([JSON.stringify(Object.assign({
            action: 'save', baseVersion: sync.serverVersion,
            author: me() ? me().name : '', data: doc }, creds()))], { type: 'text/plain' }));
        } catch (e) {}
      }
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinMango Community Post</title>
  <meta name="description" content="A community-authored report, brief, or story published on FinMango.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --paper: #FAFAF7; --ink: #0A0A0A; --orange: #FF6B35; --orange-deep: #E5511B;
      --ink-dim: rgba(10,10,10,.62); --ink-faint: rgba(10,10,10,.38);
      --ink-line: rgba(10,10,10,.1); --ink-line-soft: rgba(10,10,10,.06);
      --paper-dim: rgba(250,250,247,.64); --paper-faint: rgba(250,250,247,.4); --paper-line: rgba(250,250,247,.12);
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
      --max-width: 1280px; --gutter: 2.5rem;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--paper); color: var(--ink); line-height: 1.5; font-size: 17px;
      overflow-x: hidden; -webkit-font-smoothing: antialiased; font-feature-settings: "ss01" on, "cv11" on; }
    ::selection { background: var(--orange); color: #fff; }
    a { color: inherit; }

    /* NAV (shared) */
    nav { position: fixed; top: 0; width: 100%; background: rgba(250,250,247,.92); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); z-index: 1050; padding: 1.4rem 0; transition: padding .3s, border-color .3s; border-bottom: 1px solid transparent; }
    nav.scrolled { padding: .9rem 0; border-bottom-color: var(--ink-line-soft); }
    .nav-container { max-width: var(--max-width); margin: 0 auto; padding: 0 var(--gutter); display: flex; justify-content: space-between; align-items: center; gap: 2rem; }
    .logo img { height: 40px; display: block; transition: height .3s; }
    nav.scrolled .logo img { height: 34px; }
    .nav-right { display: flex; gap: 2rem; align-items: center; }
    .nav-right > a { color: var(--ink); text-decoration: none; font-weight: 500; font-size: .92rem; white-space: nowrap; }
    .btn-donate { background: var(--orange); color: #fff !important; padding: .55rem 1.15rem; font-size: .82rem !important; font-weight: 600 !important; text-decoration: none; }
    .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: .25rem 0; }
    .mobile-menu-btn span { display: block; width: 26px; height: 2px; background: var(--ink); margin: 6px 0; }

    .article-wrap { padding: 8rem var(--gutter) 5rem; }
    .article { max-width: 720px; margin: 0 auto; }
    .back-link { font-family: var(--font-mono); font-size: .66rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink-faint); text-decoration: none; display: inline-block; margin-bottom: 2rem; }
    .back-link:hover { color: var(--orange); }
    .article-cat { font-family: var(--font-mono); font-size: .62rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: .16em; color: var(--orange); display: block; margin-bottom: 1.1rem; }
    .article-title { font-size: clamp(2.1rem, 4.5vw, 3.4rem); font-weight: 900; line-height: 1.04; letter-spacing: -.04em; text-wrap: balance; }
    .article-dek { font-size: clamp(1.1rem, 1.7vw, 1.35rem); font-weight: 300; line-height: 1.45; color: var(--ink-dim); letter-spacing: -.015em; margin-top: 1rem; }
    .article-meta { display: flex; align-items: center; gap: .9rem; flex-wrap: wrap; margin-top: 1.6rem; padding-top: 1.4rem;
      border-top: 1px solid var(--ink-line); font-family: var(--font-mono); font-size: .68rem; letter-spacing: .04em; color: var(--ink-faint); text-transform: uppercase; }
    .article-meta strong { color: var(--ink); font-weight: 500; }
    .article-cover { margin: 2.5rem 0; }
    .article-cover img { width: 100%; height: auto; display: block; }
    .article-body { font-size: 1.16rem; line-height: 1.72; color: var(--ink); letter-spacing: -.003em; }
    .article-body > *:first-child { margin-top: 0; }
    .article-body p { margin: 1.35rem 0; }
    .article-body h2 { font-size: 1.75rem; font-weight: 900; letter-spacing: -.03em; line-height: 1.15; margin: 2.6rem 0 .9rem; }
    .article-body h3 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.02em; margin: 2rem 0 .7rem; }
    .article-body a { color: var(--ink); text-decoration: underline; text-decoration-color: var(--orange); text-underline-offset: 3px; text-decoration-thickness: 2px; }
    .article-body ul, .article-body ol { margin: 1.35rem 0; padding-left: 1.4rem; }
    .article-body li { margin: .5rem 0; }
    .article-body blockquote { margin: 1.8rem 0; padding: .4rem 0 .4rem 1.5rem; border-left: 3px solid var(--orange); font-size: 1.35rem; font-weight: 300; line-height: 1.45; letter-spacing: -.015em; }
    .article-body img { width: 100%; height: auto; display: block; margin: 2rem 0; }
    .article-body figcaption { font-family: var(--font-mono); font-size: .66rem; letter-spacing: .04em; color: var(--ink-faint); margin-top: .6rem; text-transform: uppercase; }
    .article-body hr { border: none; border-top: 1px solid var(--ink-line); margin: 2.6rem 0; }

    .article-foot { max-width: 720px; margin: 3.5rem auto 0; padding-top: 1.6rem; border-top: 1px solid var(--ink-line);
      font-size: .9rem; color: var(--ink-dim); font-weight: 300; }
    .article-foot a { color: var(--ink); text-decoration-color: var(--orange); }

    .state { max-width: 640px; margin: 0 auto; padding: 9rem var(--gutter) 6rem; text-align: center; color: var(--ink-dim); }
    .state h1 { font-size: 2rem; font-weight: 900; letter-spacing: -.03em; color: var(--ink); margin-bottom: .8rem; }
    .state a { color: var(--orange); }

    footer { background: var(--ink); color: var(--paper); border-top: 1px solid var(--paper-line); }
    .footer-bottom { max-width: var(--max-width); margin: 0 auto; padding: 1.75rem var(--gutter); display: flex; justify-content: space-between;
      align-items: center; font-family: var(--font-mono); font-size: .66rem; letter-spacing: .06em; color: var(--paper-faint); gap: 1rem; flex-wrap: wrap; }
    .footer-bottom a { color: var(--paper-dim); text-decoration: none; margin-left: 1.25rem; }
    .footer-bottom img { height: 22px; filter: brightness(0) invert(1); opacity: .9; }

    @media (max-width: 968px) {
      :root { --gutter: 1.5rem; } body { font-size: 16px; }
      .nav-right { display: none; } .mobile-menu-btn { display: block; }
      .article-wrap { padding: 7rem var(--gutter) 4rem; }
    }
  </style>
</head>

<body>
  <nav id="nav">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="finmango.png" alt="FinMango"></a>
      <div class="nav-right">
        <a href="research.html">Research</a>
        <a href="posts.html">Community Posts</a>
        <a href="get-involved.html">Get Involved</a>
        <a href="donate.html" class="btn-donate">Donate</a>
      </div>
      <button class="mobile-menu-btn" onclick="location.href='posts.html'" aria-label="All posts"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <main id="main">
    <div class="state" id="loading"><p>Loading…</p></div>
  </main>

  <footer>
    <div class="footer-bottom">
      <div style="display:flex;align-items:center;gap:1rem;"><img src="finmango.png" alt="FinMango"><span>&copy; 2026 FinMango. All rights reserved.</span></div>
      <div><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="get-involved.html">Write for us</a></div>
    </div>
  </footer>

  <script>
    // Paste your deployed Apps Script Web App URL (see docs/POSTS-SETUP.md).
    const API_URL = 'https://script.google.com/macros/s/AKfycbx2amacbswAk6X_d-Jd-6YqAjXNBpkGepY2odoFREmTRl3hE_EVBNF3ji5-UNfpur1ndA/exec';

    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50), { passive: true });

    const escapeHtml = s => (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    // Whitelist sanitizer — same contract as write.html. Never trust stored HTML.
    const ALLOWED = { H2:[], H3:[], P:[], BR:[], STRONG:[], B:[], EM:[], I:[], U:[], A:['href'], UL:[], OL:[], LI:[], BLOCKQUOTE:[], HR:[], IMG:['src','alt'], FIGURE:[], FIGCAPTION:[], DIV:[], SPAN:[] };
    function sanitize(html) {
      const doc = new DOMParser().parseFromString('<div>' + (html || '') + '</div>', 'text/html');
      const root = doc.body.firstChild;
      (function walk(node) {
        [...node.childNodes].forEach(child => {
          if (child.nodeType === 1) {
            const tag = child.tagName;
            if (!ALLOWED[tag]) { while (child.firstChild) node.insertBefore(child.firstChild, child); node.removeChild(child); return walk(node); }
            [...child.attributes].forEach(attr => {
              const ok = ALLOWED[tag].includes(attr.name);
              const safeHref = attr.name === 'href' && !/^\s*javascript:/i.test(attr.value);
              const safeSrc = attr.name === 'src' && /^(https?:|data:image\/)/i.test(attr.value);
              if (!ok || (attr.name === 'href' && !safeHref) || (attr.name === 'src' && !safeSrc)) child.removeAttribute(attr.name);
            });
            if (tag === 'A' && child.getAttribute('href')) { child.setAttribute('target', '_blank'); child.setAttribute('rel', 'noopener noreferrer'); }
            walk(child);
          } else if (child.nodeType !== 3) { node.removeChild(child); }
        });
      })(root);
      return root.innerHTML;
    }
    const fmtDate = iso => { try { return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }); } catch { return ''; } };

    function showState(title, htmlMsg) {
      document.getElementById('main').innerHTML =
        '<div class="state"><h1>' + escapeHtml(title) + '</h1><p>' + htmlMsg + '</p></div>';
      document.title = title + ' — FinMango';
    }

    function render(p) {
      const tagLine = [p.category, (p.tags || []).join(' · ')].filter(Boolean).join('  ·  ');
      const cover = p.cover ? '<div class="article-cover"><img src="' + escapeHtml(p.cover) + '" alt=""></div>' : '';
      const affil = p.authorAffiliation ? (' — ' + escapeHtml(p.authorAffiliation)) : '';
      document.getElementById('main').innerHTML =
        '<div class="article-wrap"><article class="article">' +
          '<a href="posts.html" class="back-link">← Community Posts</a>' +
          '<span class="article-cat">' + escapeHtml(tagLine) + '</span>' +
          '<h1 class="article-title">' + escapeHtml(p.title) + '</h1>' +
          (p.dek ? '<p class="article-dek">' + escapeHtml(p.dek) + '</p>' : '') +
          '<div class="article-meta"><strong>' + escapeHtml(p.authorName || 'FinMango contributor') + '</strong>' + affil + ' · ' + escapeHtml(fmtDate(p.publishedAt || p.createdAt)) + '</div>' +
          cover +
          '<div class="article-body">' + sanitize(p.body) + '</div>' +
        '</article>' +
        '<div class="article-foot">Published on FinMango as part of our community contributor program. ' +
          'Want to write for us? <a href="get-involved.html#co-author">Pitch a post →</a></div></div>';
      document.title = (p.title || 'Community Post') + ' — FinMango';
      const md = document.querySelector('meta[name="description"]');
      if (md && p.dek) md.setAttribute('content', p.dek);
    }

    (async function () {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return showState('Post not found', 'No post was specified. <a href="posts.html">Browse all posts →</a>');
      if (API_URL === 'REPLACE_WITH_APPS_SCRIPT_WEB_APP_URL') return showState('Not configured yet', 'The posts backend URL has not been set. See <code>docs/POSTS-SETUP.md</code>.');
      try {
        const res = await fetch(API_URL + '?action=post&id=' + encodeURIComponent(id));
        const data = await res.json();
        if (data.result !== 'success' || !data.post) return showState('Post not found', 'This post may not be published yet. <a href="posts.html">Browse all posts →</a>');
        render(data.post);
      } catch (e) {
        showState('Could not load', 'Something went wrong loading this post. <a href="posts.html">Browse all posts →</a>');
      }
    })();
  </script>
</body>
</html>

  <script>
    // Navigation scroll effect (null-safe: embed views may strip the chrome)
    const nav = document.getElementById('nav');
    if (nav) {
      window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 50);
      }, { passive: true });
    }

    // Mobile menu
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    if (mobileMenuBtn && mobileMenu) {
      mobileMenuBtn.addEventListener('click', () => {
        const open = mobileMenu.classList.toggle('active');
        mobileMenuBtn.classList.toggle('active', open);
        mobileMenuBtn.setAttribute('aria-expanded', open);
        document.body.style.overflow = open ? 'hidden' : '';
      });

      document.querySelectorAll('.mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
          mobileMenu.classList.remove('active');
          mobileMenuBtn.classList.remove('active');
          mobileMenuBtn.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        });
      });
    }

    // Mobile accordion
    document.querySelectorAll('.mobile-dropdown-toggle').forEach(toggle => {
      toggle.addEventListener('click', function () {
        const open = this.classList.toggle('active');
        this.setAttribute('aria-expanded', open);
        this.nextElementSibling.classList.toggle('open', open);
      });
    });

    // Desktop dropdown: keep aria-expanded in sync (open/close handled by CSS :hover/:focus-within)
    document.querySelectorAll('.dropdown').forEach(dd => {
      const trigger = dd.querySelector('.dropdown-trigger');
      const sync = (v) => trigger.setAttribute('aria-expanded', v);
      dd.addEventListener('mouseenter', () => sync('true'));
      dd.addEventListener('mouseleave', () => sync('false'));
      dd.addEventListener('focusin', () => sync('true'));
      dd.addEventListener('focusout', (e) => { if (!dd.contains(e.relatedTarget)) sync('false'); });
    });

    // Smooth anchor scroll (offset under fixed nav handled by scroll-margin)
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        const target = document.querySelector(this.getAttribute('href'));
        if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
      });
    });
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FinMango OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900&display=swap" />
<style>
  :root {
    --black: #1a1a1a;
    --white: #ffffff;
    --orange: #FF6B35;
    --orange-dark: #E55A2B;
    --gray: #5a574f;
    --warm-white: #f9f5f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px; height: 630px;
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--warm-white);
    color: var(--black);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #capture {
    position: relative;
    width: 1200px;
    height: 630px;
    background: var(--warm-white);
    overflow: hidden;
  }

  /* Left orange accent bar */
  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 14px;
    background: var(--orange);
  }

  /* Subtle background pattern - radiating dots */
  .dot-pattern {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,107,53,0.08) 1.2px, transparent 1.2px);
    background-size: 22px 22px;
    background-position: 0 0;
    opacity: 0.7;
    pointer-events: none;
  }

  /* Left content panel */
  .content {
    position: absolute;
    left: 60px;
    top: 44px;
    width: 640px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-logo {
    height: 50px;
    width: auto;
    display: block;
  }
  .brand-tag {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gray);
    padding: 6px 12px;
    border: 1.5px solid rgba(90, 87, 79, 0.35);
    border-radius: 999px;
    white-space: nowrap;
  }

  .headline {
    font-size: 58px;
    font-weight: 900;
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: var(--black);
    margin-top: 2px;
  }
  .headline .accent { color: var(--orange); }
  .headline .underline {
    background: linear-gradient(transparent 70%, rgba(255,107,53,0.35) 70%);
    padding: 0 2px;
  }

  .sub {
    font-size: 20px;
    line-height: 1.35;
    color: var(--gray);
    font-weight: 500;
    max-width: 600px;
  }

  .stats {
    display: flex;
    gap: 40px;
    margin-top: 2px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num {
    font-size: 44px;
    font-weight: 900;
    color: var(--orange);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--black);
    letter-spacing: 0.02em;
  }

  .url {
    font-size: 17px;
    font-weight: 800;
    color: var(--black);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }
  .url .bullet {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--orange);
    display: inline-block;
  }

  /* Right-side photo collage */
  .collage {
    position: absolute;
    right: 0;
    top: 0;
    width: 500px;
    height: 630px;
  }
  .photo {
    position: absolute;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 18px 40px rgba(26,26,26,0.18),
      0 6px 14px rgba(26,26,26,0.10);
    background: #eee;
    border: 6px solid #fff;
  }
  .photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo.p1 {
    top: 60px; right: 40px;
    width: 400px; height: 240px;
    transform: rotate(-2.2deg);
    z-index: 2;
  }
  .photo.p2 {
    top: 280px; right: 240px;
    width: 240px; height: 240px;
    transform: rotate(3.2deg);
    z-index: 3;
  }
  .photo.p3 {
    top: 320px; right: 20px;
    width: 240px; height: 210px;
    transform: rotate(-3deg);
    z-index: 1;
  }

  /* Orange sticker badge */
  .badge {
    position: absolute;
    top: 20px;
    right: 30px;
    width: 120px; height: 120px;
    background: var(--orange);
    color: var(--white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transform: rotate(8deg);
    box-shadow: 0 10px 24px rgba(255,107,53,0.35);
    z-index: 4;
    border: 4px solid #fff;
  }
  .badge-text {
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 1.1;
    text-transform: uppercase;
    padding: 0 10px;
  }
</style>
</head>
<body>
<div id="capture">
  <div class="dot-pattern"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="brand-row">
      <img class="brand-logo" src="../finmango.png" alt="FinMango" />
      <span class="brand-tag">501(c)(3) Nonprofit</span>
    </div>

    <h1 class="headline">
      Financial Health<br/>
      Is A <span class="accent">Right</span>,<br/>
      Not A Privilege
    </h1>

    <p class="sub">
      Using data &amp; technology to solve the financial health crisis for young adults worldwide.
    </p>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">10M+</div>
        <div class="stat-label">Lives Impacted</div>
      </div>
      <div class="stat">
        <div class="stat-num">190+</div>
        <div class="stat-label">Countries</div>
      </div>
      <div class="stat">
        <div class="stat-num">100K+</div>
        <div class="stat-label">Students Educated</div>
      </div>
    </div>

    <div class="url"><span class="bullet"></span>finmango.org</div>
  </div>

  <div class="collage">
    <div class="photo p1"><img src="../kent2025.jpg" alt="" /></div>
    <div class="photo p2"><img src="../hero.jpg" alt="" /></div>
    <div class="photo p3"><img src="../FinMangoKent2025-43 (2).JPG" alt="" /></div>
    <div class="badge">
      <div class="badge-text">Est.<br/>2017</div>
    </div>
  </div>
</div>
</body>
</html>

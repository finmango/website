<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FinMango OG Image</title>
<style>
  /* Local fonts so renders are hermetic (no network needed in CI/sandboxes).
     dm-sans-var.woff2 is the variable latin subset (wght 100–1000). */
  @font-face {
    font-family: 'DM Sans';
    src: url('fonts/dm-sans-var.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('fonts/jetbrains-mono-500.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
  }

  /* Editorial system — same tokens as index.html */
  :root {
    --paper: #FAFAF7;
    --ink: #0A0A0A;
    --orange: #FF6B35;
    --ink-dim: rgba(10, 10, 10, .62);
    --ink-faint: rgba(10, 10, 10, .38);
    --ink-line-soft: rgba(10, 10, 10, .1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px; height: 630px;
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #capture {
    position: relative;
    width: 1200px;
    height: 630px;
    background: var(--paper);
    overflow: hidden;
    padding: 52px 64px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Soft orange glow, as on the hero */
  .glow {
    position: absolute;
    left: -18%;
    bottom: -30%;
    width: 720px;
    height: 720px;
    background: radial-gradient(circle, rgba(255, 107, 53, .1) 0%, transparent 60%);
    filter: blur(40px);
    pointer-events: none;
  }

  .top-row {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand-logo { height: 54px; width: auto; display: block; }
  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--orange);
  }

  .headline {
    position: relative;
    font-size: 99px;
    font-weight: 900;
    line-height: .97;
    letter-spacing: -.05em;
  }
  .headline em {
    font-style: normal;
    color: var(--orange);
    position: relative;
    display: inline-block;
    white-space: nowrap;
  }
  .headline em svg.hand-stroke {
    position: absolute;
    left: -1%;
    bottom: -.06em;
    width: 102%;
    height: .14em;
  }
  .headline em svg.hand-stroke path {
    stroke: var(--orange);
    stroke-width: 5;
    stroke-linecap: round;
    fill: none;
    opacity: .5;
  }

  .sub {
    position: relative;
    font-size: 27px;
    font-weight: 300;
    line-height: 1.45;
    letter-spacing: -.015em;
    color: var(--ink-dim);
    max-width: 46ch;
  }
  .sub strong { color: var(--ink); font-weight: 500; }

  .bottom-row {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-top: 1px solid var(--ink-line-soft);
    padding-top: 30px;
  }
  .stats { display: flex; gap: 56px; }
  .stat { display: flex; flex-direction: column; gap: 8px; }
  .stat-num {
    font-size: 50px;
    font-weight: 900;
    letter-spacing: -.04em;
    line-height: .95;
  }
  .stat-num em { font-style: normal; color: var(--orange); }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--ink-faint);
  }
  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 6px;
  }
  .url .tick {
    width: 26px; height: 2px;
    background: var(--orange);
    display: inline-block;
  }
</style>
</head>
<body>
<div id="capture">
  <div class="glow"></div>

  <div class="top-row">
    <img class="brand-logo" src="../finmango.png" alt="FinMango" />
    <span class="status"><span class="dot"></span>Est. 2017 · 501(c)(3) Nonprofit</span>
  </div>

  <h1 class="headline">
    Financial health should be a right. <em>So we build it.<svg class="hand-stroke" viewBox="0 0 300 12" preserveAspectRatio="none" aria-hidden="true"><path d="M4 8 C 50 3, 110 10, 160 6 S 260 4, 296 7"/></svg></em>
  </h1>

  <p class="sub">
    Using <strong>data &amp; technology</strong> to fix the systemic barriers crushing the financial health of young adults worldwide.
  </p>

  <div class="bottom-row">
    <div class="stats">
      <div class="stat">
        <div class="stat-num">10M<em>+</em></div>
        <div class="stat-label">Lives Reached</div>
      </div>
      <div class="stat">
        <div class="stat-num">100K<em>+</em></div>
        <div class="stat-label">Educated</div>
      </div>
      <div class="stat">
        <div class="stat-num">190<em>+</em></div>
        <div class="stat-label">Countries</div>
      </div>
    </div>
    <div class="url"><span class="tick"></span>finmango.org</div>
  </div>
</div>
</body>
</html>

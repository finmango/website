<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- index finger pointing out -->
    <line x1="30" y1="50" x2="75" y2="50"/>
    <path d="M70,42 L82,50 L70,58"/>
    <!-- fist / hand -->
    <rect x="18" y="42" width="22" height="20" rx="5"/>
    <!-- knuckle lines -->
    <line x1="25" y1="42" x2="25" y2="40"/>
    <line x1="32" y1="42" x2="32" y2="40"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g stroke="#1a1a1a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- main stalk -->
    <line x1="50" y1="85" x2="50" y2="22"/>
    <!-- grain at top -->
    <ellipse cx="50" cy="18" rx="5" ry="9"/>
    <!-- left side grains -->
    <line x1="50" y1="38" x2="36" y2="32"/>
    <ellipse cx="32" cy="30" rx="4" ry="7" transform="rotate(-20,32,30)"/>
    <line x1="50" y1="52" x2="36" y2="46"/>
    <ellipse cx="32" cy="44" rx="4" ry="7" transform="rotate(-20,32,44)"/>
    <!-- right side grains -->
    <line x1="50" y1="44" x2="64" y2="38"/>
    <ellipse cx="68" cy="36" rx="4" ry="7" transform="rotate(20,68,36)"/>
    <line x1="50" y1="58" x2="64" y2="52"/>
    <ellipse cx="68" cy="50" rx="4" ry="7" transform="rotate(20,68,50)"/>
    <!-- ground line -->
    <line x1="30" y1="85" x2="70" y2="85"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- map rectangle with fold -->
    <path d="M15,20 L85,20 L85,80 L15,80 Z"/>
    <!-- fold line -->
    <line x1="38" y1="20" x2="38" y2="80"/>
    <line x1="62" y1="20" x2="62" y2="80"/>
    <!-- pin -->
    <circle cx="50" cy="44" r="8"/>
    <line x1="50" y1="52" x2="50" y2="65"/>
    <circle cx="50" cy="44" r="3" fill="#1a1a1a"/>
    <!-- wavy route lines -->
    <path d="M20,60 Q28,55 32,62 Q36,68 44,63" stroke-dasharray="3,3"/>
  </g>
</svg>
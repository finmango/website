<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g stroke="#1a1a1a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="50" cy="52" r="34"/>
    <!-- hands -->
    <line x1="50" y1="52" x2="50" y2="28"/>
    <line x1="50" y1="52" x2="68" y2="60"/>
    <!-- center dot -->
    <circle cx="50" cy="52" r="3" fill="#1a1a1a"/>
    <!-- 12 o'clock marks -->
    <line x1="50" y1="20" x2="50" y2="16"/>
    <line x1="50" y1="84" x2="50" y2="88"/>
    <line x1="16" y1="52" x2="20" y2="52"/>
    <line x1="80" y1="52" x2="84" y2="52"/>
  </g>
</svg>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>FinMango Ambassadors Collage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body { margin: 0; padding: 0; overflow: hidden; background: #222; }

        /* 1200x1200 square collage of all 43 ambassadors (2017-2026) */
        .collage {
            width: 1200px;
            height: 1200px;
            background: #FF6B35;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 5px;
            padding: 5px;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        .tile {
            position: relative;
            overflow: hidden;
            background: #111;
        }

        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 22%;
        }

        /* Brand tile — orange with FinMango mango/leaf motif */
        .tile.brand {
            background: linear-gradient(135deg, #E85A1F 0%, #FF6B35 50%, #FF8A4C 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tile.brand svg {
            width: 62%;
            height: 62%;
            filter: drop-shadow(0 4px 10px rgba(80, 20, 0, 0.25));
        }

        .tile.brand.accent-ring::after {
            content: '';
            position: absolute;
            inset: 18%;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
        }
    </style>
</head>
